services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../backend/.env
    volumes:
      - ../backend/data:/app/data       # SQLite + токены ФНС живут тут (бэкапим эту папку)
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro   # сборка мини-аппа
      - /etc/letsencrypt:/etc/letsencrypt:ro          # сертификаты Let's Encrypt
    depends_on:
      - app
    restart: unless-stopped
