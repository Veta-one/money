# Блок для добавления в Caddyfile сервера:
#   /home/your_user/my_server/caddy_config/Caddyfile
# Добавить рядом с другими блоками *.vetaone.site и выполнить graceful reload:
#   docker exec caddy_dispatcher caddy reload --config /etc/caddy/Caddyfile
# Caddy сам выпустит Let's Encrypt сертификат, как только money.vetaone.site
# начнёт резолвиться на этот сервер.

money.vetaone.site {
    encode gzip zstd
    reverse_proxy money_app:8000
}
