<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONEY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1b1c20; --text:#15161a; --muted:#8b909a;
    --line:#eceef1; --green:#18c171; --red:#ff4d54;
  }
  html.dark{
    --bg:#15161a; --card:#1e2026; --ink:#f3f4f6; --text:#f3f4f6; --muted:#8b909a;
    --line:#2c2e35; --green:#18c171; --red:#ff5c63;
  }
  html.dark .nav{background:#0e0f12}
  html.dark .nav button.active{background:#2c2e35}
  html.dark .hero{background:#0e0f12}
  html.dark select.inp{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b909a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6l6 -6'/></svg>")}
  html.dark .btn{background:#3a3d45;color:#fff}
  html.dark .chip.on{background:#3a3d45;color:#fff;border-color:#3a3d45}
  html.dark .fab{background:#3a3d45;color:#fff}
  html.dark .cbx.on{background:#3a3d45;border-color:#3a3d45}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;
    letter-spacing:-.1px}
  body{padding:14px 14px 96px}
  .muted{color:var(--muted)}
  .head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .head .hi{font-size:15px;font-weight:600}
  .head .sub{font-size:12px;color:var(--muted)}
  svg.ic{display:block}
  .hero{background:var(--ink);color:#fff;border-radius:24px;padding:22px 20px}
  .hero .label{font-size:13px;color:#a9adb6}
  .hero .big{font-size:30px;font-weight:800;letter-spacing:-.6px;margin:6px 0 4px}
  .hero .big .cur{font-size:18px;color:#a9adb6;font-weight:700;margin-left:4px}
  .hero .sub{font-size:13px;color:#c7cad1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .card{background:var(--card);border-radius:18px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)}
  .card .v{font-size:18px;font-weight:800;margin-top:4px;letter-spacing:-.3px}
  .v .cur{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  h2{font-size:13px;font-weight:700;margin:20px 4px 9px;letter-spacing:.1px}
  .ccards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .catcard{background:var(--card);border-radius:16px;padding:11px 12px}
  .catcard .cc-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .catcard .cc-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .catcard .cc-ic{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
  .catcard .cc-a{font-size:15px;font-weight:800;letter-spacing:-.3px}
  .catcard .cc-p{font-size:12px;font-weight:700;color:var(--muted);flex:none}
  .catcard .cc-n{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chartcard{background:var(--card);border-radius:18px;padding:16px 14px 10px}
  .catlist{background:var(--card);border-radius:18px;padding:6px 16px}
  .cat{padding:12px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .top{display:flex;align-items:center;gap:11px}
  .cdot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .cat .nm{flex:1;font-size:14px}
  .cat .am{font-size:14px;font-weight:700}
  .track{height:6px;border-radius:6px;background:var(--line);margin-top:9px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:6px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px}
  .sq{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .t2{font-size:12px;color:var(--muted);margin-top:2px}
  .amt{font-size:15px;font-weight:700;white-space:nowrap}
  .amt.exp{color:var(--text)} .amt.inc{color:var(--green)}
  .row.rev{box-shadow:inset 3px 0 0 #ff8a3d}
  .cbx{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;background:#fff}
  .cbx.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .fab{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:var(--ink);color:#fff;border:none;border-radius:14px;padding:12px 18px;font-size:14px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.22);cursor:pointer;z-index:55;display:flex;align-items:center;gap:8px}
  .num{width:118px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;font-weight:700;text-align:right;padding:9px 11px}
  .num:focus{border-color:var(--ink);outline:none}
  .inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;padding:11px 12px}
  .inp:focus{border-color:var(--ink);outline:none}
  .goal{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .goal .gn{font-size:15px;font-weight:700}
  .goal .gv{font-size:13px;color:var(--muted)}
  .goal .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;flex:none}
  .btn.full{width:100%}
  .chip{background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:none}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .catpick{display:flex;align-items:center;gap:8px;background:var(--bg);border:none;
    border-radius:14px;padding:12px 13px;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left;line-height:1.2}
  .catpick svg{flex:none}
  .iconbtn{background:var(--bg);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:var(--text)}
  .empty{color:var(--muted);text-align:center;padding:30px 16px;font-size:14px;line-height:1.5}
  .empty .ttl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
  .loader{text-align:center;color:var(--muted);padding:70px 0}
  .err{color:var(--red);text-align:center;padding:40px 16px}
  .nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:2px;
    background:var(--ink);border-radius:20px;padding:5px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
  .nav button{background:none;border:none;color:#9a9ea8;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 9px;border-radius:14px;cursor:pointer}
  .nav button.active{background:#2c2e35;color:#fff}
  .nav button .lbl{display:block;font-size:9.5px;font-weight:500;line-height:1;letter-spacing:.1px}
  .filt{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none}
  .filt::-webkit-scrollbar{display:none}
  .dayh{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin:16px 4px 8px}
  select.inp{appearance:none;-webkit-appearance:none;padding-right:34px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b909a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6l6 -6'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .srch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;padding:0 12px}
  .srch:focus-within{border-color:var(--ink)}
  .srch input{flex:1;background:none;border:none;padding:11px 0;font-size:15px;color:var(--text);outline:none}
  .srch svg{color:var(--muted);flex:none}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:50}
  .sheet{background:var(--card);width:100%;border-radius:24px 24px 0 0;padding:18px 16px 30px;max-height:82vh;overflow:auto}
  .sheeth{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .drow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:none}
  .catchip{background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:5px}
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  /* плавная смена табов */
  [id^="v-"]{animation:fadein .18s ease-out}
  @keyframes fadein{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* skeleton-loader */
  .skel{background:linear-gradient(90deg,var(--line) 0%,#f7f8fa 50%,var(--line) 100%);
    background-size:200% 100%;animation:shimmer 1.4s linear infinite;border-radius:8px}
  html.dark .skel{background:linear-gradient(90deg,#2c2e35 0%,#3a3d45 50%,#2c2e35 100%);background-size:200% 100%}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-hero{height:106px;border-radius:24px;margin-bottom:12px}
  .skel-card{height:70px;border-radius:18px}
  .skel-row{height:56px;border-radius:16px;margin-bottom:8px}
  .skel-h2{height:14px;width:40%;margin:22px 4px 14px}
  /* глобальный FAB «+» — quick add */
  .fab-add{position:fixed;right:18px;bottom:84px;width:54px;height:54px;border-radius:18px;border:none;
    background:var(--ink);color:#fff;box-shadow:0 12px 26px rgba(0,0,0,.25);cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:45;transition:transform .22s ease, opacity .22s ease}
  .fab-add:active{transform:scale(.92)}
  .fab-add.away{transform:translateY(110px);opacity:0;pointer-events:none}
  html.dark .fab-add{background:#3a3d45}
  /* heatmap — фиксированные 11px квадратики, прижаты к правому краю; старые недели обрезаются слева */
  .heat-wrap{display:flex;flex-direction:row-reverse;overflow:hidden;margin:0 -2px}
  .heat{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px;padding:4px 2px;flex:0 0 auto}
  .heat-cell{width:11px;height:11px;border-radius:3px;background:var(--line)}
  .heat-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:10px;justify-content:flex-end}
  .heat-leg-sq{width:10px;height:10px;border-radius:3px}
  .heat-cell.tipped{outline:2px solid var(--ink);outline-offset:1px}
  /* Тултипы (десктоп-курсор) и интерактивные элементы графиков */
  #_tip{position:fixed;background:rgba(20,21,26,.96);color:#fff;padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.4;pointer-events:none;z-index:90;box-shadow:0 8px 28px rgba(0,0,0,.25);opacity:0;transition:opacity .12s;max-width:260px}
  html.dark #_tip{background:rgba(58,61,69,.96)}
  #_tip.show{opacity:1}
  [data-drill]{cursor:pointer}
  [data-tip]{cursor:default}
</style>
</head>
<body>
  <div id="v-dashboard"></div>
  <div id="v-ops" style="display:none"></div>
  <div id="v-analytics" style="display:none"></div>
  <div id="v-income" style="display:none"></div>
  <div id="v-capital" style="display:none"></div>
  <div id="v-goals" style="display:none"></div>
  <div class="nav">
    <button id="t-dashboard" class="active" onclick="tab('dashboard')"></button>
    <button id="t-ops" onclick="tab('ops')"></button>
    <button id="t-analytics" onclick="tab('analytics')"></button>
    <button id="t-income" onclick="tab('income')"></button>
    <button id="t-capital" onclick="tab('capital')"></button>
    <button id="t-goals" onclick="tab('goals')"></button>
  </div>
  <div class="toast" id="toast"></div>
  <button id="fab-add" class="fab-add" onclick="openTxForm()" title="Добавить операцию"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
  <div id="ov" class="ov" style="display:none" onclick="if(event.target.id==='ov')closeOv()"><div id="sheet" class="sheet"></div></div>
<script>
const tg = window.Telegram?.WebApp;
// Тема: 'auto' (по Telegram), 'light', 'dark'. По умолчанию — светлая.
let _themePref = localStorage.getItem('money.theme') || 'light';
function applyTheme(){
  const dark = _themePref==='dark' || (_themePref==='auto' && tg?.colorScheme==='dark');
  document.documentElement.classList.toggle('dark', dark);
  const bg = dark?'#15161a':'#f3f4f6';
  try{ tg?.setHeaderColor?.(bg); tg?.setBackgroundColor?.(bg); }catch(e){}
}
applyTheme();
try{ tg?.ready(); tg?.expand(); }catch(e){}

// ===== Семья: настраиваемый список владельцев счетов/доходов =====
let _family=[{key:'me',name:'Я',core:true},{key:'wife',name:'Жена',core:true}];
let _familyLoaded=false;
async function loadFamily(){
  try{
    const r=await api('/api/kv/family_members');
    if(r.value){ const p=JSON.parse(r.value); if(Array.isArray(p)&&p.length) _family=p; }
  }catch(e){}
  _familyLoaded=true;
}
async function saveFamily(){
  try{ await api('/api/kv/family_members',{method:'POST',body:JSON.stringify({value:JSON.stringify(_family)})}); }catch(e){}
}
function ownerLabel(key){ const m=_family.find(f=>f.key===key); return m?m.name:(key||'я').toLowerCase(); }
function familyChips(selected,setFnName){
  return _family.map(f=>`<button class="chip${selected===f.key?' on':''}" onclick="${setFnName}('${f.key}')">${f.name}</button>`).join('');
}
function _familyNewKey(){
  let i=1; while(_family.some(f=>f.key==='m'+i)) i++; return 'm'+i;
}
loadFamily(); // fire-and-forget на старте
try{ tg?.onEvent?.('themeChanged', ()=>{ if(_themePref==='auto'){ applyTheme(); refreshActive(); } }); }catch(e){}
// TG CloudStorage: тема между устройствами одного аккаунта (на клиентах 6.9+).
try{ tg?.CloudStorage?.getItem?.('theme',(_,v)=>{ if(v && v!==_themePref){ _themePref=v; localStorage.setItem('money.theme',v); applyTheme(); }}); }catch(e){}
function setTheme(p){
  _themePref=p; localStorage.setItem('money.theme',p); applyTheme(); refreshActive();
  try{ tg?.CloudStorage?.setItem?.('theme',p); }catch(e){}
}
function tap(s){ try{ tg?.HapticFeedback?.impactOccurred?.(s||'light'); }catch(e){} }
const fmt = n => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n||0));
const fmtK = n => { n=Math.round(n||0); return n>=1000 ? (Math.round(n/100)/10+'к').replace('.',',') : ''+n; };
const CUR='₽';
function plural(n,one,few,many){ n=Math.abs(n)%100; const k=n%10; if(n>10&&n<20)return many; if(k>1&&k<5)return few; if(k===1)return one; return many; }
function dBadge(cur,prev,goodDown){ if(prev==null||prev===0)return ''; const diff=cur-prev; if(!diff)return ''; const pct=Math.round(diff/prev*100),up=diff>0,good=goodDown?!up:up; return `<span style="font-size:11px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${up?'↑':'↓'}${Math.abs(pct)}%</span>`; }
function dBadgeAbs(delta,goodDown){ if(delta==null||!delta)return ''; const up=delta>0,good=goodDown?!up:up; return `<span style="font-size:11px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${up?'↑':'↓'} ${fmt(Math.abs(delta))} ₽</span>`; }
let _cats=[], _cands=[], _pickKind=null, _pickId=null, _debtDir='owed_to_me', _recPer='monthly', _incPer='monthly', _incOwner='me', _incCats=[], _detail=null, _anPeriod='month', _bud=[], _txf=null, _accs=[], _accEdit=null, _accOwner='me', _opsFiltOpen=false, _deps=[], _depEdit=null, _depOwner='me', _depCap=true,
_opsBulk=false, _opsSel=new Set();

// ---- Tabler icons ----
const P = {
  dashboard:'<path d="M4 4h6v8h-6z"/><path d="M4 16h6v4h-6z"/><path d="M14 12h6v8h-6z"/><path d="M14 4h6v4h-6z"/>',
  wallet:'<path d="M19 7h-14a2 2 0 0 0 -2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2v-8a2 2 0 0 0 -2 -2z"/><path d="M16.5 12.5h.5"/><path d="M19 7v-2a2 2 0 0 0 -2 -2h-9"/>',
  target:'<path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0"/><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>',
  receipt:'<path d="M5 21v-16a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v16l-3 -2l-2 2l-2 -2l-2 2l-2 -2z"/><path d="M9 7h6"/><path d="M9 11h6"/>',
  coin:'<path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M14.8 9a2 2 0 0 0 -1.8 -1h-2a2 2 0 0 0 0 4h2a2 2 0 0 1 0 4h-2a2 2 0 0 1 -1.8 -1"/><path d="M12 6v2"/><path d="M12 16v2"/>',
  swap:'<path d="M3 8h14l-3 -3"/><path d="M21 16h-14l3 3"/>',
  list:'<path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><path d="M5 6v.01"/><path d="M5 12v.01"/><path d="M5 18v.01"/>',
  search:'<path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/><path d="M21 21l-6 -6"/>',
  cash:'<path d="M7 9m0 2a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2z"/><path d="M14 14m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 9v-2a2 2 0 0 0 -2 -2h-10a2 2 0 0 0 -2 2v6a2 2 0 0 0 2 2h2"/>',
  gear:'<path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/>',

  const c=col||'var(--muted)';
  const pts=a.map((v,i)=>`${(i*w/(a.length-1)).toFixed(1)},${(h-2-(v-min)/rng*(h-4)).toFixed(1)}`).join(' ');

}

// на mousemove/click читают data-tip и data-drill="kind:value" из ближайшего предка.
let _tipEl;
function tipShow(x,y,html){
  if(!_tipEl){ _tipEl=document.createElement('div'); _tipEl.id='_tip'; document.body.appendChild(_tipEl); }
  _tipEl.innerHTML=html; _tipEl.classList.add('show');
  const w=_tipEl.offsetWidth,h=_tipEl.offsetHeight;
  let nx=x+14,ny=y-h-10;
  if(nx+w>innerWidth-8) nx=x-w-14;
  if(ny<8) ny=y+18;
  if(nx<8) nx=8;
  _tipEl.style.left=nx+'px'; _tipEl.style.top=ny+'px';
}
function tipHide(){ if(_tipEl) _tipEl.classList.remove('show'); }
// Линейный график: вертикальная пунктирная линия + точка в ближайшей точке.
// Геометрия — в data-line='[[svg_x,svg_y,"date",value],...]', тип в data-line-fmt.
function lineHover(svg,evt){
  const raw=svg.getAttribute('data-line'); if(!raw) return;
  let pts; try{ pts=JSON.parse(raw); }catch(e){ return; }
  if(!pts.length) return;
  const rect=svg.getBoundingClientRect(), vbW=(svg.viewBox.baseVal&&svg.viewBox.baseVal.width)||330;
  const px=(evt.clientX-rect.left)/rect.width*vbW;
  let best=0,bd=Infinity;
  for(let i=0;i<pts.length;i++){ const d=Math.abs(pts[i][0]-px); if(d<bd){bd=d;best=i;} }
  const [sx,sy,date,val]=pts[best];
  const cx=svg.querySelector('.cx'); if(cx){ cx.setAttribute('x1',sx); cx.setAttribute('x2',sx); cx.setAttribute('opacity','.55'); }
  const dot=svg.querySelector('.cx-dot'); if(dot){ dot.setAttribute('cx',sx); dot.setAttribute('cy',sy); dot.setAttribute('opacity','1'); }
  const fmtType=svg.getAttribute('data-line-fmt')||'rub';
  const valStr=fmtType==='rate'?`${val.toFixed(2)} ₽`:`${fmt(val)} ₽`;
  const dt=new Date(date);
  const dateStr=dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'});
  tipShow(evt.clientX,evt.clientY,`<div style="color:#a9adb6;font-size:11px">${dateStr}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${valStr}</div>`);
}
function lineHoverClear(svg){
  const cx=svg.querySelector('.cx'); if(cx) cx.setAttribute('opacity','0');
  const dot=svg.querySelector('.cx-dot'); if(dot) dot.setAttribute('opacity','0');
}
document.addEventListener('mousemove',e=>{
  const lineSvg=e.target.closest('svg[data-line]');
  if(lineSvg){ lineHover(lineSvg,e); return; }
  // если выходим из линейного графика — снять crosshair у всех
  document.querySelectorAll('svg[data-line]').forEach(s=>{ if(!s.contains(e.target)) lineHoverClear(s); });
  const tEl=e.target.closest('[data-tip]');
  if(tEl){ tipShow(e.clientX,e.clientY,tEl.getAttribute('data-tip')); return; }
  tipHide();
});
document.addEventListener('mouseleave',()=>{ tipHide(); document.querySelectorAll('svg[data-line]').forEach(lineHoverClear); },true);
document.addEventListener('click',e=>{
  const d=e.target.closest('[data-drill]'); if(!d) return;
  const [kind,...rest]=d.getAttribute('data-drill').split(':'); const val=rest.join(':');
  if(kind==='day') openOpsForDay(val);
  else if(kind==='month') openOpsForMonth(val);
  else if(kind==='cat') openCatOps(parseInt(val,10));
  else if(kind==='merch') openMerchOps(val);
});

// Heatmap: грид 7×N недель + цветовая шкала по интенсивности.
function hmap(data, opts){
  const pts=(data&&data.points)||[]; if(!pts.length) return '';
  const map=Object.fromEntries(pts.map(p=>[p.date,p.spent]));
  const mx=Math.max(1,...pts.map(p=>p.spent));
  const days=(opts&&opts.days)||365, today=new Date();
  // выровняем end на воскресенье (последняя колонка), считаем недели назад
  const end=new Date(today); end.setHours(0,0,0,0);
  const start=new Date(end); start.setDate(end.getDate()-(days-1));
  // двигаем start на ближайший понедельник назад чтобы было ровно 7 строк
  const dow0=(start.getDay()+6)%7;  // пн=0
  start.setDate(start.getDate()-dow0);
  const accent=(opts&&opts.color)||'#ff4d54';
  // вычислим цвет в 5 ступеней
  const level=v=>v<=0?0:v<mx*0.15?1:v<mx*0.35?2:v<mx*0.65?3:4;
  const op=l=>l===0?0:[0,.15,.35,.6,1][l];
  const cells=[];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const key=d.toISOString().slice(0,10), v=map[key]||0, l=level(v);
    const dateStr=new Date(key).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'2-digit'});
    const tip=v>0
      ? `<div style="color:#a9adb6;font-size:11px">${dateStr}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${fmt(v)} ₽</div><div style="color:#a9adb6;font-size:10px;margin-top:3px">тап → операции дня</div>`
      : `<div style="color:#a9adb6;font-size:11px">${dateStr}</div><div style="margin-top:2px">трат не было</div>`;
    const drill=v>0?` data-drill="day:${key}"`:'';
    cells.push(`<div class="heat-cell" data-tip='${tip.replace(/'/g,"&#39;")}'${drill} style="${l>0?`background:${accent};opacity:${op(l)}`:''}"></div>`);
  }
  const total=pts.reduce((s,p)=>s+p.spent,0);
  const monthsAgo=Math.round((days/30)*10)/10;
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span class="k">Календарь трат · ${monthsAgo} мес</span>

function barChart(data, w=330, h=144){
  const max=Math.max(1,...data.map(d=>d.spent));
  const n=data.length||1, gap=12, bw=(w-gap*(n-1))/n, base=h-22, top=20;
  let s='';
  data.forEach((d,i)=>{
    const bh=Math.max(3, d.spent/max*(base-top)), x=i*(bw+gap), y=base-bh;
    const prev=i>0?data[i-1].spent:0;
    const dPct=prev>0?Math.round((d.spent-prev)/prev*100):null;
    const ymKey=d.ym||'';
    const dColor=dPct>0?'#ff4d54':'#18c171';
    const tipHtml=`<div style="color:#a9adb6;font-size:11px">${d.label}${d.year?' '+d.year:''}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${fmt(d.spent)} ₽</div>${dPct!==null?`<div style="color:${dColor};font-size:11px;margin-top:2px">${dPct>=0?'+':''}${dPct}% к прошлому</div>`:''}${ymKey?`<div style="color:#a9adb6;font-size:10px;margin-top:3px">тап → операции месяца</div>`:''}`;
    const drillAttr=ymKey?` data-drill="month:${ymKey}"`:'';
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="var(--ink)" data-tip='${tipHtml.replace(/'/g,"&#39;")}'${drillAttr}/>`;
    if(d.spent>0) s+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="10.5" fill="var(--text)" font-weight="700" pointer-events="none">${fmtK(d.spent)}</text>`;
    s+=`<text x="${x+bw/2}" y="${h-5}" text-anchor="middle" font-size="11" fill="#8b909a" pointer-events="none">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}
function hbar(items, opts){
  const data=(items||[]).filter(i=>i.value>0);
  const total=data.reduce((s,i)=>s+i.value,0)||1;
  const title=(opts&&opts.title)||'Всего';
  const showLegend=!(opts&&opts.compact);
  const segs=data.map(it=>{const pct=it.value/total*100; const tip=`<div style="color:#a9adb6;font-size:11px">${(it.name||'').replace(/'/g,"&#39;")}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${fmt(it.value)} ₽</div><div style="color:#a9adb6;font-size:11px;margin-top:2px">${Math.round(pct)}% от всего</div>`; return `<div data-tip='${tip.replace(/'/g,"&#39;")}' style="flex:${Math.max(0.6,pct).toFixed(2)};background:${it.color};min-width:3px"></div>`;}).join('');
  const legend=showLegend?`<div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">
    ${data.map(it=>{const pct=Math.round(it.value/total*100);return `<div style="display:flex;align-items:center;gap:8px">
      <span style="width:10px;height:10px;border-radius:3px;background:${it.color};flex:none"></span>
      <span style="flex:1;font-size:13px">${it.name||''}</span>
      <span style="font-size:12px;color:var(--muted);font-weight:600;min-width:32px;text-align:right">${pct}%</span>
      <span style="font-size:13px;font-weight:700;min-width:60px;text-align:right">${fmt(it.value)} ₽</span></div>`}).join('')}</div>`:'';
  return `<div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:12px;color:var(--muted)">${title}</span>
      <span style="font-size:20px;font-weight:800;letter-spacing:-.5px">${fmt(total)} ₽</span></div>
    <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--line);gap:2px">${segs}</div>
    ${legend}</div>`;
}
function donut(items){ return hbar((items||[]).map(it=>({...it, name:it.name||''}))); }
function cashflowChart(data, w=330, h=160){
  const max=Math.max(1,...data.flatMap(d=>[d.income,d.expense]));
  const n=data.length||1, gap=14, grp=(w-gap*(n-1))/n, bw=Math.max(5,grp/2-3), base=h-20, top=26;
  let s='';
  data.forEach((d,i)=>{
    const x=i*(grp+gap);
    const ih=Math.max(2,d.income/max*(base-top)), eh=Math.max(2,d.expense/max*(base-top));
    const ix=x+bw/2, ex=x+bw+3+bw/2;
    const mName=new Date(d.ym+'-01').toLocaleDateString('ru-RU',{month:'long',year:'2-digit'});
    const net=Math.round((d.income||0)-(d.expense||0));
    const netCol=net>=0?'#18c171':'#ff4d54';
    const tipHtml=`<div style="color:#a9adb6;font-size:11px">${mName}</div><div style="margin-top:3px;font-size:12px"><span style="color:#18c171">+${fmt(d.income)}</span> <span style="color:#a9adb6">/</span> <span>−${fmt(d.expense)}</span></div><div style="margin-top:2px;font-size:13px;font-weight:800;color:${netCol}">= ${net>=0?'+':'−'}${fmt(Math.abs(net))} ₽</div><div style="color:#a9adb6;font-size:10px;margin-top:3px">тап → операции месяца</div>`;
    const tipAttr=`data-tip='${tipHtml.replace(/'/g,"&#39;")}' data-drill="month:${d.ym}"`;
    // прозрачный hit-area на весь столбец
    s+=`<rect x="${x-2}" y="${top}" width="${grp+4}" height="${base-top}" fill="transparent" ${tipAttr}/>`;
    s+=`<rect x="${x}" y="${base-ih}" width="${bw}" height="${ih}" rx="4" fill="var(--green)" pointer-events="none"/>`;
    s+=`<rect x="${x+bw+3}" y="${base-eh}" width="${bw}" height="${eh}" rx="4" fill="var(--ink)" pointer-events="none"/>`;
    if(d.income>0) s+=`<text x="${ix}" y="${base-ih-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="#18c171" pointer-events="none">${fmtK(d.income)}</text>`;
    if(d.expense>0) s+=`<text x="${ex}" y="${base-eh-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="var(--text)" pointer-events="none">${fmtK(d.expense)}</text>`;
    s+=`<text x="${x+grp/2}" y="${h-4}" text-anchor="middle" font-size="10" fill="#8b909a" pointer-events="none">${new Date(d.ym+'-01').toLocaleDateString('ru-RU',{month:'short'})}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}
function lineChart(data, w=330, h=120){
  if(data.length<2) return '';
  const vals=data.map(d=>d.total), min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
  const pad=12, base=h-18, top=12, X=i=>pad+i*(w-2*pad)/(data.length-1), Y=v=>top+(1-(v-min)/rng)*(base-top);
  const ptsStr=data.map((d,i)=>`${X(i).toFixed(1)},${Y(d.total).toFixed(1)}`).join(' ');
  const hover=JSON.stringify(data.map((d,i)=>[+X(i).toFixed(1),+Y(d.total).toFixed(1),d.date,d.total]));
  let s=`<polyline points="${ptsStr}" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  s+=`<circle cx="${X(data.length-1)}" cy="${Y(data[data.length-1].total)}" r="3.5" fill="var(--ink)"/>`;
  s+=`<line class="cx" x1="0" y1="${top}" x2="0" y2="${base}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>`;
  s+=`<circle class="cx-dot" r="4" fill="var(--ink)" opacity="0"/>`;
  s+=`<text x="${pad}" y="${h-3}" font-size="10" fill="#8b909a">${new Date(data[0].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  s+=`<text x="${w-pad}" y="${h-3}" text-anchor="end" font-size="10" fill="#8b909a">${new Date(data[data.length-1].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block" data-line='${hover.replace(/'/g,"&#39;")}' data-line-fmt="rub">${s}</svg>`;
}
function rateChartCard(fxh, label){

  const area=`${line} ${X(pts.length-1).toFixed(1)},${base.toFixed(1)} ${pad},${base.toFixed(1)}`;
  const d0=new Date(pts[0].date).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'});

  return `<div class="card" style="margin-top:8px;padding:12px 14px">

      <span style="color:${dColor};font-weight:700">${dPct>=0?'↑ +':'↓ −'}${Math.abs(dPct).toFixed(1)}%</span>
      <span> за год · мин ${min.toFixed(2)} · макс ${max.toFixed(2)}</span></div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block" data-line='${JSON.stringify(pts.map((p,i)=>[+X(i).toFixed(1),+Y(p.rate).toFixed(1),p.date,p.rate])).replace(/'/g,"&#39;")}' data-line-fmt="rate">
      <polygon points="${area}" fill="var(--ink)" opacity="0.08"/>
      <polyline points="${line}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${X(pts.length-1)}" cy="${Y(last)}" r="3" fill="var(--ink)"/>
      <line class="cx" x1="0" y1="${top}" x2="0" y2="${base}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
      <circle class="cx-dot" r="4" fill="var(--ink)" opacity="0"/>
      <text x="${pad}" y="${h-3}" font-size="10" fill="#8b909a">${d0}</text>
      <text x="${w-pad}" y="${h-3}" text-anchor="end" font-size="10" fill="#8b909a">${d1}</text>
    </svg></div>`;
}

function forecastChart(fc){
  const pts=(fc.points||[]).filter(p=>p.year_offset!==undefined); if(pts.length<2) return '';
  const w=330, h=180, padL=8, padR=8, padT=22, padB=24;
  const vals=pts.map(p=>p.value);
  const ti=fc.fi_targets||{}; const targets=[ti.aggr, ti.base, ti.safe].filter(v=>v>0);
  const maxV=Math.max(...vals, ...targets);
  const minV=Math.min(...vals, 0);
  const rng=(maxV-minV)||1;
  const X=i=>padL+i*(w-padL-padR)/(pts.length-1);
  const Y=v=>padT+(1-(v-minV)/rng)*(h-padT-padB);
  // линия капитала
  const linePts=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
  const areaPts=`${linePts} ${X(pts.length-1).toFixed(1)},${(h-padB).toFixed(1)} ${padL},${(h-padB).toFixed(1)}`;
  // FI-цели горизонтальными пунктирами
  const targetLines=[
    {y:ti.base, col:'#18c171', label:'Базовый FI'},
    {y:ti.aggr, col:'#3b82f6', label:'Оптимистичный'},
    {y:ti.safe, col:'#ff4d54', label:'Осторожный'},
  ].filter(t=>t.y>0 && t.y<=maxV*1.1).map(t=>`
    <line x1="${padL}" y1="${Y(t.y).toFixed(1)}" x2="${w-padR}" y2="${Y(t.y).toFixed(1)}" stroke="${t.col}" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>
    <text x="${w-padR-2}" y="${Y(t.y)-3}" font-size="9.5" fill="${t.col}" text-anchor="end" font-weight="700">${t.label} · ${_fmtBig(t.y)}</text>`).join('');
  // точки пересечения
  const crossings=Object.entries(fc.fi_crossings||{}).filter(([k,v])=>v).map(([k,v])=>{
    const col=k==='base'?'#18c171':k==='aggr'?'#3b82f6':'#ff4d54';
    const px=X(Math.round(v.month/12));
    return `<circle cx="${px.toFixed(1)}" cy="${Y(v.target).toFixed(1)}" r="4" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
  }).join('');
  // ось X (годы)
  const xLabels=[];
  for(let i=0;i<pts.length;i++){
    if(i===0 || pts[i].year_offset%5===0 || i===pts.length-1){
      xLabels.push(`<text x="${X(i).toFixed(1)}" y="${h-6}" font-size="10" fill="#8b909a" text-anchor="middle">${pts[i].year_offset===0?'сейчас':'+'+pts[i].year_offset+'г'}</text>`);
    }
  }
  // hover-данные
  const hover=JSON.stringify(pts.map((p,i)=>[+X(i).toFixed(1),+Y(p.value).toFixed(1),p.date,p.value]));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block" data-line='${hover.replace(/'/g,"&#39;")}' data-line-fmt="rub">
    <polygon points="${areaPts}" fill="var(--ink)" opacity=".07"/>
    ${targetLines}
    <polyline points="${linePts}" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${crossings}
    <line class="cx" x1="0" y1="${padT}" x2="0" y2="${h-padB}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
    <circle class="cx-dot" r="4" fill="var(--ink)" opacity="0"/>
    ${xLabels.join('')}
  </svg>
  <div style="display:flex;gap:14px;justify-content:center;margin-top:4px;font-size:11px;color:var(--muted);flex-wrap:wrap">
    <span>откладываю ${_fmtBig(fc.monthly_savings)} ₽/мес</span>·<span>реальная доходность ${fc.real_return_pct>=0?'+':''}${fc.real_return_pct}%</span></div>`;
}

function ruPensionAge(birthYear,gender){
  // упрощённо: после реформы 2018, переходный период 2019-2028
  const g=(gender||'m').toLowerCase();
  if(g==='f'){
    if(birthYear>=1968) return 60;
    if(birthYear===1967) return 59;
    if(birthYear===1966) return 58;
    if(birthYear===1965) return 57;
    if(birthYear===1964) return 56;
    return 55;
  }
  if(birthYear>=1963) return 65;
  if(birthYear===1962) return 64;
  if(birthYear===1961) return 63;
  if(birthYear===1960) return 62;
  if(birthYear===1959) return 61;
  return 60;
}

let _recDay='', _recMonth='';
const _RU_MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const _RU_MONTHS_FULL=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
function renderRecDateInputs(per,day,month){
  // Для «месяц» — только число; для «год» — число + месяц.
  if(per==='monthly'){
    return `<div style="flex:1"><div class="t2" style="margin:0 0 4px 2px;color:var(--muted)">Число месяца (необяз.)</div>
      <input id="nr-day" class="inp" type="number" inputmode="numeric" min="1" max="31" placeholder="1-31" value="${day||''}"></div>`;
  }
  return `<div style="flex:1"><div class="t2" style="margin:0 0 4px 2px;color:var(--muted)">День (необяз.)</div>
      <input id="nr-day" class="inp" type="number" inputmode="numeric" min="1" max="31" placeholder="1-31" value="${day||''}" style="width:100%"></div>
    <div style="flex:1.4"><div class="t2" style="margin:0 0 4px 2px;color:var(--muted)">Месяц</div>
      <select id="nr-month" class="inp">${_RU_MONTHS_FULL.map((n,i)=>`<option value="${i+1}"${(month||(new Date().getMonth()+1))==(i+1)?' selected':''}>${n}</option>`).join('')}</select></div>`;
}

  _recPer=p;

  document.getElementById('per-y').className='chip'+(p==='yearly'?' on':'');

    const m=document.getElementById('nr-month')?.value; if(m) _recMonth=m;

  }

// Считаем next_date из day/month: ближайшее будущее наступление.
function computeNextDate(period,day,month){
  const d=parseInt(day); if(!d||d<1||d>31) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  if(period==='monthly'){
    let n=new Date(today.getFullYear(),today.getMonth(),d);
    if(n<today) n=new Date(today.getFullYear(),today.getMonth()+1,d);
    return _ymdLocal(n);
  }
  const m=(parseInt(month)||today.getMonth()+1)-1;
  let n=new Date(today.getFullYear(),m,d);
  if(n<today) n=new Date(today.getFullYear()+1,m,d);
  return _ymdLocal(n);
}
function _ymdLocal(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
// Российский формат 21.09.2026 — для редактора, чтобы пользователь понимал какую дату ставит.
function fmtDateRu(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`; }

  if(!n||!a){toast('Имя и сумма');return;}

  try{ await api('/api/recurring',{method:'POST',body:JSON.stringify({name:n,amount:a,type:'expense',period:_recPer,next_date})}); toast('Добавлено'); _recDay=''; _recMonth=''; loadGoals(); }catch(e){toast('Ошибка');} }

  // x: либо весь объект {id,amount,name,next_date,period}, либо устаревший вызов (id, amount, name)

  const nd=computeNextDate(e.period,e.day,e.month);

  if(nd) body.next_date=nd; else body.clear_next_date=true;

// Time-until-payment с цветами (чёрный >7d, оранжевый ≤7d, красный ≤3d/завтра/сегодня).
function recTimeUntil(x){
  if(!x.next_date) return null;
  const target=new Date(x.next_date+'T00:00:00'); const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((target-today)/86400000);
  if(days<0) return null;  // прошлая дата (auto-advance подтянет бэк)
  let text;
  if(days===0) text='Сегодня';
  else if(days===1) text='Завтра';
  else if(x.period==='yearly' && days>=30){
    const m=Math.floor(days/30), d=days-m*30;
    text=`${m} мес${d>0?' '+d+' дн.':''}`;
  } else text=`${days} дн.`;
  let col='var(--text)';
  if(days<=7) col='#ff8a3d';
  if(days<=3) col='var(--red)';
  return {text, color:col};
}

function groupedTx(items){
  let html=''; const g={};
  items.forEach(x=>{ const d=(x.dt||'').slice(0,10); (g[d]=g[d]||[]).push(x); });
  for(const day of Object.keys(g)){

    const net=arr.reduce((s,x)=> s + (x.type==='income'? (x.base_rub||0) : x.type==='expense'? -(x.base_rub||0) : 0), 0);
    const dt=new Date(day+'T00:00:00');
    html+=`<div class="dayh"><span>${dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span><span>${net>=0?'+':'−'}${fmt(Math.abs(net))} ${CUR}</span></div>`;

  }
  return html;
}

function closeOv(){ document.getElementById('ov').style.display='none'; toggleFab(true); tgBackSync(); }
function toggleFab(show){ const f=document.getElementById('fab-add'); if(f) f.style.display=show?'flex':'none'; }
// hide-on-scroll-down, show-on-scroll-up для FAB (привычный мобильный паттерн).
let _lastScrollY=0, _fabAway=false, _scrollTick=false;
window.addEventListener('scroll',()=>{
  if(_scrollTick) return; _scrollTick=true;
  requestAnimationFrame(()=>{
    _scrollTick=false;
    const fab=document.getElementById('fab-add');
    const ov=document.getElementById('ov');
    if(!fab || (ov && ov.style.display==='flex')) return;
    const y=window.scrollY, dy=y-_lastScrollY;
    if(Math.abs(dy)<6){ _lastScrollY=y; return; }
    if(dy>0 && y>140 && !_fabAway){ fab.classList.add('away'); _fabAway=true; }
    else if(dy<0 && _fabAway){ fab.classList.remove('away'); _fabAway=false; }
    _lastScrollY=y;
  });
},{passive:true});
// автоматически прячем FAB + синхронизируем TG BackButton пока открыт оверлей
function tgBackSync(){
  const ov=document.getElementById('ov'); const open=ov && ov.style.display==='flex';
  toggleFab(!open);
  try{
    if(open){ tg?.BackButton?.show?.(); tg?.BackButton?.onClick?.(closeOv); }
    else{ tg?.BackButton?.hide?.(); }
  }catch(e){}
}
new MutationObserver(tgBackSync).observe(document.getElementById('ov'),{attributes:true,attributeFilter:['style']});

const COLOR_SET=['#7c5cff','#2f8bff','#18c171','#ff8a3d','#ff5c9d','#10b3c6','#ff4d54','#a855f7','#0ea5e9','#f59e0b','#84cc16','#06b6d4','#ec4899','#8b5cf6'];

const AI_QUICK=[
  'Сколько потратил на еду в этом месяце?',
  'Какая самая дорогая категория?',

function _aiSave(){ try{ localStorage.setItem('money.ai.hist', JSON.stringify(_aiHist.slice(-20))); }catch(e){} }
function openAi(){
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1" style="display:flex;align-items:center;gap:7px">${icon('sparkle',18)}<span>Ассистент</span></div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div id="ai-log" style="display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow:auto;padding:6px 2px"></div>

    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px" id="ai-quick">
      ${AI_QUICK.map(q=>`<button class="chip" style="text-align:left;justify-content:flex-start" onclick="aiAsk('${q.replace(/'/g,"&#39;")}')">${q}</button>`).join('')}</div>`}
    <div style="display:flex;gap:8px;align-items:flex-end">
      <textarea id="ai-q" class="inp" placeholder="Спросить ассистента…" rows="2" style="flex:1;resize:none;font-family:inherit"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiAsk()}"></textarea>
      <button class="btn" onclick="aiAsk()" id="ai-send">${icon('send',18,'#fff')}</button></div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">Ответ Gemini по вашим данным. Не финсовет.</div>`;

}
function aiRenderLog(){
  const log=document.getElementById('ai-log'); if(!log) return;
  log.innerHTML=_aiHist.map(m=>{
    const side=m.role==='user'?'flex-end':'flex-start';
    const bg=m.role==='user'?'var(--ink)':'var(--bg)';
    const fg=m.role==='user'?'#fff':'var(--text)';
    return `<div style="align-self:${side};max-width:86%;background:${bg};color:${fg};padding:10px 12px;border-radius:14px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word">${m.text.replace(/</g,'&lt;')}</div>`;
  }).join('');
  log.scrollTop=log.scrollHeight;
}
async function aiAsk(prefill){
  const q=(prefill!==undefined?prefill:(document.getElementById('ai-q')?.value||'')).trim();
  if(!q) return;
  const btn=document.getElementById('ai-send'), input=document.getElementById('ai-q');
  if(input) input.value='';
  _aiHist.push({role:'user', text:q}); _aiSave(); aiRenderLog();
  _aiHist.push({role:'assistant', text:'…'}); aiRenderLog();
  if(btn) btn.disabled=true;
  // убираем quick-старт после первого вопроса
  document.getElementById('ai-quick')?.remove();
  try{
    const r=await api('/api/ai/ask',{method:'POST',body:JSON.stringify({question:q})});
    _aiHist[_aiHist.length-1]={role:'assistant', text:r.answer||'(пусто)'};
  }catch(e){ _aiHist[_aiHist.length-1]={role:'assistant', text:'Ошибка: '+(e.message||e)}; }
  _aiSave(); aiRenderLog();
  if(btn) btn.disabled=false;
}

// ===== Поиск по чекам ФНС =====
let _rcpExpand=new Set();
let _rcpQ='', _rcpData=null, _rcpDebTimer;
async function openReceipts(){
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Чеки ФНС</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="srch" style="margin-bottom:10px">${icon('search',18)}<input id="rcp-q" placeholder="«хлеб», «молоко», магазин..." value="${_rcpQ.replace(/"/g,'&quot;')}"></div>
    <div id="rcp-list"><div class="empty">Загрузка…</div></div>`;
  document.getElementById('ov').style.display='flex';
  const inp=document.getElementById('rcp-q');
  inp.addEventListener('input',e=>{ clearTimeout(_rcpDebTimer); _rcpDebTimer=setTimeout(()=>{ _rcpQ=e.target.value.trim(); loadReceipts(); },250); });
  loadReceipts();
}
async function loadReceipts(){
  try{
    const url='/api/receipts?limit=30&q='+encodeURIComponent(_rcpQ);
    _rcpData=await api(url);
    renderReceipts();
  }catch(e){ document.getElementById('rcp-list').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function renderReceipts(){
  const d=_rcpData||{receipts:[]};
  const list=document.getElementById('rcp-list'); if(!list) return;
  if(!d.receipts.length){
    list.innerHTML=`<div class="empty"><div class="ttl">${_rcpQ?'Ничего не найдено':'Чеков пока нет'}</div>${_rcpQ?'Уточни запрос или поищи по магазину.':'Скинь боту фото чека с QR — он сам распознает.'}</div>`;
    return;
  }
  list.innerHTML=`<div style="font-size:12px;color:var(--muted);margin:0 2px 8px">${d.count} чек${d.count%10===1&&d.count!==11?'':d.count%10>=2&&d.count%10<=4&&!(d.count%100>=12&&d.count%100<=14)?'а':'ов'} · показано ${d.receipts.length}</div>`+
    d.receipts.map(r=>{
      const col=color(r.merchant), isOpen=_rcpExpand.has(r.id);
      const date=new Date(r.dt).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'});
      const time=new Date(r.dt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      const items=isOpen?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">${r.items.map(it=>`<div style="display:flex;justify-content:space-between;gap:8px;padding:5px 0;font-size:13px">
        <span style="flex:1;min-width:0">${(it.name||'').replace(/</g,'&lt;')}${it.qty>1?` <span class="muted" style="font-size:11px">× ${it.qty}</span>`:''}</span>
        <span style="font-weight:700;white-space:nowrap">${fmt(it.sum||0)} ₽</span></div>`).join('')}</div>`:'';
      return `<div class="row" style="display:block;cursor:pointer" onclick="rcpToggle(${r.id})">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="sq" style="background:${tint(col)};color:${col}">${icon('receipt',20)}</div>
          <div class="mid"><div class="t1">${r.merchant}</div><div class="t2">${date}, ${time} · ${r.n_items} поз.</div></div>
          <div class="amt">${fmt(r.total)} ${CUR}</div>
        </div>${items}</div>`;
    }).join('')+
    (d.has_more?`<button class="btn full" style="margin-top:8px" onclick="rcpMore()">Показать ещё</button>`:'');
}
function rcpToggle(id){ if(_rcpExpand.has(id)) _rcpExpand.delete(id); else _rcpExpand.add(id); renderReceipts(); }
async function rcpMore(){
  const offset=(_rcpData?.receipts?.length||0)+(_rcpData?.offset||0);
  try{
    const more=await api('/api/receipts?limit=30&offset='+offset+'&q='+encodeURIComponent(_rcpQ));
    _rcpData.receipts=_rcpData.receipts.concat(more.receipts);
    _rcpData.has_more=more.has_more;
    renderReceipts();
  }catch(e){toast('Ошибка');}
}

    <div class="mid"><div class="t1">${c.name}</div><div class="t2">${c.tx||0} оп.${c.parent_id?' · подкатегория':''}</div></div>${icon('arrow',18,'#8b909a')}</div>`};
  let html='';
  for(const p of tops){
    html+=row(p);

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${COLOR_SET.map(co=>`<button onclick="_editCatColor='${co}';openCatEditRender()" style="width:32px;height:32px;border-radius:10px;border:${_editCatColor===co?'3px solid var(--ink)':'none'};background:${co};cursor:pointer"></button>`).join('')}</div>
    <div class="t2" style="color:var(--muted);margin:0 2px 4px">Иконка</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px">${ICON_SET.map(ic=>`<button onclick="_editCatIcon='${ic}';openCatEditRender()" style="aspect-ratio:1;border-radius:10px;border:${_editCatIcon===ic?'2px solid '+_editCatColor:'1.5px solid var(--line)'};background:${tint(_editCatColor)};color:${_editCatColor};display:flex;align-items:center;justify-content:center;cursor:pointer">${icon(ic,18)}</button>`).join('')}</div>
    <div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="saveCat()">Сохранить</button>
      ${c?`<button class="chip" style="border-color:var(--red);color:var(--red)" onclick="delCat(${c.id})">Удалить</button>`:''}</div>`;
}
function openCatEditRender(){ openCatEdit(_editCat); }
async function saveCat(){
