<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONEY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1b1c20; --text:#15161a; --muted:#8b909a;
    --line:#eceef1; --green:#18c171; --red:#ff4d54;
    /* Telegram safe area (fullscreen / иконка на раб. столе): телеграм рисует
       свои кнопки сверху — отступаем на эту зону. По умолчанию 0 (обычный режим). */
    --safe-top:0px; --safe-bottom:0px; --safe-left:0px; --safe-right:0px;
  }
  html.dark{
    --bg:#15161a; --card:#1e2026; --ink:#f3f4f6; --text:#f3f4f6; --muted:#8b909a;
    --line:#2c2e35; --green:#18c171; --red:#ff5c63;
  }
  html.dark .nav{background:#0e0f12}
  html.dark .nav button.active{background:#2c2e35}
  html.dark .hero{background:#0e0f12}
  html.dark select.inp{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b909a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6l6 -6'/></svg>")}
  html.dark .btn{background:#3a3d45;color:#fff}
  html.dark .chip.on{background:#3a3d45;color:#fff;border-color:#3a3d45}
  html.dark .fab{background:#3a3d45;color:#fff}
  html.dark .cbx.on{background:#3a3d45;border-color:#3a3d45}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);overflow-x:hidden;
    font-family:'Inter',-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;
    letter-spacing:-.1px}
  body{padding:calc(14px + var(--safe-top)) calc(14px + var(--safe-right)) calc(96px + var(--safe-bottom)) calc(14px + var(--safe-left))}
  /* десктоп/широкий экран (сайт в браузере) — контент колонкой по центру, без спец-вёрстки */
  @media(min-width:600px){
    body{max-width:480px;margin-left:auto;margin-right:auto}
    .fab-add{right:calc(50vw - 240px + 18px)}
  }
  .muted{color:var(--muted)}
  .head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .head .hi{font-size:15px;font-weight:600}
  .head .sub{font-size:12px;color:var(--muted)}
  svg.ic{display:block}
  .hero{background:var(--ink);color:#fff;border-radius:24px;padding:22px 20px}
  .hero .label{font-size:13px;color:#a9adb6}
  .hero .big{font-size:30px;font-weight:800;letter-spacing:-.6px;margin:6px 0 4px}
  .hero .big .cur{font-size:18px;color:#a9adb6;font-weight:700;margin-left:4px}
  .hero .sub{font-size:13px;color:#c7cad1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .card{background:var(--card);border-radius:18px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)}
  .card .v{font-size:18px;font-weight:800;margin-top:4px;letter-spacing:-.3px}
  .v .cur{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  h2{font-size:13px;font-weight:700;margin:20px 4px 9px;letter-spacing:.1px}
  .ccards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .catcard{background:var(--card);border-radius:16px;padding:11px 12px}
  .catcard .cc-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .catcard .cc-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .catcard .cc-ic{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
  .catcard .cc-a{font-size:15px;font-weight:800;letter-spacing:-.3px}
  .catcard .cc-p{font-size:12px;font-weight:700;color:var(--muted);flex:none}
  .catcard .cc-n{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chartcard{background:var(--card);border-radius:18px;padding:16px 14px 10px}
  .catlist{background:var(--card);border-radius:18px;padding:6px 16px}
  .cat{padding:12px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .top{display:flex;align-items:center;gap:11px}
  .cdot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .cat .nm{flex:1;font-size:14px}
  .cat .am{font-size:14px;font-weight:700}
  .track{height:6px;border-radius:6px;background:var(--line);margin-top:9px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:6px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px}
  .sq{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .t2{font-size:12px;color:var(--muted);margin-top:2px}
  .amt{font-size:15px;font-weight:700;white-space:nowrap}
  .amt.exp{color:var(--text)} .amt.inc{color:var(--green)}
  .row.rev{box-shadow:inset 3px 0 0 #ff8a3d}
  .cbx{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;background:#fff}
  .cbx.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .fab{position:fixed;left:50%;bottom:calc(80px + var(--safe-bottom));transform:translateX(-50%);background:var(--ink);color:#fff;border:none;border-radius:14px;padding:12px 18px;font-size:14px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.22);cursor:pointer;z-index:55;display:flex;align-items:center;gap:8px}
  .num{width:118px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;font-weight:700;text-align:right;padding:9px 11px}
  .num:focus{border-color:var(--ink);outline:none}
  .inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;padding:11px 12px}
  .inp:focus{border-color:var(--ink);outline:none}
  .goal{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .goal .gn{font-size:15px;font-weight:700}
  .goal .gv{font-size:13px;color:var(--muted)}
  .goal .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;flex:none}
  .btn.full{width:100%}
  .chip{background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:none}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip-sm{background:var(--bg);color:var(--muted);border:none;border-radius:10px;
    padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;flex:none}
  .chip-sm.on{background:var(--ink);color:#fff}
  .catpick{display:flex;align-items:center;gap:8px;background:var(--bg);border:none;
    border-radius:14px;padding:12px 13px;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left;line-height:1.2}
  .catpick svg{flex:none}
  .iconbtn{background:var(--bg);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:var(--text)}
  .empty{color:var(--muted);text-align:center;padding:30px 16px;font-size:14px;line-height:1.5}
  .empty .ttl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
  .loader{text-align:center;color:var(--muted);padding:70px 0}
  .err{color:var(--red);text-align:center;padding:40px 16px}
  .nav{position:fixed;left:50%;bottom:calc(14px + var(--safe-bottom));transform:translateX(-50%);display:flex;gap:2px;
    background:var(--ink);border-radius:20px;padding:5px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
  .nav button{background:none;border:none;color:#9a9ea8;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 9px;border-radius:14px;cursor:pointer}
  .nav button.active{background:#2c2e35;color:#fff}
  .nav button .lbl{display:block;font-size:9.5px;font-weight:500;line-height:1;letter-spacing:.1px}
  .filt{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none}
  .filt::-webkit-scrollbar{display:none}
  .dayh{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin:16px 4px 8px}
  select.inp{appearance:none;-webkit-appearance:none;padding-right:34px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b909a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6l6 -6'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .srch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;padding:0 12px}
  .srch:focus-within{border-color:var(--ink)}
  .srch input{flex:1;background:none;border:none;padding:11px 0;font-size:15px;color:var(--text);outline:none}
  .srch svg{color:var(--muted);flex:none}
  .toast{position:fixed;left:50%;bottom:calc(84px + var(--safe-bottom));transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:50}
  .sheet{background:var(--card);width:100%;border-radius:24px 24px 0 0;padding:18px 16px calc(30px + var(--safe-bottom));max-height:calc(82vh - var(--safe-top));overflow:auto}
  .sheeth{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .drow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:none}
  .catchip{background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:5px}
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  /* Settings navigation rows (iOS-style list) */
  .setlist{display:flex;flex-direction:column;gap:4px}
  .setrow{display:flex;align-items:center;gap:12px;background:var(--card);border:none;border-radius:14px;padding:11px 12px;cursor:pointer;width:100%;text-align:left;color:var(--text)}
  .setrow:active{background:var(--bg)}
  .setrow .icbox{width:30px;height:30px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex:none;color:var(--ink)}
  .setrow .mid{flex:1;min-width:0}
  .setrow .ttl{font-size:14px;font-weight:600;line-height:1.25}
  .setrow .sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .setrow .chev{color:#bdbfc7;flex:none}
  .sethint{font-size:11px;color:var(--muted);line-height:1.4;margin:6px 4px 12px}
  .sec-head{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:14px 16px 8px}
  /* плавная смена табов */
  [id^="v-"]{animation:fadein .18s ease-out}
  @keyframes fadein{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes slideInL{from{opacity:.3;transform:translateX(26px)}to{opacity:1;transform:none}}
  @keyframes slideInR{from{opacity:.3;transform:translateX(-26px)}to{opacity:1;transform:none}}
  details.whatif summary::-webkit-details-marker{display:none}
  details.whatif[open] summary svg:last-child{transform:rotate(180deg)}
  details.whatif summary svg:last-child{transition:transform .2s}
  /* skeleton-loader */
  .skel{background:linear-gradient(90deg,var(--line) 0%,#f7f8fa 50%,var(--line) 100%);
    background-size:200% 100%;animation:shimmer 1.4s linear infinite;border-radius:8px}
  html.dark .skel{background:linear-gradient(90deg,#2c2e35 0%,#3a3d45 50%,#2c2e35 100%);background-size:200% 100%}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-hero{height:106px;border-radius:24px;margin-bottom:12px}
  .skel-card{height:70px;border-radius:18px}
  .skel-row{height:56px;border-radius:16px;margin-bottom:8px}
  .skel-h2{height:14px;width:40%;margin:22px 4px 14px}
  /* глобальный FAB «+» — quick add */
  .fab-add{position:fixed;right:calc(18px + var(--safe-right));bottom:calc(84px + var(--safe-bottom));width:54px;height:54px;border-radius:18px;border:none;
    background:var(--ink);color:#fff;box-shadow:0 12px 26px rgba(0,0,0,.25);cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:45;transition:transform .22s ease, opacity .22s ease}
  .fab-add:active{transform:scale(.92)}
  .fab-add.away{transform:translateY(110px);opacity:0;pointer-events:none}
  html.dark .fab-add{background:#3a3d45}
  /* heatmap — фиксированные 11px квадратики, прижаты к правому краю; старые недели обрезаются слева */
  .heat-wrap{display:flex;flex-direction:row-reverse;overflow:hidden;margin:0 -2px}
  .heat{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px;padding:4px 2px;flex:0 0 auto}
  .heat-cell{width:11px;height:11px;border-radius:3px;background:var(--line)}
  .heat-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:10px;justify-content:flex-end}
  .heat-leg-sq{width:10px;height:10px;border-radius:3px}
  .heat-cell.tipped{outline:2px solid var(--ink);outline-offset:1px}
  /* Тултипы (десктоп-курсор) и интерактивные элементы графиков */
  #_tip{position:fixed;background:rgba(20,21,26,.96);color:#fff;padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.4;pointer-events:none;z-index:90;box-shadow:0 8px 28px rgba(0,0,0,.25);opacity:0;transition:opacity .12s;max-width:260px}
  html.dark #_tip{background:rgba(58,61,69,.96)}
  #_tip.show{opacity:1}
  [data-drill]{cursor:pointer}
  [data-tip]{cursor:default}
</style>
</head>
<body>
  <div id="v-dashboard"></div>
  <div id="v-ops" style="display:none"></div>
  <div id="v-analytics" style="display:none"></div>
  <div id="v-income" style="display:none"></div>
  <div id="v-capital" style="display:none"></div>
  <div id="v-goals" style="display:none"></div>
  <div class="nav">
    <button id="t-dashboard" class="active" onclick="tab('dashboard')"></button>
    <button id="t-ops" onclick="tab('ops')"></button>
    <button id="t-analytics" onclick="tab('analytics')"></button>
    <button id="t-income" onclick="tab('income')"></button>
    <button id="t-capital" onclick="tab('capital')"></button>
    <button id="t-goals" onclick="tab('goals')"></button>
  </div>
  <div class="toast" id="toast"></div>
  <button id="fab-add" class="fab-add" onclick="openTxForm()" title="Добавить операцию"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
  <div id="ov" class="ov" style="display:none" onclick="if(event.target.id==='ov')closeOv()"><div id="sheet" class="sheet"></div></div>
<script>
const tg = window.Telegram?.WebApp;
// Тема: 'auto' (по Telegram), 'light', 'dark'. По умолчанию — светлая.
let _themePref = localStorage.getItem('money.theme') || 'light';
function applyTheme(){
  const dark = _themePref==='dark' || (_themePref==='auto' && tg?.colorScheme==='dark');
  document.documentElement.classList.toggle('dark', dark);
  const bg = dark?'#15161a':'#f3f4f6';
  try{ tg?.setHeaderColor?.(bg); tg?.setBackgroundColor?.(bg); }catch(e){}
}
applyTheme();
try{ tg?.ready(); tg?.expand(); }catch(e){}

// ===== Safe area: в fullscreen (иконка на раб. столе) Telegram рисует свои
// кнопки поверх верха. Отступаем на device safe area + content safe area. =====
function applySafeArea(){
  try{
    const sa = tg?.safeAreaInset || {};
    const csa = tg?.contentSafeAreaInset || {};
    const r = document.documentElement.style;
    r.setProperty('--safe-top', ((sa.top||0)+(csa.top||0))+'px');
    r.setProperty('--safe-bottom', ((sa.bottom||0)+(csa.bottom||0))+'px');
    r.setProperty('--safe-left', ((sa.left||0)+(csa.left||0))+'px');
    r.setProperty('--safe-right', ((sa.right||0)+(csa.right||0))+'px');
  }catch(e){}
}
applySafeArea();
try{
  tg?.onEvent('safeAreaChanged', applySafeArea);
  tg?.onEvent('contentSafeAreaChanged', applySafeArea);
  tg?.onEvent('fullscreenChanged', applySafeArea);
  tg?.onEvent('viewportChanged', applySafeArea);
}catch(e){}

// ===== Семья: настраиваемый список владельцев счетов/доходов =====
let _family=[{key:'me',name:'Я',core:true},{key:'wife',name:'Жена',core:true}];
let _familyLoaded=false;
async function loadFamily(){
  try{
    const r=await api('/api/kv/family_members');
    if(r.value){ const p=JSON.parse(r.value); if(Array.isArray(p)&&p.length) _family=p; }
  }catch(e){}
  _familyLoaded=true;
}
async function saveFamily(){
  try{ await api('/api/kv/family_members',{method:'POST',body:JSON.stringify({value:JSON.stringify(_family)})}); }catch(e){}
}
function ownerLabel(key){ const m=_family.find(f=>f.key===key); return m?m.name:(key||'я').toLowerCase(); }
function familyChips(selected,setFnName){
  return _family.map(f=>`<button class="chip${selected===f.key?' on':''}" onclick="${setFnName}('${f.key}')">${f.name}</button>`).join('');
}
function _familyNewKey(){
  let i=1; while(_family.some(f=>f.key==='m'+i)) i++; return 'm'+i;
}
loadFamily(); // fire-and-forget на старте
try{ tg?.onEvent?.('themeChanged', ()=>{ if(_themePref==='auto'){ applyTheme(); refreshActive(); } }); }catch(e){}
// TG CloudStorage: тема между устройствами одного аккаунта (на клиентах 6.9+).
try{ tg?.CloudStorage?.getItem?.('theme',(_,v)=>{ if(v && v!==_themePref){ _themePref=v; localStorage.setItem('money.theme',v); applyTheme(); }}); }catch(e){}
function setTheme(p){
  _themePref=p; localStorage.setItem('money.theme',p); applyTheme(); refreshActive();
  try{ tg?.CloudStorage?.setItem?.('theme',p); }catch(e){}
}
function tap(s){ try{ tg?.HapticFeedback?.impactOccurred?.(s||'light'); }catch(e){} }
const fmt = n => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n||0));
const fmtK = n => { n=Math.round(n||0); return n>=1000 ? (Math.round(n/100)/10+'к').replace('.',',') : ''+n; };
const CUR='₽';
function plural(n,one,few,many){ n=Math.abs(n)%100; const k=n%10; if(n>10&&n<20)return many; if(k>1&&k<5)return few; if(k===1)return one; return many; }
function dBadge(cur,prev,goodDown){ if(prev==null||prev===0)return ''; const diff=cur-prev; if(!diff)return ''; const pct=Math.round(diff/prev*100),up=diff>0,good=goodDown?!up:up; return `<span style="font-size:11px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${up?'↑':'↓'}${Math.abs(pct)}%</span>`; }
function dBadgeAbs(delta,goodDown){ if(delta==null||!delta)return ''; const up=delta>0,good=goodDown?!up:up; return `<span style="font-size:11px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${up?'↑':'↓'} ${fmt(Math.abs(delta))} ₽</span>`; }
let _cats=[], _cands=[], _pickKind=null, _pickId=null, _debtDir='owed_to_me', _recPer='monthly', _incPer='monthly', _incOwner='me', _incCats=[], _detail=null, _anPeriod='month', _capPeriod='day', _bud=[], _txf=null, _accs=[], _accEdit=null, _accOwner='me', _accType='card', _accCur='RUB', _accCompound=true, _depSrcId=0, _depCur='RUB', _opsFiltOpen=false, _deps=[], _depEdit=null, _depOwner='me', _depCap=true,

function spark(arr, w=64, h=18, col){
  const a=(arr||[]).map(Number); if(a.length<2) return '';
  const max=Math.max(...a), min=Math.min(...a), rng=(max-min)||1;
  const c=col||'var(--muted)';
  const pts=a.map((v,i)=>`${(i*w/(a.length-1)).toFixed(1)},${(h-2-(v-min)/rng*(h-4)).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:inline-block;vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

let _tipEl;
function tipShow(x,y,html){
  if(!_tipEl){ _tipEl=document.createElement('div'); _tipEl.id='_tip'; document.body.appendChild(_tipEl); }
  _tipEl.innerHTML=html; _tipEl.classList.add('show');
  const w=_tipEl.offsetWidth,h=_tipEl.offsetHeight;
  let nx=x+14,ny=y-h-10;
  if(nx+w>innerWidth-8) nx=x-w-14;
  if(ny<8) ny=y+18;
  if(nx<8) nx=8;

}

function lineHover(svg,evt){
  const raw=svg.getAttribute('data-line'); if(!raw) return;
  let pts; try{ pts=JSON.parse(raw); }catch(e){ return; }

  const px=(evt.clientX-rect.left)/rect.width*vbW;
  let best=0,bd=Infinity;
  for(let i=0;i<pts.length;i++){ const d=Math.abs(pts[i][0]-px); if(d<bd){bd=d;best=i;} }
  const [sx,sy,date,val]=pts[best];
  const cx=svg.querySelector('.cx'); if(cx){ cx.setAttribute('x1',sx); cx.setAttribute('x2',sx); cx.setAttribute('opacity','.55'); }
  const dot=svg.querySelector('.cx-dot'); if(dot){ dot.setAttribute('cx',sx); dot.setAttribute('cy',sy); dot.setAttribute('opacity','1'); }
  const fmtType=svg.getAttribute('data-line-fmt')||'rub';
  const fmtVal=v=>fmtType==='rate'?`${v.toFixed(2)} ₽`:`${fmt(v)} ₽`;
  const valStr=fmtVal(val);
  const dt=new Date(date);
  const dateStr=dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'});

  // опциональная вторая линия (факт) — те же индексы
  let factHtml='';
  const rawF=svg.getAttribute('data-line-fact');
  if(rawF){
    try{
      const ptsF=JSON.parse(rawF);
      if(ptsF[best]){
        const [fx,fy,,fv]=ptsF[best];
        const dotF=svg.querySelector('.cx-dot-fact');
        if(dotF){ dotF.setAttribute('cx',fx); dotF.setAttribute('cy',fy); dotF.setAttribute('opacity','1'); }
        const delta=val-fv;
        const deltaCol=delta>0?'#ff8a3d':delta<0?'#18c171':'#a9adb6';
        const sign=delta>0?'−':delta<0?'+':'';
        factHtml=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:4px;font-size:11.5px">
          <span style="color:#a9adb6;font-weight:600">факт</span>
          <span style="color:#cdd1d8;font-weight:700">${fmtVal(fv)}</span></div>
          ${Math.abs(delta)>1?`<div style="margin-top:3px;font-size:10.5px;color:${deltaCol};text-align:right">${sign}${fmt(Math.abs(delta))} ₽ к плану</div>`:''}`;
      }
    }catch(e){}
  }
  const planLabel=rawF?`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:2px;font-size:11.5px">
    <span style="color:#a9adb6;font-weight:600">план</span>
    <span style="font-weight:800">${valStr}</span></div>`
    :`<div style="font-size:14px;font-weight:800;margin-top:2px">${valStr}</div>`;
  tipShow(evt.clientX,evt.clientY,`<div style="color:#a9adb6;font-size:11px">${dateStr}</div>${planLabel}${factHtml}`);
}

// Heatmap: грид 7×N недель + цветовая шкала по интенсивности.
function hmap(data, opts){
  const pts=(data&&data.points)||[]; if(!pts.length) return '';
  const map=Object.fromEntries(pts.map(p=>[p.date,p.spent]));
  const mx=Math.max(1,...pts.map(p=>p.spent));
  const days=(opts&&opts.days)||365, today=new Date();
  // выровняем end на воскресенье (последняя колонка), считаем недели назад
  const end=new Date(today); end.setHours(0,0,0,0);
  const start=new Date(end); start.setDate(end.getDate()-(days-1));
  // двигаем start на ближайший понедельник назад чтобы было ровно 7 строк
  const dow0=(start.getDay()+6)%7;  // пн=0
  start.setDate(start.getDate()-dow0);
  const accent=(opts&&opts.color)||'#ff4d54';
  // вычислим цвет в 5 ступеней
  const level=v=>v<=0?0:v<mx*0.15?1:v<mx*0.35?2:v<mx*0.65?3:4;
  const op=l=>l===0?0:[0,.15,.35,.6,1][l];
  const cells=[];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const key=_ymdLocal(d), v=map[key]||0, l=level(v);
    const dateStr=new Date(key).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'2-digit'});
    const tip=v>0
      ? `<div style="color:#a9adb6;font-size:11px">${dateStr}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${fmt(v)} ₽</div><div style="color:#a9adb6;font-size:10px;margin-top:3px">тап → операции дня</div>`
      : `<div style="color:#a9adb6;font-size:11px">${dateStr}</div><div style="margin-top:2px">трат не было</div>`;
    const drill=v>0?` data-drill="day:${key}"`:'';
    cells.push(`<div class="heat-cell" data-tip='${tip.replace(/'/g,"&#39;")}'${drill} style="${l>0?`background:${accent};opacity:${op(l)}`:''}"></div>`);
  }
  const total=pts.reduce((s,p)=>s+p.spent,0);
  const monthsAgo=Math.round((days/30)*10)/10;
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span class="k">Календарь трат · ${monthsAgo} мес</span>
      <span style="font-size:12px;color:var(--muted)">всего ${fmt(total)} ₽</span></div>
    <div class="heat-wrap"><div class="heat">${cells.join('')}</div></div>
    <div class="heat-leg"><span>меньше</span>${[0,1,2,3,4].map(l=>`<span class="heat-leg-sq" style="${l>0?`background:${accent};opacity:${op(l)}`:'background:var(--line)'}"></span>`).join('')}<span>больше</span></div></div>`;
}

// Кэш GET-ответов на время сессии (данные не риалтайм). Сбрасывается событийно:
// при любой мутации (POST/DELETE) и при возврате фокуса, если /api/version изменился.
const _apiCache=new Map();      // path -> data
const _apiInflight=new Map();   // path -> Promise (дедуп параллельных одинаковых GET)
function _clone(d){ try{ return structuredClone(d); }catch(e){ try{ return JSON.parse(JSON.stringify(d)); }catch(_){ return d; } } }
function invalidateAll(){
  _apiCache.clear(); _apiInflight.clear();
  try{ TABS.forEach(t=>{ const el=document.getElementById('v-'+t); if(el) delete el.dataset.loaded; }); }catch(e){}
}
async function api(path, opts){
  const o=opts||{}; const method=(o.method||'GET').toUpperCase();
  o.headers=Object.assign({'X-Telegram-Init-Data':tg?.initData||'','Content-Type':'application/json'},o.headers||{});
  if(method==='GET'){
    if(_apiCache.has(path)) return _clone(_apiCache.get(path));          // мгновенно из кэша
    if(_apiInflight.has(path)) return _apiInflight.get(path).then(_clone); // дедуп
    const p=fetch(path,o).then(r=>{
      if(r.status===401||r.status===403) throw new Error('AUTH');
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(d=>{ _apiCache.set(path,d); _apiInflight.delete(path); return d; })
      .catch(e=>{ _apiInflight.delete(path); throw e; });
    _apiInflight.set(path,p);
    return p.then(_clone);
  }
  // не-GET: выполнить и сбросить кэш (данные могли измениться).
  // Исключение — /api/ai/ask: это POST, но он ничего не меняет в данных.
  const r=await fetch(path,o);
  if(r.status===401||r.status===403) throw new Error('AUTH');
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json().catch(()=>({}));
  if(!path.startsWith('/api/ai/')) invalidateAll();
  return d;
}

// ===== Свайп между вкладками (горизонтальный) =====
let _swipe=null;
function _inHScroller(el){
  // не листаем, если жест начался на горизонтально-скроллируемом/интерактивном элементе
  for(let n=el; n && n!==document.body && n!==document.documentElement; n=n.parentElement){
    if(!n.classList) continue;
    if(n.classList.contains('filt')||n.classList.contains('heat-wrap')||n.classList.contains('heat')) return true;
    if(n.tagName==='svg' && n.hasAttribute('data-line')) return true;        // графики с тултипом
    if(n.tagName==='INPUT'||n.tagName==='SELECT'||n.tagName==='TEXTAREA') return true;
    try{ const st=getComputedStyle(n);
      if((st.overflowX==='auto'||st.overflowX==='scroll') && n.scrollWidth>n.clientWidth+4) return true;
    }catch(e){}
  }
  return false;
}
function swipeTab(t,dir){
  tab(t);
  const el=document.getElementById('v-'+t);
  if(el){ el.style.animation='none'; el.offsetHeight;
    el.style.animation=(dir==='left'?'slideInL':'slideInR')+' .22s ease'; }
}
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1){ _swipe=null; return; }
  const ov=document.getElementById('ov');
  if(ov && getComputedStyle(ov).display!=='none'){ _swipe=null; return; }   // открыта шторка
  if(_inHScroller(e.target)){ _swipe=null; return; }
  const t=e.touches[0];
  _swipe={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!_swipe) return; const s=_swipe; _swipe=null;
  const t=e.changedTouches[0];
  const dx=t.clientX-s.x, dy=t.clientY-s.y, dt=Date.now()-s.t;
  if(dt>700) return;                            // слишком медленно — не свайп
  if(Math.abs(dx)<60) return;                   // слишком короткий
  if(Math.abs(dx)<Math.abs(dy)*1.7) return;     // вертикальная составляющая велика
  const i=TABS.indexOf(_tab);
  if(dx<0 && i<TABS.length-1) swipeTab(TABS[i+1],'left');
  else if(dx>0 && i>0) swipeTab(TABS[i-1],'right');
},{passive:true});

  const keys=[{k:'rub',c:'#3b82f6',label:'Рубли'},{k:'deposits',c:'#18c171',label:'Вклады'},{k:'usd',c:'#ff8a3d',label:'Крипта/USD'}];

  const tot=p=>keys.reduce((s,kk)=>s+Math.max(0,p.breakdown[kk.k]||0),0);
  const maxV=Math.max(1,...pts.map(tot));
  const X=i=>padL+i*(w-padL-padR)/(pts.length-1);
  const Y=v=>padT+(1-v/maxV)*(h-padT-padB);
  let svg=''; const cum=pts.map(()=>0);
  keys.forEach(kk=>{
    const layer=pts.map((p,i)=>{const base=cum[i]; const val=Math.max(0,p.breakdown[kk.k]||0); cum[i]=base+val; return [X(i),Y(cum[i]),Y(base)];});
    const up=layer.map(t=>`${t[0].toFixed(1)},${t[1].toFixed(1)}`).join(' ');
    const down=layer.slice().reverse().map(t=>`${t[0].toFixed(1)},${t[2].toFixed(1)}`).join(' ');
    svg+=`<polygon points="${up} ${down}" fill="${kk.c}" opacity=".85"/>`;
  });
  svg+=`<text x="${padL}" y="${h-5}" font-size="10" fill="#8b909a">${new Date(pts[0].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  svg+=`<text x="${w-padR}" y="${h-5}" text-anchor="end" font-size="10" fill="#8b909a">${new Date(pts[pts.length-1].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  const legend=keys.map(kk=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><span style="width:9px;height:9px;border-radius:2px;background:${kk.c}"></span>${kk.label}</span>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${svg}</svg>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:6px;flex-wrap:wrap">${legend}</div>`;
}
// Норма сбережений по месяцам: бары (% отложено) + пунктир средней
function savingsRateChart(sv){
  const pts=sv.points||[]; if(pts.filter(p=>p.rate!=null).length<2) return '';
  const w=330,h=140,padT=16,padB=22,padL=6,padR=6;
  const rs=pts.map(p=>p.rate==null?0:p.rate);
  const maxR=Math.max(40,...rs), minR=Math.min(0,...rs), rng=(maxR-minR)||1;
  const n=pts.length, gap=4, bw=(w-padL-padR-gap*(n-1))/n;
  const Y=v=>padT+(1-(v-minR)/rng)*(h-padT-padB);
  const zeroY=Y(0);
  let s='';
  pts.forEach((p,i)=>{
    const x=padL+i*(bw+gap), mLbl=_monShort(p.ym);
    if(p.rate==null){ s+=`<rect x="${x.toFixed(1)}" y="${(zeroY-1).toFixed(1)}" width="${bw.toFixed(1)}" height="2" fill="var(--line)"/>`;
      s+=`<text x="${(x+bw/2).toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="9" fill="#8b909a">${mLbl}</text>`; return; }
    const y=Y(p.rate), top=p.rate>=0?y:zeroY, barH=Math.max(2,Math.abs(zeroY-y));
    const col=p.rate>=30?'#18c171':p.rate>=10?'var(--ink)':p.rate>=0?'#ff8a3d':'var(--red)';
    const tip=`<div style="color:#a9adb6;font-size:11px">${mLbl}</div><div style="font-size:14px;font-weight:800;margin-top:2px">${p.rate}% отложено</div><div style="color:#a9adb6;font-size:11px;margin-top:2px">+${fmt(p.income)} − ${fmt(p.expense)} = ${p.saved>=0?'+':'−'}${fmt(Math.abs(p.saved))} ₽</div>`;
    s+=`<rect x="${x.toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${barH.toFixed(1)}" rx="3" fill="${col}" data-tip='${tip.replace(/'/g,"&#39;")}'/>`;
    s+=`<text x="${(x+bw/2).toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="9" fill="#8b909a">${mLbl}</text>`;
  });
  const avgY=Y(sv.avg||0);
  s+=`<line x1="${padL}" y1="${avgY.toFixed(1)}" x2="${w-padR}" y2="${avgY.toFixed(1)}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 3" opacity=".55"/>`;
  s+=`<text x="${w-padR-2}" y="${(avgY-3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--muted)" font-weight="700">среднее ${sv.avg}%</text>`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}
function rateChartCard(fxh, label){
  const pts=(fxh&&fxh.points)||[]; if(pts.length<2) return '';
  const vals=pts.map(p=>p.rate), min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
  const first=vals[0], last=vals[vals.length-1], dPct=((last-first)/first*100);
  const dColor=dPct>=0?'var(--red)':'var(--green)';   // дороже $ = слабее ₽
  const w=330, h=72, pad=6, top=4, base=h-16;
  const X=i=>pad+i*(w-2*pad)/(pts.length-1), Y=v=>top+(1-(v-min)/rng)*(base-top);
  const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.rate).toFixed(1)}`).join(' ');
  const area=`${line} ${X(pts.length-1).toFixed(1)},${base.toFixed(1)} ${pad},${base.toFixed(1)}`;
  const d0=new Date(pts[0].date).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'});
  const d1=new Date(pts[pts.length-1].date).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'});
  return `<div class="card" style="margin-top:8px;padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:6px">
      <span class="k">${label||'Курс USD/RUB · ЦБ'}</span>
      <span style="font-size:18px;font-weight:800;letter-spacing:-.3px">${last.toFixed(2)} ₽</span></div>
    <div style="font-size:11px;color:var(--muted);margin:2px 0 4px">
      <span style="color:${dColor};font-weight:700">${dPct>=0?'↑ +':'↓ −'}${Math.abs(dPct).toFixed(1)}%</span>
      <span> за год · мин ${min.toFixed(2)} · макс ${max.toFixed(2)}</span></div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block" data-line='${JSON.stringify(pts.map((p,i)=>[+X(i).toFixed(1),+Y(p.rate).toFixed(1),p.date,p.rate])).replace(/'/g,"&#39;")}' data-line-fmt="rate">
      <polygon points="${area}" fill="var(--ink)" opacity="0.08"/>
      <polyline points="${line}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${X(pts.length-1)}" cy="${Y(last)}" r="3" fill="var(--ink)"/>
      <line class="cx" x1="0" y1="${top}" x2="0" y2="${base}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
      <circle class="cx-dot" r="4" fill="var(--ink)" opacity="0"/>
      <text x="${pad}" y="${h-3}" font-size="10" fill="#8b909a">${d0}</text>
      <text x="${w-pad}" y="${h-3}" text-anchor="end" font-size="10" fill="#8b909a">${d1}</text>
    </svg></div>`;
}

// ===== FIRE-toolkit (РФ-параметры) =====
function _fmtBig(n){
  n=Math.round(n||0); const a=Math.abs(n);
  if(a>=1_000_000) return (n/1_000_000).toFixed(a>=10_000_000?0:1).replace('.',',')+' млн';
  if(a>=1000) return Math.round(n/1000)+' тыс';
  return fmt(n);
}
// Русское склонение: forms=[«год», «года», «лет»] и т.п.
function _plural(n, forms){
  const x=Math.abs(n);
  if(x!==Math.floor(x)) return forms[1];   // дробное → genitive sg («2,5 года»)
  const n0=Math.round(x), r100=n0%100, r10=n0%10;
  if(r100>=11 && r100<=14) return forms[2];
  if(r10===1) return forms[0];
  if(r10>=2 && r10<=4) return forms[1];
  return forms[2];
}
// Округление в том же виде, в каком число будет показано (для корректного склонения)
function _yrShown(v){ return v>=10 ? Math.round(v) : Math.round(v*10)/10; }
function _yrText(v){
  if(v==null) return '—';
  if(v===0) return '0';
  if(v>=10) return String(Math.round(v));
  return v.toFixed(1).replace('.0','').replace('.',',');
}

// What-if: пересчёт прогноза на фронте (формула FV аннуитета, помесячно)
function _recalcPoints(cap0, monthly, realPct, years){
  const r_m=realPct/100/12; let cap=cap0; const base=new Date(); const out=[];
  for(let m=0;m<=years*12;m++){
    if(m===0||m%12===0){ const d=new Date(base.getFullYear(), base.getMonth()+m, 1);
      out.push({month:m, year_offset:Math.round(m/12), value:Math.round(cap), date:d.toISOString().slice(0,10)}); }
    cap=cap*(1+r_m)+monthly;
  }
  return out;
}
function whatIf(){
  const fc=window._fc; if(!fc) return;
  const monthly=+(document.getElementById('wi-save')||{}).value||0;
  const nominal=+(document.getElementById('wi-ret')||{}).value||0;
  const real=nominal-(fc.inflation_pct||0);
  const cap0=(fc.points[0]||{}).value||0;
  const fcMod=Object.assign({}, fc);
  fcMod.points=_recalcPoints(cap0, monthly, real, fc.years);
  fcMod.points_fact=_recalcPoints(cap0, monthly, (fc.fact_real_return_pct!=null?fc.fact_real_return_pct:real), fc.years);
  fcMod.real_return_pct=Math.round(real*10)/10;
  fcMod.monthly_savings=monthly;
  const wrap=document.getElementById('fc-wrap'); if(wrap) wrap.innerHTML=forecastChart(fcMod);
  const sl=document.getElementById('wi-save-lbl'); if(sl) sl.textContent=_fmtBig(monthly)+' ₽/мес';
  const rl=document.getElementById('wi-ret-lbl'); if(rl) rl.textContent=nominal+'%';
  const endBase=(fc.points[fc.points.length-1]||{}).value||0;
  const endNew=(fcMod.points[fcMod.points.length-1]||{}).value||0;
  const diff=endNew-endBase;
  const note=document.getElementById('wi-note');
  if(note) note.innerHTML=`Через ${fc.years} ${_plural(fc.years,['год','года','лет'])}: <b>${_fmtBig(endNew)} ₽</b>`+
    (Math.abs(diff)>=1000?` <span style="color:${diff>0?'var(--green)':'var(--red)'};font-weight:700">${diff>0?'+':'−'}${_fmtBig(Math.abs(diff))} к текущему плану</span>`:' <span class="muted">= текущий план</span>');
}

function forecastChart(fc){
  const pts=(fc.points||[]).filter(p=>p.year_offset!==undefined); if(pts.length<2) return '';
  const w=330, h=190, padL=16, padR=14, padT=22, padB=28;
  const vals=pts.map(p=>p.value);
  const factPts=(fc.points_fact||[]).filter(p=>p.year_offset!==undefined);
  const factVals=factPts.map(p=>p.value);
  const ti=fc.fi_targets||{}; const targets=[ti.aggr, ti.base, ti.safe].filter(v=>v>0);
  const maxV=Math.max(...vals, ...factVals, ...targets);
  const minV=Math.min(...vals, ...factVals, 0);
  const rng=(maxV-minV)||1;
  const X=i=>padL+i*(w-padL-padR)/(pts.length-1);
  const Y=v=>padT+(1-(v-minV)/rng)*(h-padT-padB);
  // линия капитала (план)
  const linePts=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
  const areaPts=`${linePts} ${X(pts.length-1).toFixed(1)},${(h-padB).toFixed(1)} ${padL},${(h-padB).toFixed(1)}`;
  // линия по факту (если есть и отличается от плана)
  let factLine='';
  if(factPts.length===pts.length && Math.abs((factVals[factVals.length-1]||0)-(vals[vals.length-1]||0))/Math.max(1,vals[vals.length-1]||1)>0.02){
    const fp=factPts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
    factLine=`<polyline points="${fp}" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-dasharray="5 4" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>`;
  }
  // FI-цели горизонтальными пунктирами; подписи СЛЕВА чтобы не перекрывать растущий график
  const targetLines=[
    {y:ti.base, col:'#18c171', label:'Базовый FI'},
    {y:ti.aggr, col:'#3b82f6', label:'Оптимистичный'},
    {y:ti.safe, col:'#ff4d54', label:'Осторожный'},
  ].filter(t=>t.y>0 && t.y<=maxV*1.1).map(t=>`
    <line x1="${padL}" y1="${Y(t.y).toFixed(1)}" x2="${w-padR}" y2="${Y(t.y).toFixed(1)}" stroke="${t.col}" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>
    <text x="${padL+2}" y="${Y(t.y)-3}" font-size="9.5" fill="${t.col}" text-anchor="start" font-weight="700">${t.label} · ${_fmtBig(t.y)}</text>`).join('');
  // точки пересечения
  const crossings=Object.entries(fc.fi_crossings||{}).filter(([k,v])=>v).map(([k,v])=>{
    const col=k==='base'?'#18c171':k==='aggr'?'#3b82f6':'#ff4d54';
    const px=X(Math.round(v.month/12));
    return `<circle cx="${px.toFixed(1)}" cy="${Y(v.target).toFixed(1)}" r="4" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
  }).join('');
  // ось X: «сейчас» с левым якорем, последний год с правым, промежуточные по середине;
  // через каждые 5 лет, но если последний год не кратен 5 — пропускаем ближайшую соседнюю метку, чтобы не слипалось
  const lastI=pts.length-1, lastYear=pts[lastI].year_offset;
  const xLabels=[];
  for(let i=0;i<pts.length;i++){
    const y=pts[i].year_offset;
    const isEdge = i===0 || i===lastI;
    const isFive = y%5===0 && y>0;
    if(!(isEdge || isFive)) continue;
    // если регулярная метка слишком близко к последней (lastYear не кратен 5) — пропустим
    if(isFive && !isEdge && lastYear%5!==0 && (lastYear-y)<=2) continue;
    const anchor = i===0 ? 'start' : (i===lastI ? 'end' : 'middle');
    const label = i===0 ? 'сейчас' : '+'+y+'г';
    xLabels.push(`<text x="${X(i).toFixed(1)}" y="${h-8}" font-size="10" fill="#8b909a" text-anchor="${anchor}">${label}</text>`);
  }
  // hover-данные (план)
  const hover=JSON.stringify(pts.map((p,i)=>[+X(i).toFixed(1),+Y(p.value).toFixed(1),p.date,p.value]));
  // hover-данные (факт), если рисуем вторую линию
  const hoverFact = factLine
    ? JSON.stringify(factPts.map((p,i)=>[+X(i).toFixed(1),+Y(p.value).toFixed(1),p.date,p.value])).replace(/'/g,"&#39;")
    : '';
  const factAttr = factLine ? ` data-line-fact='${hoverFact}'` : '';
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block" data-line='${hover.replace(/'/g,"&#39;")}' data-line-fmt="rub"${factAttr}>
    <polygon points="${areaPts}" fill="var(--ink)" opacity=".07"/>
    ${targetLines}
    ${factLine}
    <polyline points="${linePts}" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${crossings}
    <line class="cx" x1="0" y1="${padT}" x2="0" y2="${h-padB}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
    <circle class="cx-dot" r="4" fill="var(--ink)" opacity="0"/>
    ${factLine?`<circle class="cx-dot-fact" r="3.5" fill="var(--muted)" stroke="#fff" stroke-width="1" opacity="0"/>`:''}
    ${xLabels.join('')}
  </svg>
  ${factLine?`<div style="display:flex;gap:14px;justify-content:center;margin-top:2px;font-size:10.5px;color:var(--muted);flex-wrap:wrap">
    <span><b style="color:var(--text);font-weight:700">―</b> план ${fc.real_return_pct>=0?'+':''}${fc.real_return_pct}% real</span>
    <span style="opacity:.85"><b style="color:var(--muted);font-weight:700">‒‒</b> факт ${fc.fact_real_return_pct>=0?'+':''}${fc.fact_real_return_pct}% real</span></div>`:''}
  <div style="display:flex;gap:14px;justify-content:center;margin-top:4px;font-size:11px;color:var(--muted);flex-wrap:wrap">
    <span>откладываю ${_fmtBig(fc.monthly_savings)} ₽/мес</span>·<span>работает ${fc.portfolio_working_share_pct||0}% капитала</span></div>`;
}

function ruPensionAge(birthYear,gender){
  // упрощённо: после реформы 2018, переходный период 2019-2028
  const g=(gender||'m').toLowerCase();
  if(g==='f'){
    if(birthYear>=1968) return 60;
    if(birthYear===1967) return 59;
    if(birthYear===1966) return 58;
    if(birthYear===1965) return 57;
    if(birthYear===1964) return 56;
    return 55;
  }
  if(birthYear>=1963) return 65;
  if(birthYear===1962) return 64;
  if(birthYear===1961) return 63;
  if(birthYear===1960) return 62;
  if(birthYear===1959) return 61;
  return 60;
}

function _recPreview(current){
  const el=document.getElementById('ac-rec-diff'); const inp=document.getElementById('ac-rec'); if(!el||!inp) return;
  if(inp.value===''){ el.innerHTML=''; return; }
  const actual=parseFloat(inp.value)||0; const diff=Math.round((actual-current)*100)/100;
  if(Math.abs(diff)<0.01){ el.innerHTML='<span style="color:var(--green)">Совпадает — расхождения нет</span>'; return; }
  const sign=diff>0?'+':'−'; const col=diff>0?'var(--green)':'var(--red)';
  const kind=diff>0?'не учтён доход':'не учтены траты';
  el.innerHTML=`Расхождение <b style="color:${col}">${sign}${fmt(Math.abs(diff))} ${_accCur}</b> · запишется как «Корректировка» (${kind})`;
}

async function saveDep(){
  const b=document.getElementById('dp-b').value.trim(); if(!b){toast('Название');return;}
  const principal=parseFloat(document.getElementById('dp-p').value)||0;
  const body={bank:b, principal, rate:parseFloat(document.getElementById('dp-r').value)||0, monthly_topup:parseFloat(document.getElementById('dp-t').value)||0, capitalization:_depCap, owner:_depOwner, term_start:document.getElementById('dp-s').value||null, term_end:document.getElementById('dp-e').value||null};
  if(!_depEdit){
    const srcSel=document.getElementById('dp-src'); const srcId=srcSel?parseInt(srcSel.value,10):0;
    if(principal>0 && !srcId){ toast('Выбери счёт-источник'); return; }
    if(srcId){
      body.source_account_id=srcId;
      const cur=srcSel.options[srcSel.selectedIndex].getAttribute('data-cur')||'RUB';
      body.currency=cur;
      const src=(_accs||[]).find(a=>a.id===srcId);
      if(src && principal>(src.balance||0)+0.001){
        if(!confirm(`На счёте «${src.name}» только ${fmt(src.balance)} ${cur}. Списать всё равно?`)) return;
      }
    }
  }
  try{ if(_depEdit) await api('/api/deposits/'+_depEdit,{method:'POST',body:JSON.stringify(body)}); else await api('/api/deposits',{method:'POST',body:JSON.stringify(body)}); toast('Сохранено'); closeOv(); loadCapital(); }catch(e){ toast('Ошибка'); }
}

  // Для «месяц» — только число; для «год» — число + месяц.
  if(per==='monthly'){
    return `<div style="flex:1"><div class="t2" style="margin:0 0 4px 2px;color:var(--muted)">Число месяца (необяз.)</div>
      <input id="nr-day" class="inp" type="number" inputmode="numeric" min="1" max="31" placeholder="1-31" value="${day||''}"></div>`;
  }
  return `<div style="flex:1"><div class="t2" style="margin:0 0 4px 2px;color:var(--muted)">День (необяз.)</div>
      <input id="nr-day" class="inp" type="number" inputmode="numeric" min="1" max="31" placeholder="1-31" value="${day||''}" style="width:100%"></div>

}
function setPer(p){
  _recPer=p;

  document.getElementById('per-y').className='chip'+(p==='yearly'?' on':'');
  const row=document.getElementById('rec-date-row');
  if(row){
    // сохраняем введённое число чтобы не потерялось при переключении
    const d=document.getElementById('nr-day')?.value; if(d) _recDay=d;

// Считаем next_date из day/month: ближайшее будущее наступление.
function computeNextDate(period,day,month){
  const d=parseInt(day); if(!d||d<1||d>31) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  if(period==='monthly'){
    let n=new Date(today.getFullYear(),today.getMonth(),d);
    if(n<today) n=new Date(today.getFullYear(),today.getMonth()+1,d);
    return _ymdLocal(n);
  }
  const m=(parseInt(month)||today.getMonth()+1)-1;
  let n=new Date(today.getFullYear(),m,d);
  if(n<today) n=new Date(today.getFullYear()+1,m,d);
  return _ymdLocal(n);
}
function _ymdLocal(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
// Российский формат 21.09.2026 — для редактора, чтобы пользователь понимал какую дату ставит.
function fmtDateRu(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`; }

  if(!n||!a){toast('Имя и сумма');return;}
  const next_date=computeNextDate(_recPer,day,month);
  try{ await api('/api/recurring',{method:'POST',body:JSON.stringify({name:n,amount:a,type:'expense',period:_recPer,next_date})}); toast('Добавлено'); _recDay=''; _recMonth=''; loadGoals(); }catch(e){toast('Ошибка');} }

async function saveRec(id){
  const name=document.getElementById('re-n').value.trim();
  const v=parseFloat(document.getElementById('re-a').value);
  const e=_reEdit||{};
  if(!name||!v){toast('Имя и сумма');return;}
  const nd=computeNextDate(e.period,e.day,e.month);
  const body={name, amount:v};
  if(nd) body.next_date=nd; else body.clear_next_date=true;
  try{ await api('/api/recurring/'+id,{method:'POST',body:JSON.stringify(body)}); toast('Сохранено'); closeOv(); loadGoals(); }catch(err){toast('Ошибка');} }
// Time-until-payment с цветами (чёрный >7d, оранжевый ≤7d, красный ≤3d/завтра/сегодня).
function recTimeUntil(x){
  if(!x.next_date) return null;
  const target=new Date(x.next_date+'T00:00:00'); const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((target-today)/86400000);
  if(days<0) return null;  // прошлая дата (auto-advance подтянет бэк)
  let text;
  if(days===0) text='Сегодня';
  else if(days===1) text='Завтра';
  else if(x.period==='yearly' && days>=30){
    const m=Math.floor(days/30), d=days-m*30;
    text=`${m} мес${d>0?' '+d+' дн.':''}`;
  } else text=`${days} дн.`;
  let col='var(--text)';
  if(days<=7) col='#ff8a3d';
  if(days<=3) col='var(--red)';
  return {text, color:col};
}

let _ops={period:'this', type:'', cat:'', q:'', merchant:'', minA:'', maxA:'', review:0, offset:0, items:[], more:false, count:0, se:0, si:0};
function ym(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function opsQS(){
  const p=new URLSearchParams(), now=new Date();
  if(_ops.date){ p.set('date_from',_ops.date); p.set('date_to',_ops.date); }
  else if(_ops.monthKey) p.set('month',_ops.monthKey);
  else if(_ops.period==='this') p.set('month',ym(now));
  else if(_ops.period==='last'){ const d=new Date(now.getFullYear(),now.getMonth()-1,1); p.set('month',ym(d)); }
  if(_ops.type) p.set('type',_ops.type);
  if(_ops.cat) p.set('category_id',_ops.cat);
  if(_ops.q) p.set('q',_ops.q);
  if(_ops.merchant) p.set('merchant',_ops.merchant);
  if(_ops.minA) p.set('min_amount',String(_ops.minA));
  if(_ops.maxA) p.set('max_amount',String(_ops.maxA));
  if(_ops.review) p.set('review','1');
  p.set('limit','50'); p.set('offset',String(_ops.offset));
  return p.toString();
}

function txRow(x){
  const key=x.category||x.merchant||'op', col=color(key);
  const isRefund=x.type==='expense'&&x.amount<0;
  const inn=x.type==='income'||isRefund;
  const ic=isRefund?'swap':x.type==='income'?'wallet':x.type==='transfer'?'swap':catIcon(x.category||x.merchant);
  const tags=[x.category?x.category:null, isRefund?'<span style="color:var(--green);font-weight:700">↩ возврат</span>':null, x.review?'<span style="color:#ff8a3d;font-weight:700">разобрать</span>':null].filter(Boolean).join(' · ');
  const sub=new Date(x.dt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})+(tags?' · '+tags:'');
  const merchEsc=(x.merchant||'').replace(/'/g,'&#39;');
  const merchHtml=x.merchant?`<span onclick="event.stopPropagation();openMerchOps('${merchEsc}')" style="cursor:pointer">${x.merchant}</span>`:(x.type==='income'?'Доход':'Операция');
  if(_opsBulk){
    const on=_opsSel.has(x.id);
    return `<div class="row" onclick="opsToggleSel(${x.id})" style="cursor:pointer">
      <div class="cbx${on?' on':''}">${on?icon('plus',14,'#fff'):''}</div>
      <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
      <div class="mid"><div class="t1">${x.merchant||(x.type==='income'?'Доход':'Операция')}</div><div class="t2">${sub}</div></div>
      <div class="amt ${inn?'inc':'exp'}">${inn?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`;
  }
  return `<div class="row${x.review?' rev':''}" onclick="openTx(${x.id})" style="cursor:pointer">
    <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
    <div class="mid"><div class="t1">${merchHtml}</div>
    <div class="t2">${sub}</div></div>
    <div class="amt ${inn?'inc':'exp'}">${inn?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`;
}
function groupedTx(items){
  let html=''; const g={};
  items.forEach(x=>{ const d=(x.dt||'').slice(0,10); (g[d]=g[d]||[]).push(x); });
  for(const day of Object.keys(g)){
    const arr=g[day];
    const net=arr.reduce((s,x)=> s + (x.type==='income'? (x.base_rub||0) : x.type==='expense'? -(x.base_rub||0) : 0), 0);
    const dt=new Date(day+'T00:00:00');
    html+=`<div class="dayh"><span>${dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span><span>${net>=0?'+':'−'}${fmt(Math.abs(net))} ${CUR}</span></div>`;
    html+=arr.map(txRow).join('');
  }
  return html;
}

function txfType(t){
  _txf.amount=parseFloat(document.getElementById('tf-a').value)||undefined;

let _sugTimer, _sugReq=0;
async function txfSuggest(q){
  q=(q||'').trim();
  const box=document.getElementById('tf-sug'); if(!box) return;
  if(_txf.type!=='expense' || q.length<2){ box.innerHTML=''; return; }
  clearTimeout(_sugTimer);
  _sugTimer=setTimeout(async ()=>{
    const myReq=++_sugReq;
    try{
      const r=await api('/api/suggest/merchants?limit=5&q='+encodeURIComponent(q));
      if(myReq!==_sugReq) return;  // устаревший ответ
      const sugs=r.suggestions||[];
      box.innerHTML=sugs.map(s=>{const col=color(s.category||s.merchant), amt=s.amount?s.amount:'';
        return `<button class="chip" style="display:inline-flex;align-items:center;gap:5px;text-align:left;background:${tint(col)};color:${col};border-color:transparent" onclick='txfApplySug(${JSON.stringify(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;")})'>
          <span style="font-weight:700">${s.merchant}</span>${s.category?` <span style="color:var(--muted);font-weight:500">· ${s.category}</span>`:''}${amt?` <span style="color:var(--muted);font-weight:500">· ~${fmt(amt)} ₽</span>`:''}</button>`;
      }).join('');
    }catch(e){ /* тихо игнорим */ }
  },220);
}
function txfApplySug(s){
  const me=document.getElementById('tf-m'); if(me) me.value=s.merchant;

  tap('light');
}
async function saveTx(){

  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Лимит: ${it.name}</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="t2" style="margin:2px 2px 12px;color:var(--muted)">Потрачено ${fmt(it.spent)} ${CUR} в этом месяце. ${it.manual?'Задан свой лимит.':'Сейчас авто-прогноз ≈ '+fmt(it.budget)+' '+CUR+'.'}</div>
    <div style="display:flex;gap:8px">
      <input id="bud-a" class="inp" type="number" inputmode="decimal" placeholder="Лимит ₽/мес" value="${it.manual?it.budget:''}" style="flex:1">
      <button class="btn" onclick="saveBudget(${it.id})">Сохранить</button></div>
    ${it.manual?`<button class="chip" style="margin-top:10px" onclick="saveBudget(${it.id},0)">Сбросить на авто-прогноз</button>`:''}`;
  document.getElementById('ov').style.display='flex';
}
async function saveBudget(cid,forced){
  const v=forced!==undefined?forced:(parseFloat(document.getElementById('bud-a').value)||0);
  try{ await api('/api/budgets',{method:'POST',body:JSON.stringify({category_id:cid,amount:v})}); toast('Сохранено'); closeOv(); loadAnalytics(); }catch(e){ toast('Ошибка'); }
}

// ---- доходы по источникам ----
async function loadIncome(){
  try{
    const d=await api('/api/income');
    const srcs=d.sources||[], bd=d.breakdown||[], nudges=d.nudges||[];
    const nudgeHtml=nudges.length?`<div class="card" style="margin-top:12px;border:1.5px solid #ffd9a0;background:#fff7ec">
      <div class="k" style="color:#c77700;font-weight:700">Пора продлить</div>
      ${nudges.map(n=>`<div class="t1" style="margin-top:6px">${n.name} <span class="muted" style="font-weight:600">· до ${new Date(n.end_date).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'})}</span></div>`).join('')}</div>`:'';
    const srcHtml=srcs.length?srcs.map(s=>{
      const col=color(s.name), cur=s.currency==='RUB'?'₽':s.currency;
      const per=s.period==='yearly'?'/год':s.period==='weekly'?'/нед':'/мес';
      const hint=(s.currency!=='RUB'||s.period!=='monthly')?' · '+fmt(s.plan)+' ₽/мес':'';
      const right=s.end_date?'до '+new Date(s.end_date).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'}):(s.plan>0&&s.fact>=s.plan?'получено':'ожидается');
      return `<div class="goal">
        <div class="gh" style="align-items:center"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span class="sq" style="background:${tint(col)};color:${col}">${icon('cash',20)}</span>
          <div style="min-width:0"><div class="gn">${s.name}${s.owner&&s.owner!=='me'?' <span class="muted" style="font-size:12px;font-weight:600">· '+ownerLabel(s.owner)+'</span>':''}</div>
            <div class="t2" style="margin-top:2px">${fmt(s.amount)} ${cur}${per}${hint}</div></div></div>
          <div class="gv" style="text-align:right">${fmt(s.fact)} / ${fmt(s.plan)} ₽<div class="t2" style="margin-top:2px">${right}</div></div></div>
        <div class="track" style="margin-top:11px"><i style="width:${s.pct}%;background:${col}"></i></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="chip" onclick="toggleIncome(${s.id},${s.active?0:1})">${s.active?'Выключить':'Включить'}</button>
          <button class="iconbtn" onclick="openIncEdit(${s.id})">${icon('edit',18)}</button>
          <button class="iconbtn" onclick="delIncome(${s.id})">${icon('trash',18)}</button></div></div>`;
    }).join(''):`<div class="empty">Источников дохода пока нет.<br>Добавь зарплату, фриланс, пособия — план дохода сложится сам.</div>`;
    const bdHtml=bd.length?`<div class="card">${hbar(bd.map(b=>({value:b.amount,color:color(b.name),name:b.name})), {title:'Всего за месяц'})}</div>`
      :`<div class="empty">В этом месяце доходов ещё не было.</div>`;
    document.getElementById('v-income').innerHTML=`
      <div class="head"><div class="hi">Доходы</div></div>
      <div class="hero"><div class="label">План дохода в месяц</div>
        <div class="big">${fmt(d.plan_total)}<span class="cur">₽</span></div>
        <div class="sub">факт за месяц: ${fmt(d.fact_total)} ₽${d.unattributed>0?' · не распознано '+fmt(d.unattributed):''}</div></div>
      ${nudgeHtml}
      <h2>Источники</h2>
      ${srcHtml}
      <h2>Откуда пришло (за месяц)</h2>
      ${bdHtml}
      <h2>Добавить источник</h2>
      <div class="card">
        <input id="is-n" class="inp" placeholder="Название (зарплата, фриланс, пособие…)" style="margin-bottom:8px">
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="is-a" class="inp" type="number" inputmode="decimal" placeholder="Сумма" style="flex:1.3">
          <select id="is-c" class="inp" style="flex:1"><option value="RUB">RUB</option><option value="USD">USD</option></select></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="ip-m" class="chip on" onclick="setIncPer('monthly')">Мес</button>
          <button id="ip-y" class="chip" onclick="setIncPer('yearly')">Год</button>
          <span style="width:6px"></span>
          <span id="io-chips" style="display:contents">${familyChips(_incOwner,'setIncOwner')}</span>
          <button class="btn" style="margin-left:auto" onclick="addIncome()">${icon('plus',18,'#fff')}</button></div></div>`;
    _incPer='monthly'; _incOwner='me';
  }catch(e){ e.message==='AUTH'?authErr('income'):document.getElementById('v-income').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function setIncPer(p){ _incPer=p; document.getElementById('ip-m').className='chip'+(p==='monthly'?' on':''); document.getElementById('ip-y').className='chip'+(p==='yearly'?' on':''); }
function setIncOwner(o){ _incOwner=o; const el=document.getElementById('io-chips'); if(el) el.innerHTML=familyChips(o,'setIncOwner'); }
async function addIncome(){ const n=document.getElementById('is-n').value.trim(), a=parseFloat(document.getElementById('is-a').value), c=document.getElementById('is-c').value;
  if(!n||!a){toast('Имя и сумма');return;} try{ await api('/api/income',{method:'POST',body:JSON.stringify({name:n,amount:a,currency:c,period:_incPer,owner:_incOwner})}); toast('Добавлено'); loadIncome(); }catch(e){toast('Ошибка');} }
async function toggleIncome(id,active){ try{ await api('/api/income/'+id,{method:'POST',body:JSON.stringify({active:!!active})}); loadIncome(); }catch(e){toast('Ошибка');} }
async function delIncome(id){ try{ await api('/api/income/'+id,{method:'DELETE'}); toast('Удалено'); loadIncome(); }catch(e){toast('Ошибка');} }
let _incEditPer='monthly', _incEditOwner='me', _incEditCur='RUB', _incEditId=null;
async function openIncEdit(id){
  const inc=(await api('/api/income')).sources||[];
  const s=inc.find(x=>x.id===id); if(!s){toast('Не найдено');return;}
  _incEditId=id; _incEditPer=s.period; _incEditOwner=s.owner; _incEditCur=s.currency;
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Источник: ${s.name}</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <input id="ie-n" class="inp" placeholder="Название" value="${(s.name||'').replace(/"/g,'&quot;')}" style="margin-bottom:8px">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="ie-a" class="inp" type="number" inputmode="decimal" value="${s.amount}" style="flex:2">
      <select id="ie-c" class="inp" style="flex:1"><option value="RUB"${_incEditCur==='RUB'?' selected':''}>RUB</option><option value="USD"${_incEditCur==='USD'?' selected':''}>USD</option></select></div>
    <div class="t2" style="color:var(--muted);margin:0 2px 4px">Срок окончания (если ограничен)</div>
    <input id="ie-end" class="inp" type="date" value="${s.end_date||''}" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button id="iep-m" class="chip${_incEditPer==='monthly'?' on':''}" onclick="setIncEditPer('monthly')">Мес</button>
      <button id="iep-y" class="chip${_incEditPer==='yearly'?' on':''}" onclick="setIncEditPer('yearly')">Год</button>
      <span style="width:4px"></span>
      <span id="ieo-chips" style="display:contents">${familyChips(_incEditOwner,'setIncEditOwner')}</span>
      <button class="btn" style="margin-left:auto" onclick="saveIncEdit()">Сохранить</button></div>`;
  document.getElementById('ov').style.display='flex';
}
function setIncEditPer(p){ _incEditPer=p; document.getElementById('iep-m').className='chip'+(p==='monthly'?' on':''); document.getElementById('iep-y').className='chip'+(p==='yearly'?' on':''); }
function setIncEditOwner(o){ _incEditOwner=o; const el=document.getElementById('ieo-chips'); if(el) el.innerHTML=familyChips(o,'setIncEditOwner'); }
async function saveIncEdit(){
  const body={name:document.getElementById('ie-n').value.trim(),
    amount:parseFloat(document.getElementById('ie-a').value)||0,
    currency:document.getElementById('ie-c').value, period:_incEditPer, owner:_incEditOwner,
    end_date:document.getElementById('ie-end').value||null};
  if(!body.name||!body.amount){toast('Имя и сумма');return;}
  try{ await api('/api/income/'+_incEditId,{method:'POST',body:JSON.stringify(body)}); toast('Сохранено'); closeOv(); loadIncome(); }catch(e){toast('Ошибка');}
}

// ---- детали операции + правка категорий ----
async function openTx(id){
  try{
    const d=await api('/api/tx/'+id);
    if(d.type==='income'){ if(!_incCats.length){ await loadIncCats(); } }
    else if(!_cats.length){ await loadCats(); }
    renderDetail(d);
  }catch(e){ toast('Ошибка'); }
}
function catchipHtml(kind,id,name){
  const col=name?color(name):'var(--muted)';
  return `<button class="catchip" style="${name?`border-color:${col};color:${col}`:''}" onclick="openPick('${kind}',${id})">${name?icon(catIcon(name),14):''}${name||'выбрать'}</button>`;
}
function renderDetail(d){
  _detail=d;
  let rows;
  if(d.type==='income'){
    const cur=(d.sources||[]).find(s=>s.id===d.recurring_id);
    const sn=cur?cur.name:null, sc=sn?color(sn):'var(--muted)';
    rows=`<div class="drow"><div class="mid"><div class="t1">Категория</div></div>${catchipHtml('inccat',d.id,d.category)}</div>
      <div class="drow"><div class="mid"><div class="t1">Источник</div></div>
        <button class="catchip" style="${sn?`border-color:${sc};color:${sc}`:''}" onclick="openSrcPick(${d.id})">${sn?icon('cash',14):''}${sn||'выбрать'}</button></div>`;
  } else if(d.type==='transfer'){
    // переводы — раскрыть в блоке «Что это было?» (см. ниже)
    const cp=(d.accounts_other||[]).find(a=>a.id===d.counterparty_account_id);
    rows = cp
      ? `<div class="drow"><div class="mid"><div class="t1">Перевод на счёт</div><div class="t2">${cp.name}${cp.owner!=='me'?' · '+ownerLabel(cp.owner):''}</div></div></div>`
      : '';
  } else {
    const items=d.items||[];
    rows = items.length
      ? items.map(it=>`<div class="drow"><div class="mid"><div class="t1">${it.name}</div><div class="t2">${fmt(it.sum)} ${CUR}</div></div>
          ${catchipHtml('item',it.id,it.category)}</div>`).join('')
      : `<div class="drow"><div class="mid"><div class="t1">Категория операции</div></div>${catchipHtml('tx',d.id,d.category)}</div>`;
  }
  // Блок «Что это было?» — для transfer-операций или любых без категории (review-режим)
  const reclassifyHtml = d.review || d.type==='transfer'
    ? renderReclassifyBlock(d) : '';
  const noteHtml=`<div class="drow" style="border-bottom:none;flex-direction:column;align-items:stretch;gap:6px">
    <div class="t2" style="color:var(--muted)">Заметка</div>
    <div style="display:flex;gap:8px"><input id="tx-note" class="inp" placeholder="например: для отчёта…" value="${(d.note||'').replace(/"/g,'&quot;')}" style="flex:1">
      <button class="btn" onclick="saveTxNote(${d.id})">OK</button></div></div>`;
  document.getElementById('sheet').innerHTML=`<div class="sheeth">
      <div><div class="t1">${d.merchant||'Операция'}</div><div class="t2">${fmt(Math.abs(d.amount))} ${CUR} · ${new Date(d.dt).toLocaleDateString('ru-RU')}</div></div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>${rows}${reclassifyHtml}${noteHtml}`;
  document.getElementById('ov').style.display='flex';
}
let _rcKind=null;
function renderReclassifyBlock(d){
  // У transfer-операций направление неизвестно (amount всегда положительный, type=transfer).
  // Поэтому для transfer показываем ВСЕ опции — пользователь сам знает что было.
  // Для expense/income без категории — те же опции (можно переклассифицировать в любую сторону).
  const kinds = [
    ['expense','Покупка / расход'],
    ['income','Доход'],
    ['self_transfer','Перевод между счетами'],
    ['give_loan','Я дал в долг'],
    ['repay_to_me','Вернули мой долг'],
    ['repay_my_debt','Я погасил долг'],
  ];
  const chips = kinds.map(([k,l])=>`<button class="chip${_rcKind===k?' on':''}" onclick="setRcKind('${k}')">${l}</button>`).join('');
  let form = '';
  if(_rcKind==='expense'){
    form = `<div class="drow" style="border-bottom:none"><div class="mid"><div class="t1">Категория расхода</div></div>
      <button class="catchip" style="${d.category?`border-color:${color(d.category)};color:${color(d.category)}`:''}" onclick="openPick('tx',${d.id},null,'expense')">${d.category?icon(catIcon(d.category),14):''}${d.category||'выбрать'}</button></div>`;
  } else if(_rcKind==='income'){
    form = `<div class="drow" style="border-bottom:none"><div class="mid"><div class="t1">Категория дохода</div></div>
      <button class="catchip" style="${d.category?`border-color:${color(d.category)};color:${color(d.category)}`:''}" onclick="openPick('inccat',${d.id},null,'income')">${d.category?icon(catIcon(d.category),14):''}${d.category||'выбрать'}</button></div>`;
  } else if(_rcKind==='self_transfer'){
    const opts = (d.accounts_other||[]).map(a=>`<option value="${a.id}"${a.id===d.counterparty_account_id?' selected':''}>${a.name}${a.owner!=='me'?' ('+ownerLabel(a.owner)+')':''}</option>`).join('');
    form = `<div class="drow" style="border-bottom:none;flex-direction:column;align-items:stretch;gap:6px">
      <div class="t2" style="color:var(--muted)">Счёт-получатель</div>
      <div style="display:flex;gap:8px">
        <select id="rc-acc" class="inp" style="flex:1">${opts||'<option>(нет других счетов)</option>'}</select>
        <button class="btn" onclick="applyRc(${d.id})">OK</button></div></div>`;
  } else if(_rcKind==='give_loan'){
    form = `<div class="drow" style="border-bottom:none;flex-direction:column;align-items:stretch;gap:6px">
      <div class="t2" style="color:var(--muted)">Кому дал в долг (имя)</div>
      <div style="display:flex;gap:8px">
        <input id="rc-name" class="inp" placeholder="Например: Маме" style="flex:1" value="${(d.merchant||'').replace(/"/g,'&quot;')}">
        <button class="btn" onclick="applyRc(${d.id})">OK</button></div></div>`;
  } else if(_rcKind==='repay_to_me' || _rcKind==='repay_my_debt'){
    const need = _rcKind==='repay_to_me' ? 'owed_to_me' : 'i_owe';
    const opts = (d.open_debts||[]).filter(x=>x.direction===need).map(x=>`<option value="${x.id}">${x.counterparty} · остаток ${fmt(x.remaining)} ₽</option>`).join('');
    if(!opts){
      form = `<div class="drow" style="border-bottom:none"><div class="t2" style="color:var(--muted)">Нет открытых долгов с подходящим направлением. Сначала заведи долг в разделе «Капитал → Долги».</div></div>`;
    } else {
      form = `<div class="drow" style="border-bottom:none;flex-direction:column;align-items:stretch;gap:6px">
        <div class="t2" style="color:var(--muted)">Какой долг закрываем?</div>
        <div style="display:flex;gap:8px">
          <select id="rc-debt" class="inp" style="flex:1">${opts}</select>
          <button class="btn" onclick="applyRc(${d.id})">OK</button></div></div>`;
    }
  }
  return `<div class="drow" style="flex-direction:column;align-items:stretch;gap:8px">
    <div class="t2" style="color:var(--muted)">Что это было?</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div></div>${form}`;
}
function setRcKind(k){ _rcKind=(_rcKind===k?null:k); if(_detail) renderDetail(_detail); }
async function applyRc(id){
  if(!_rcKind) return;
  const body = {kind:_rcKind};
  if(_rcKind==='expense' || _rcKind==='income'){
    // открываем catpicker — pickCat вызовет reclassify с нужным kind
    _pickKind = _rcKind==='income' ? 'inccat' : 'tx';
    _pickRcKind = _rcKind;       // запомним чтобы pickCat понял что менять и тип
    openPick(_pickKind, id);
    return;
  }
  if(_rcKind==='self_transfer'){
    body.counterparty_account_id = parseInt(document.getElementById('rc-acc').value)||null;
    if(!body.counterparty_account_id){ toast('Выбери счёт'); return; }
  }
  if(_rcKind==='give_loan'){
    body.counterparty_name = (document.getElementById('rc-name').value||'').trim();
    if(!body.counterparty_name){ toast('Имя должника'); return; }
  }
  if(_rcKind==='repay_to_me' || _rcKind==='repay_my_debt'){
    body.debt_id = parseInt(document.getElementById('rc-debt').value)||null;
    if(!body.debt_id){ toast('Выбери долг'); return; }
  }
  try{
    await api('/api/tx/'+id+'/reclassify',{method:'POST',body:JSON.stringify(body)});
    toast('Готово'); _rcKind=null; closeOv(); refreshActive();
  }catch(e){ toast('Ошибка'); }
}
async function saveTxNote(id){
  try{ await api('/api/tx/'+id+'/note',{method:'POST',body:JSON.stringify({note:document.getElementById('tx-note').value})});
    toast('Сохранено'); }catch(e){ toast('Ошибка'); }
}
function openPick(kind,id,parentId,rcKind){ _pickKind=kind; _pickId=id; if(rcKind!==undefined) _pickRcKind=rcKind;
  const cats=kind==='inccat'?_incCats:_cats;
  const hasKids=c=>cats.some(x=>String(x.parent_id)===String(c.id));
  const chip=(c,label,oc)=>`<button class="catpick" style="background:${tint(color(c.name))};color:${color(c.name)}" onclick="${oc}">${icon(catIcon(c.name),16)}<span>${label}</span></button>`;
  let cells='', head='Выбери категорию', back='';
  if(parentId){
    const p=cats.find(c=>String(c.id)===String(parentId));
    head=p?p.name:'Категория';
    back=`<button class="chip" style="margin-bottom:10px" onclick="openPick('${kind}',${id})">‹ Назад</button>`;
    cells=chip(p,'Вся «'+p.name+'»',`pickCat(${p.id})`)
      +cats.filter(c=>String(c.parent_id)===String(parentId)).map(c=>chip(c,c.name,`pickCat(${c.id})`)).join('');
  } else {
    cells=cats.filter(c=>!c.parent_id).map(c=>{const k=hasKids(c);return chip(c,c.name+(k?' ›':''),k?`openPick('${kind}',${id},${c.id})`:`pickCat(${c.id})`);}).join('');
  }
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">${head}</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>${back}<div class="catgrid">${cells}</div>`;
}
let _pickRcKind=null;
async function pickCat(cid){
  try{
    if(_pickRcKind){
      // выбор категории — это часть reclassify (переключение type + категория одной операцией)
      await api('/api/tx/'+_pickId+'/reclassify',{method:'POST',
        body:JSON.stringify({kind:_pickRcKind, category_id:cid})});
      _pickRcKind=null; _rcKind=null;
      toast('Сохранено'); closeOv(); refreshActive(); return;
    }
    const url=_pickKind==='item'?'/api/items/'+_pickId:'/api/tx/'+_pickId;
    await api(url,{method:'POST',body:JSON.stringify({category_id:cid})});
    toast('Сохранено');
    if(_pickKind==='inccat'){ refreshActive(); openTx(_pickId); }
    else { closeOv(); refreshActive(); }
  }catch(e){ toast('Ошибка'); }
}
function openSrcPick(id){ _pickId=id;
  const srcs=(_detail&&_detail.sources)||[];
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Привязать к источнику</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    ${srcs.length?`<div class="catgrid">`+srcs.map(s=>`<button class="catpick" style="background:${tint(color(s.name))};color:${color(s.name)}" onclick="pickSrc(${s.id})">${icon('cash',16)}<span>${s.name}</span></button>`).join('')+`</div>`:`<div class="muted" style="font-size:13px;padding:2px 2px 8px">Источников ещё нет — создай ниже или во вкладке «Доходы».</div>`}
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="ns-n" class="inp" placeholder="Новый источник" style="flex:1">
      <button class="btn" onclick="createSrcFromTx()">Создать</button></div>
    ${_detail&&_detail.recurring_id?`<button class="chip" style="margin-top:10px" onclick="pickSrc(null)">Отвязать</button>`:''}`;

let _lastScrollY=0, _fabAway=false, _scrollTick=false;
window.addEventListener('scroll',()=>{
  if(_scrollTick) return; _scrollTick=true;
  requestAnimationFrame(()=>{
    _scrollTick=false;
    const fab=document.getElementById('fab-add');
    const ov=document.getElementById('ov');
    if(!fab || (ov && ov.style.display==='flex')) return;
    const y=window.scrollY, dy=y-_lastScrollY;
    if(Math.abs(dy)<6){ _lastScrollY=y; return; }
    if(dy>0 && y>140 && !_fabAway){ fab.classList.add('away'); _fabAway=true; }
    else if(dy<0 && _fabAway){ fab.classList.remove('away'); _fabAway=false; }
    _lastScrollY=y;

},{passive:true});

async function saveGoalsAll(){
  try{

}

        <div class="mid"><div class="t1">${b.name}${b.manual?'':' <span class="muted" style="font-size:11px;font-weight:600">· прогноз</span>'}</div><div class="t2">потрачено ${fmt(b.spent||0)} ₽${b.over?' · <span style="color:var(--red);font-weight:700">перебор</span>':''}</div></div>
