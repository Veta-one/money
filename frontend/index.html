// ===== Редактор семьи =====
function renderFamilyEditor(){
  const rows=_family.map((m,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <input class="inp" value="${(m.name||'').replace(/"/g,'&quot;')}" oninput="famRename(${i},this.value)" onblur="famSave()" placeholder="Имя" style="flex:1">
    ${m.core?`<span class="t2" style="color:var(--muted);min-width:28px;text-align:center;font-size:11px">базовый</span>`:`<button class="iconbtn" onclick="famDelete(${i})" title="Удалить">${icon('trash',18)}</button>`}</div>`).join('');
  return `${rows}
    <div style="display:flex;gap:8px;margin-top:6px">
      <input id="fam-new" class="inp" placeholder="Новый член семьи" style="flex:1" onkeydown="if(event.key==='Enter')famAdd()">
      <button class="btn" onclick="famAdd()">${icon('plus',18,'#fff')}</button></div>
    <div class="t2" style="color:var(--muted);margin-top:8px">«Я» и «Жена» можно переименовать (например «Veta» и «Светик»). Кто-то ещё? Добавь ниже — появится в чипах при создании счёта/дохода/вклада.</div>`;
}
function famRedraw(){ const c=document.getElementById('fam-card'); if(c) c.innerHTML=renderFamilyEditor(); }
function famRename(i,name){ if(_family[i]) _family[i].name=name||_family[i].name; }
async function famSave(){ await saveFamily(); }
async function famAdd(){
  const inp=document.getElementById('fam-new'); if(!inp) return;
  const n=inp.value.trim(); if(!n){ toast('Имя'); return; }
  _family.push({key:_familyNewKey(),name:n}); inp.value='';
  famRedraw(); await saveFamily(); toast('Добавлен');
}
async function famDelete(i){
  const m=_family[i]; if(!m||m.core) return;
  _family.splice(i,1); famRedraw(); await saveFamily(); toast('Удалён');
}

// ===== Поиск по чекам ФНС =====
let _rcpExpand=new Set();
let _rcpQ='', _rcpData=null, _rcpDebTimer;
async function openReceipts(){
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Чеки ФНС</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="srch" style="margin-bottom:10px">${icon('search',18)}<input id="rcp-q" placeholder="«хлеб», «молоко», магазин..." value="${_rcpQ.replace(/"/g,'&quot;')}"></div>
    <div id="rcp-list"><div class="empty">Загрузка…</div></div>`;
  document.getElementById('ov').style.display='flex';
  const inp=document.getElementById('rcp-q');
  inp.addEventListener('input',e=>{ clearTimeout(_rcpDebTimer); _rcpDebTimer=setTimeout(()=>{ _rcpQ=e.target.value.trim(); loadReceipts(); },250); });
  loadReceipts();
}
async function loadReceipts(){
  try{
    const url='/api/receipts?limit=30&q='+encodeURIComponent(_rcpQ);
    _rcpData=await api(url);
    renderReceipts();
  }catch(e){ document.getElementById('rcp-list').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function renderReceipts(){
  const d=_rcpData||{receipts:[]};
  const list=document.getElementById('rcp-list'); if(!list) return;
  if(!d.receipts.length){
    list.innerHTML=`<div class="empty"><div class="ttl">${_rcpQ?'Ничего не найдено':'Чеков пока нет'}</div>${_rcpQ?'Уточни запрос или поищи по магазину.':'Скинь боту фото чека с QR — он сам распознает.'}</div>`;
    return;
  }
  list.innerHTML=`<div style="font-size:12px;color:var(--muted);margin:0 2px 8px">${d.count} чек${d.count%10===1&&d.count!==11?'':d.count%10>=2&&d.count%10<=4&&!(d.count%100>=12&&d.count%100<=14)?'а':'ов'} · показано ${d.receipts.length}</div>`+
    d.receipts.map(r=>{
      const col=color(r.merchant), isOpen=_rcpExpand.has(r.id);
      const date=new Date(r.dt).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'});
      const time=new Date(r.dt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      const items=isOpen?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">${r.items.map(it=>`<div style="display:flex;justify-content:space-between;gap:8px;padding:5px 0;font-size:13px">
        <span style="flex:1;min-width:0">${(it.name||'').replace(/</g,'&lt;')}${it.qty>1?` <span class="muted" style="font-size:11px">× ${it.qty}</span>`:''}</span>
        <span style="font-weight:700;white-space:nowrap">${fmt(it.sum||0)} ₽</span></div>`).join('')}</div>`:'';
      return `<div class="row" style="display:block;cursor:pointer" onclick="rcpToggle(${r.id})">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="sq" style="background:${tint(col)};color:${col}">${icon('receipt',20)}</div>
          <div class="mid"><div class="t1">${r.merchant}</div><div class="t2">${date}, ${time} · ${r.n_items} поз.</div></div>
          <div class="amt">${fmt(r.total)} ${CUR}</div>
        </div>${items}</div>`;
    }).join('')+
    (d.has_more?`<button class="btn full" style="margin-top:8px" onclick="rcpMore()">Показать ещё</button>`:'');
}
function rcpToggle(id){ if(_rcpExpand.has(id)) _rcpExpand.delete(id); else _rcpExpand.add(id); renderReceipts(); }
async function rcpMore(){
  const offset=(_rcpData?.receipts?.length||0)+(_rcpData?.offset||0);
  try{
    const more=await api('/api/receipts?limit=30&offset='+offset+'&q='+encodeURIComponent(_rcpQ));
    _rcpData.receipts=_rcpData.receipts.concat(more.receipts);
    _rcpData.has_more=more.has_more;
    renderReceipts();
  }catch(e){toast('Ошибка');}
}

async function openCatMgr(){
  await loadCats(); await loadIncCats();
  const tops=_cats.filter(c=>!c.parent_id);
  const row=c=>{const ic=catIcon(c.name),col=color(c.name);return `<div class="row" onclick="openCatEdit(${c.id})" style="cursor:pointer">
    <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
    <div class="mid"><div class="t1">${c.name}</div><div class="t2">${c.tx||0} оп.${c.parent_id?' · подкатегория':''}</div></div>${icon('arrow',18,'#8b909a')}</div>`};
  let html='';
  for(const p of tops){
    html+=row(p);
    const kids=_cats.filter(x=>x.parent_id===p.id);
    for(const k of kids) html+=`<div style="padding-left:16px">${row(k)}</div>`;
  }
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Категории расходов</div>
      <button class="iconbtn" onclick="openSettings()">${icon('arrow',18)}</button></div>
    <button class="btn full" style="margin-bottom:12px" onclick="openCatEdit(null)">+ Новая категория</button>
    ${html}`;
  document.getElementById('ov').style.display='flex';
}
let _editCat=null, _editCatParent=null, _editCatIcon=null, _editCatColor=null;
function openCatEdit(id){
  const c=id?_cats.find(x=>x.id===id):null;
  _editCat=id; _editCatParent=c?(c.parent_id||0):0; _editCatIcon=c?(c.icon||catIcon(c.name)):'tag'; _editCatColor=c?(c.color||color(c.name)):COLOR_SET[0];
  const parents=_cats.filter(x=>!x.parent_id && (!c || x.id!==c.id));
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">${c?'Категория: '+c.name:'Новая категория'}</div>
      <button class="iconbtn" onclick="openCatMgr()">${icon('x',18)}</button></div>
    <input id="ce-n" class="inp" placeholder="Название" value="${c?(c.name||'').replace(/"/g,'&quot;'):''}" style="margin-bottom:10px">
    <div class="t2" style="color:var(--muted);margin:0 2px 4px">Родитель</div>
    <select id="ce-p" class="inp" style="margin-bottom:10px"><option value="0">— нет (топ-уровень)</option>${parents.map(p=>`<option value="${p.id}"${_editCatParent===p.id?' selected':''}>${p.name}</option>`).join('')}</select>
    <div class="t2" style="color:var(--muted);margin:0 2px 4px">Цвет</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${COLOR_SET.map(co=>`<button onclick="_editCatColor='${co}';openCatEditRender()" style="width:32px;height:32px;border-radius:10px;border:${_editCatColor===co?'3px solid var(--ink)':'none'};background:${co};cursor:pointer"></button>`).join('')}</div>
    <div class="t2" style="color:var(--muted);margin:0 2px 4px">Иконка</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px">${ICON_SET.map(ic=>`<button onclick="_editCatIcon='${ic}';openCatEditRender()" style="aspect-ratio:1;border-radius:10px;border:${_editCatIcon===ic?'2px solid '+_editCatColor:'1.5px solid var(--line)'};background:${tint(_editCatColor)};color:${_editCatColor};display:flex;align-items:center;justify-content:center;cursor:pointer">${icon(ic,18)}</button>`).join('')}</div>
    <div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="saveCat()">Сохранить</button>
      ${c?`<button class="chip" style="border-color:var(--red);color:var(--red)" onclick="delCat(${c.id})">Удалить</button>`:''}</div>`;
}
function openCatEditRender(){ openCatEdit(_editCat); }
async function saveCat(){
  const name=document.getElementById('ce-n').value.trim(); if(!name){toast('Название');return;}
  const body={name, parent_id:parseInt(document.getElementById('ce-p').value)||0, icon:_editCatIcon, color:_editCatColor};
  try{ if(_editCat){ await api('/api/categories/'+_editCat,{method:'POST',body:JSON.stringify(body)}); }
    else { body.type='expense'; await api('/api/categories',{method:'POST',body:JSON.stringify(body)}); }
    toast('Сохранено'); _cats=[]; await loadCats(); openCatMgr(); }catch(e){toast('Ошибка');}
}
async function delCat(id){ try{ const r=await api('/api/categories/'+id,{method:'DELETE'});
  toast(r.archived?'Архивирована':'Удалена'); _cats=[]; await loadCats(); openCatMgr(); }catch(e){toast('Ошибка');} }

function boot(){
  Promise.resolve(loadDashboard()).then(()=>{ const el=document.getElementById('v-dashboard'); if(el) el.dataset.loaded='1'; });
}
// Вход: в Telegram Mini App — сразу; в браузере — проверяем сессию, иначе Login Widget
window.onTgAuth=async function(u){
  try{
    const r=await fetch('/api/auth/telegram',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(u)});
    if(!r.ok) throw 0; location.reload();
  }catch(e){ const m=document.getElementById('lg-err'); if(m) m.textContent='Не удалось войти. Это аккаунт владельца?'; }
};
function showLoginGate(){
  document.body.innerHTML=`<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center">
    <div style="font-size:26px;font-weight:800;letter-spacing:-.5px">MONEY</div>
    <div style="font-size:14px;color:var(--muted);max-width:280px;line-height:1.5">Личный финансовый помощник. Вход только для владельца через Telegram.</div>
    <div id="tg-login" style="margin-top:6px"></div>
    <div id="lg-err" style="font-size:12px;color:var(--red);min-height:16px"></div>
  </div>`;
  const s=document.createElement('script');
  s.async=true; s.src='https://telegram.org/js/telegram-widget.js?22';
  s.setAttribute('data-telegram-login','money_veta_bot');
  s.setAttribute('data-size','large');
  s.setAttribute('data-onauth','onTgAuth(user)');
  s.setAttribute('data-request-access','write');
  document.getElementById('tg-login').appendChild(s);
}
const _inTelegram = !!(tg && tg.initData);
if(_inTelegram){ boot(); }
else { fetch('/api/me').then(r=>{ if(r.ok) boot(); else showLoginGate(); }).catch(()=>showLoginGate()); }

// ===== Событийная свежесть данных =====
// Кэш живёт всю сессию. Сбрасывается при мутациях (в api()) и при возврате
// фокуса, если серверный отпечаток /api/version изменился (правка через бота).
let _dataVersion=null;
async function checkVersion(){
  try{
    const r=await fetch('/api/version',{headers:{'X-Telegram-Init-Data':tg?.initData||''}});
    if(!r.ok) return;
    const d=await r.json();
    if(_dataVersion!==null && d.version!==_dataVersion){
      invalidateAll();      // данные изменились вне аппа → сбросить кэш и флаги
      tab(_tab);            // перезагрузить активную вкладку свежим
    }
    _dataVersion=d.version;
  }catch(e){}
}
checkVersion();   // запомнить базовый отпечаток (без перезагрузки)
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') checkVersion(); });
try{ tg?.onEvent?.('activated', checkVersion); }catch(e){}

// глубокая ссылка из бота: ?tx=ID → открыть операцию
const _startTx=new URLSearchParams(location.search).get('tx');
if(_startTx && /^\d+$/.test(_startTx)){ setTimeout(()=>{ try{ openTx(parseInt(_startTx)); }catch(e){} }, 350); }
</script>
