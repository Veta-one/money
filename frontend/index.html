<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONEY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1b1c20; --text:#15161a; --muted:#8b909a;
    --line:#eceef1; --accent:#1b1c20;
    --violet:#7c5cff; --blue:#2f8bff; --green:#18c171; --orange:#ff8a3d; --red:#ff4d54; --pink:#ff5c9d; --teal:#10b3c6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:14px 14px 96px}
  .muted{color:var(--muted)}
  .head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .head .hi{font-size:15px;font-weight:600}
  .head .sub{font-size:12px;color:var(--muted)}
  svg.ic{display:block}
  /* hero */
  .hero{background:var(--ink);color:#fff;border-radius:24px;padding:22px 20px}
  .hero .label{font-size:13px;color:#a9adb6}
  .hero .big{font-size:34px;font-weight:800;letter-spacing:-.5px;margin:6px 0 4px}
  .hero .big .cur{font-size:18px;color:#a9adb6;font-weight:700;margin-left:4px}
  .hero .sub{font-size:13px;color:#c7cad1}
  /* cards */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .card{background:var(--card);border-radius:18px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)}
  .card .v{font-size:20px;font-weight:700;margin-top:6px}
  .v .cur{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  h2{font-size:14px;font-weight:700;margin:22px 4px 10px;display:flex;align-items:center;gap:7px}
  /* chart */
  .chartcard{background:var(--card);border-radius:18px;padding:16px 14px 10px}
  /* category rows */
  .catlist{background:var(--card);border-radius:18px;padding:6px 16px}
  .cat{padding:12px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .top{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .cat .nm{flex:1;font-size:14px}
  .cat .am{font-size:14px;font-weight:700}
  .track{height:6px;border-radius:6px;background:var(--line);margin-top:9px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:6px}
  /* list rows */
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px}
  .sq{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .t2{font-size:12px;color:var(--muted);margin-top:2px}
  .amt{font-size:15px;font-weight:700;white-space:nowrap}
  .amt.exp{color:var(--text)} .amt.inc{color:var(--green)}
  .num{width:118px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;font-weight:700;text-align:right;padding:9px 11px}
  .num:focus{border-color:var(--ink);outline:none}
  .inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;padding:11px 12px}
  .inp:focus{border-color:var(--ink);outline:none}
  /* goals */
  .goal{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .goal .gn{font-size:15px;font-weight:700}
  .goal .gv{font-size:13px;color:var(--muted)}
  .goal .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.full{width:100%}
  .btn.ghost{background:var(--bg);color:var(--text)}
  .chip{background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .iconbtn{background:var(--bg);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer}
  .empty{color:var(--muted);text-align:center;padding:26px 16px;font-size:14px;line-height:1.5}
  .loader{text-align:center;color:var(--muted);padding:70px 0}
  .err{color:var(--red);text-align:center;padding:40px 16px}
  /* nav */
  .nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:4px;
    background:var(--ink);border-radius:22px;padding:6px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
  .nav button{background:none;border:none;color:#9a9ea8;display:flex;align-items:center;gap:7px;
    padding:10px 16px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer}
  .nav button.active{background:#2c2e35;color:#fff}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
  <div id="v-dashboard"><div class="loader">Загрузка…</div></div>
  <div id="v-capital" style="display:none"><div class="loader">Загрузка…</div></div>
  <div id="v-goals" style="display:none"><div class="loader">Загрузка…</div></div>
  <div class="nav">
    <button id="t-dashboard" class="active" onclick="tab('dashboard')"></button>
    <button id="t-capital" onclick="tab('capital')"></button>
    <button id="t-goals" onclick="tab('goals')"></button>
  </div>
  <div class="toast" id="toast"></div>
<script>
const tg = window.Telegram?.WebApp;
try{ tg?.ready(); tg?.expand(); tg?.setHeaderColor?.('#f3f4f6'); tg?.setBackgroundColor?.('#f3f4f6'); }catch(e){}
const fmt = n => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n||0));
const CUR='₽';
let _sug=[];

// ---- Tabler icons ----
const P = {
  dashboard:'<path d="M4 4h6v8h-6z"/><path d="M4 16h6v4h-6z"/><path d="M14 12h6v8h-6z"/><path d="M14 4h6v4h-6z"/>',
  wallet:'<path d="M19 7h-14a2 2 0 0 0 -2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2v-8a2 2 0 0 0 -2 -2z"/><path d="M16.5 12.5h.5"/><path d="M19 7v-2a2 2 0 0 0 -2 -2h-9"/>',
  target:'<path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0"/><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>',
  receipt:'<path d="M5 21v-16a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v16l-3 -2l-2 2l-2 -2l-2 2l-2 -2z"/><path d="M9 7h6"/><path d="M9 11h6"/>',
  coin:'<path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M14.8 9a2 2 0 0 0 -1.8 -1h-2a2 2 0 0 0 0 4h2a2 2 0 0 1 0 4h-2a2 2 0 0 1 -1.8 -1"/><path d="M12 6v2"/><path d="M12 16v2"/>',
  swap:'<path d="M3 8h14l-3 -3"/><path d="M21 16h-14l3 3"/>',
  plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',
  pencil:'<path d="M4 20h4l10.5 -10.5a2.1 2.1 0 0 0 -3 -3l-10.5 10.5v3"/><path d="M13.5 6.5l3 3"/>',
  trash:'<path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3h6v3"/>',
};
function icon(n, sz, col){ return `<svg class="ic" width="${sz||22}" height="${sz||22}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${P[n]||''}</svg>`; }

const PAL=['#7c5cff','#2f8bff','#18c171','#ff8a3d','#ff5c9d','#10b3c6','#ff4d54','#a855f7'];
function color(s){ let h=0; for(const c of (s||'')) h=(h*31+c.charCodeAt(0))>>>0; return PAL[h%PAL.length]; }
function tint(hex){ return hex+'22'; }

async function api(path, opts){
  const o=opts||{}; o.headers=Object.assign({'X-Telegram-Init-Data':tg?.initData||'','Content-Type':'application/json'},o.headers||{});
  const r=await fetch(path,o);
  if(r.status===401||r.status===403) throw new Error('AUTH');
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),1400); }
function authErr(v){ document.getElementById('v-'+v).innerHTML='<div class="err">Доступ только владельцу.<br>Открой приложение из бота.</div>'; }

// nav labels with icons
document.getElementById('t-dashboard').innerHTML=icon('dashboard',20)+'<span>Главная</span>';
document.getElementById('t-capital').innerHTML=icon('wallet',20)+'<span>Капитал</span>';
document.getElementById('t-goals').innerHTML=icon('target',20)+'<span>Цели</span>';

function tab(t){
  for(const x of ['dashboard','capital','goals']){
    document.getElementById('v-'+x).style.display=x===t?'block':'none';
    document.getElementById('t-'+x).classList.toggle('active',x===t);
  }
  ({dashboard:loadDashboard,capital:loadCapital,goals:loadGoals})[t]();
}

function barChart(data, w=330, h=128){
  const max=Math.max(1,...data.map(d=>d.spent));
  const n=data.length||1, gap=12, bw=(w-gap*(n-1))/n, base=h-22;
  let s='';
  data.forEach((d,i)=>{
    const bh=Math.max(3, d.spent/max*(base-6)), x=i*(bw+gap), y=base-bh;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="var(--ink)"/>`;
    s+=`<text x="${x+bw/2}" y="${h-5}" text-anchor="middle" font-size="11" fill="#8b909a">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}

async function loadDashboard(){
  try{
    const [d,t]=await Promise.all([api('/api/dashboard'),api('/api/trends')]);
    const name=tg?.initDataUnsafe?.user?.first_name||'';
    const cats=d.by_category||[], mx=Math.max(1,...cats.map(c=>c.sum)), rec=d.recent||[];
    const months=(t.months||[]);
    document.getElementById('v-dashboard').innerHTML=`
      <div class="head"><div><div class="hi">Привет${name?', '+name:''}</div><div class="sub">${d.month}</div></div></div>
      <div class="hero">
        <div class="label">Свободно до конца месяца</div>
        <div class="big">${fmt(d.safe_to_spend)}<span class="cur">${CUR}</span></div>
        <div class="sub">≈ ${fmt(d.per_day)} ${CUR}/день · осталось ${d.days_left} дн.</div>
      </div>
      <div class="grid2">
        <div class="card"><div class="k">Потрачено</div><div class="v">${fmt(d.spent)}<span class="cur">${CUR}</span></div></div>
        <div class="card"><div class="k">Капитал</div><div class="v">${fmt(d.net_worth)}<span class="cur">${CUR}</span></div></div>
      </div>
      ${months.some(m=>m.spent>0)?`<h2>Траты по месяцам</h2><div class="chartcard">${barChart(months)}</div>`:''}
      <h2>По категориям</h2>
      ${cats.length?`<div class="catlist">`+cats.map(c=>`
        <div class="cat"><div class="top"><span class="dot" style="background:${color(c.name)}"></span>
        <span class="nm">${c.name}</span><span class="am">${fmt(c.sum)} ${CUR}</span></div>
        <div class="track"><i style="width:${Math.round(c.sum/mx*100)}%;background:${color(c.name)}"></i></div></div>`).join('')+`</div>`
        :`<div class="empty">Трат за месяц нет.<br>Пришли боту чек, текст или голосовое.</div>`}
      <h2>Последние операции</h2>
      ${rec.length?rec.map(x=>{const col=color(x.merchant||'op');return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon(x.type==='income'?'coin':x.type==='transfer'?'swap':'receipt',20)}</div>
        <div class="mid"><div class="t1">${x.merchant||(x.type==='income'?'Доход':'Операция')}</div>
        <div class="t2">${new Date(x.dt).toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
        <div class="amt ${x.type==='income'?'inc':'exp'}">${x.type==='income'?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`).join('')
        :`<div class="empty">Операций пока нет.</div>`}`;
  }catch(e){ e.message==='AUTH'?authErr('dashboard'):document.getElementById('v-dashboard').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}

async function loadCapital(){
  try{
    const [a,s]=await Promise.all([api('/api/accounts'),api('/api/settings')]);
    const accs=a.accounts||[];
    document.getElementById('v-capital').innerHTML=`
      <div class="head"><div class="hi">Капитал</div></div>
      <div class="hero"><div class="label">Чистый капитал</div>
        <div class="big">${fmt(a.net_worth)}<span class="cur">${CUR}</span></div>
        <div class="sub">всё сведено к рублю по курсу ЦБ</div></div>
      <h2>Счета</h2>
      ${accs.map(ac=>{const col=color(ac.name);return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon('wallet',20)}</div>
        <div class="mid"><div class="t1">${ac.name}</div>
        <div class="t2">${ac.currency}${ac.currency!=='RUB'?' · '+fmt(ac.rub)+' ₽':''} · ${ac.owner==='wife'?'жена':'я'}</div></div>
        <input class="num" type="number" inputmode="decimal" value="${ac.balance}" onchange="saveBal(${ac.id},this.value)"></div>`}).join('')}
      <h2>Ожидаемый доход в месяц</h2>
      <div class="card"><input class="inp" type="number" inputmode="decimal" value="${s.expected_monthly_income||0}" onchange="saveInc(this.value)"></div>
      <div class="empty" style="padding:14px 4px">Меняй балансы — капитал и «свободно в месяц» пересчитаются.</div>`;
  }catch(e){ e.message==='AUTH'?authErr('capital'):document.getElementById('v-capital').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
async function saveBal(id,v){ try{ await api('/api/accounts/'+id,{method:'POST',body:JSON.stringify({balance:parseFloat(v)||0})}); toast('Сохранено'); loadCapital(); }catch(e){toast('Ошибка');} }
async function saveInc(v){ try{ await api('/api/settings',{method:'POST',body:JSON.stringify({expected_monthly_income:parseFloat(v)||0})}); toast('Сохранено'); }catch(e){toast('Ошибка');} }

async function loadGoals(){
  try{
    const [g,r]=await Promise.all([api('/api/goals'),api('/api/recurring')]);
    const goals=g.goals||[], sug=g.suggest||{}, rec=r.recurring||[]; _sug=sug.suggestions||[];
    document.getElementById('v-goals').innerHTML=`
      <div class="head"><div class="hi">Цели</div></div>
      <div class="hero"><div class="label">Можешь откладывать в месяц</div>
        <div class="big">${fmt(sug.capacity)}<span class="cur">${CUR}</span></div>
        <div class="sub">доход − обязательные − траты</div></div>
      ${_sug.length?`<h2>Предложения</h2><div style="display:flex;flex-wrap:wrap;gap:8px;margin:0 2px">`
        +_sug.map((x,i)=>`<button class="chip" onclick="mkSug(${i})">${icon('plus',15)} ${x.name} · ${fmt(x.target_amount)} ${CUR}</button>`).join('')+`</div>`:''}
      <h2>Мои цели</h2>
      ${goals.length?goals.map(go=>{const col=color(go.name);return `<div class="goal">
        <div class="gh"><div class="gn">${go.name}</div><div class="gv">${fmt(go.current_amount)} / ${fmt(go.target_amount)} ${CUR}</div></div>
        <div class="track" style="margin-top:11px"><i style="width:${go.pct}%;background:${col}"></i></div>
        <div class="meta"><span>${go.pct}%</span><span>${go.eta?'до '+new Date(go.eta).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'}):'задай план/мес'}</span></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="inp" type="number" inputmode="decimal" placeholder="внести ₽" id="ad-${go.id}" style="flex:1">
          <button class="btn" onclick="addGoal(${go.id},${go.current_amount})">Внести</button>
          <button class="iconbtn" onclick="delGoal(${go.id})">${icon('trash',18)}</button></div></div>`}).join('')
        :`<div class="empty">Целей пока нет — выбери предложенную выше.</div>`}
      <h2>Добавить свою</h2>
      <div class="card">
        <input id="ng-n" class="inp" placeholder="Название" style="margin-bottom:8px">
        <div style="display:flex;gap:8px">
          <input id="ng-t" class="inp" type="number" inputmode="decimal" placeholder="Сумма ₽">
          <input id="ng-p" class="inp" type="number" inputmode="decimal" placeholder="В мес ₽"></div>
        <button class="btn full" style="margin-top:10px" onclick="newGoal()">Создать цель</button></div>
      <h2>Регулярные платежи</h2>
      ${rec.length?rec.map(x=>{const col=color(x.name);return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon('swap',20)}</div>
        <div class="mid"><div class="t1">${x.name}</div><div class="t2">${x.type==='income'?'доход':'расход'} · в месяц</div></div>
        <div class="amt exp">${fmt(x.amount)} ${CUR}</div>
        <button class="iconbtn" onclick="delRec(${x.id})">${icon('trash',18)}</button></div>`}).join('')
        :`<div class="empty" style="padding:14px 4px">Добавь ЖКХ, связь, подписки — уменьшат «свободно в месяц».</div>`}
      <div class="card" style="margin-top:8px"><div style="display:flex;gap:8px">
        <input id="nr-n" class="inp" placeholder="Напр.: ЖКХ" style="flex:1.4">
        <input id="nr-a" class="inp" type="number" inputmode="decimal" placeholder="₽/мес">
        <button class="btn" onclick="addRec()">${icon('plus',18,'#fff')}</button></div></div>`;
  }catch(e){ e.message==='AUTH'?authErr('goals'):document.getElementById('v-goals').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
async function mkSug(i){ try{ await api('/api/goals',{method:'POST',body:JSON.stringify(_sug[i])}); toast('Цель создана'); loadGoals(); }catch(e){toast('Ошибка');} }
async function newGoal(){ const n=document.getElementById('ng-n').value.trim(),t=parseFloat(document.getElementById('ng-t').value),p=parseFloat(document.getElementById('ng-p').value)||0;
  if(!n||!t){toast('Имя и сумма');return;} try{ await api('/api/goals',{method:'POST',body:JSON.stringify({name:n,target_amount:t,monthly_plan:p})}); toast('Создано'); loadGoals(); }catch(e){toast('Ошибка');} }
async function addGoal(id,cur){ const v=parseFloat(document.getElementById('ad-'+id).value); if(!v){toast('Сумма');return;}
  try{ await api('/api/goals/'+id,{method:'POST',body:JSON.stringify({current_amount:cur+v})}); toast('Внесено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function delGoal(id){ try{ await api('/api/goals/'+id,{method:'DELETE'}); toast('Удалено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function addRec(){ const n=document.getElementById('nr-n').value.trim(),a=parseFloat(document.getElementById('nr-a').value);
  if(!n||!a){toast('Имя и сумма');return;} try{ await api('/api/recurring',{method:'POST',body:JSON.stringify({name:n,amount:a,type:'expense'})}); toast('Добавлено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function delRec(id){ try{ await api('/api/recurring/'+id,{method:'DELETE'}); toast('Удалено'); loadGoals(); }catch(e){toast('Ошибка');} }

loadDashboard();
</script>
</body>
</html>
