<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONEY</title>

<style>
  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1b1c20; --text:#15161a; --muted:#8b909a;
    --line:#eceef1; --green:#18c171; --red:#ff4d54;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:14px 14px 96px}
  .muted{color:var(--muted)}
  .head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .head .hi{font-size:15px;font-weight:600}
  .head .sub{font-size:12px;color:var(--muted)}
  svg.ic{display:block}
  .hero{background:var(--ink);color:#fff;border-radius:24px;padding:22px 20px}
  .hero .label{font-size:13px;color:#a9adb6}
  .hero .big{font-size:34px;font-weight:800;letter-spacing:-.5px;margin:6px 0 4px}
  .hero .big .cur{font-size:18px;color:#a9adb6;font-weight:700;margin-left:4px}
  .hero .sub{font-size:13px;color:#c7cad1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .card{background:var(--card);border-radius:18px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)}
  .card .v{font-size:20px;font-weight:700;margin-top:6px}
  .v .cur{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  h2{font-size:14px;font-weight:700;margin:22px 4px 10px}
  .chartcard{background:var(--card);border-radius:18px;padding:16px 14px 10px}
  .catlist{background:var(--card);border-radius:18px;padding:6px 16px}
  .cat{padding:12px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .top{display:flex;align-items:center;gap:11px}
  .cdot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .cat .nm{flex:1;font-size:14px}
  .cat .am{font-size:14px;font-weight:700}
  .track{height:6px;border-radius:6px;background:var(--line);margin-top:9px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:6px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px}
  .sq{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .t2{font-size:12px;color:var(--muted);margin-top:2px}
  .amt{font-size:15px;font-weight:700;white-space:nowrap}
  .amt.exp{color:var(--text)} .amt.inc{color:var(--green)}
  .num{width:118px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;font-weight:700;text-align:right;padding:9px 11px}
  .num:focus{border-color:var(--ink);outline:none}
  .inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;padding:11px 12px}
  .inp:focus{border-color:var(--ink);outline:none}
  .goal{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .goal .gn{font-size:15px;font-weight:700}
  .goal .gv{font-size:13px;color:var(--muted)}
  .goal .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;flex:none}
  .btn.full{width:100%}
  .chip{background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:none}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .catpick{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--line);
    border-radius:13px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .iconbtn{background:var(--bg);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:var(--text)}
  .empty{color:var(--muted);text-align:center;padding:26px 16px;font-size:14px;line-height:1.5}
  .loader{text-align:center;color:var(--muted);padding:70px 0}
  .err{color:var(--red);text-align:center;padding:40px 16px}
  .nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:2px;
    background:var(--ink);border-radius:20px;padding:5px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
  .nav button{background:none;border:none;color:#9a9ea8;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 9px;border-radius:14px;cursor:pointer}
  .nav button.active{background:#2c2e35;color:#fff}
  .nav button .lbl{display:block;font-size:9.5px;font-weight:500;line-height:1;letter-spacing:.1px}
  .filt{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none}
  .filt::-webkit-scrollbar{display:none}
  .dayh{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin:16px 4px 8px}
  select.inp{appearance:none;-webkit-appearance:none}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:50}
  .sheet{background:var(--card);width:100%;border-radius:24px 24px 0 0;padding:18px 16px 30px;max-height:82vh;overflow:auto}
  .sheeth{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .drow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:none}
  .catchip{background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:5px}
  .catgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
</style>
</head>

function catIcon(name){ const n=(name||'').toLowerCase(); for(const [keys,ic] of CAT_ICON){ if(keys.some(k=>n.includes(k))) return ic; } return 'tag'; }

const PAL=['#7c5cff','#2f8bff','#18c171','#ff8a3d','#ff5c9d','#10b3c6','#ff4d54','#a855f7','#0ea5e9','#f59e0b'];
function color(s){ let h=0; for(const c of (s||'')) h=(h*31+c.charCodeAt(0))>>>0; return PAL[h%PAL.length]; }
function tint(hex){ return hex+'22'; }

async function api(path, opts){
  const o=opts||{}; o.headers=Object.assign({'X-Telegram-Init-Data':tg?.initData||'','Content-Type':'application/json'},o.headers||{});
  const r=await fetch(path,o);
  if(r.status===401||r.status===403) throw new Error('AUTH');
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),1400); }
function authErr(v){ document.getElementById('v-'+v).innerHTML='<div class="err">Доступ только владельцу.<br>Открой приложение из бота.</div>'; }

const TABS=['dashboard','ops','analytics','income','capital','goals'];
let _tab='dashboard';
function tab(t){
  _tab=t;
  for(const x of TABS){
    document.getElementById('v-'+x).style.display=x===t?'block':'none';
    document.getElementById('t-'+x).classList.toggle('active',x===t);

}

function barChart(data, w=330, h=144){
  const max=Math.max(1,...data.map(d=>d.spent));
  const n=data.length||1, gap=12, bw=(w-gap*(n-1))/n, base=h-22, top=20;
  let s='';
  data.forEach((d,i)=>{
    const bh=Math.max(3, d.spent/max*(base-top)), x=i*(bw+gap), y=base-bh;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="var(--ink)"/>`;
    if(d.spent>0) s+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="10.5" fill="#15161a" font-weight="700">${fmtK(d.spent)}</text>`;
    s+=`<text x="${x+bw/2}" y="${h-5}" text-anchor="middle" font-size="11" fill="#8b909a">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}
function donut(items, sz=148){
  const r=sz/2-13, c=2*Math.PI*r, cx=sz/2, cy=sz/2;
  const total=items.reduce((s,i)=>s+i.value,0)||1;
  let off=0, segs='';
  items.forEach(it=>{ const len=Math.max(0,it.value/total*c);
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.color}" stroke-width="13" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; });
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="flex:none">${segs}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="11" fill="#8b909a">всего</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="15" font-weight="800" fill="#15161a">${fmtK(total)}</text></svg>`;
}
function cashflowChart(data, w=330, h=160){
  const max=Math.max(1,...data.flatMap(d=>[d.income,d.expense]));
  const n=data.length||1, gap=14, grp=(w-gap*(n-1))/n, bw=Math.max(5,grp/2-3), base=h-20, top=26;
  let s='';
  data.forEach((d,i)=>{
    const x=i*(grp+gap);
    const ih=Math.max(2,d.income/max*(base-top)), eh=Math.max(2,d.expense/max*(base-top));
    const ix=x+bw/2, ex=x+bw+3+bw/2;
    s+=`<rect x="${x}" y="${base-ih}" width="${bw}" height="${ih}" rx="4" fill="var(--green)"/>`;
    s+=`<rect x="${x+bw+3}" y="${base-eh}" width="${bw}" height="${eh}" rx="4" fill="var(--ink)"/>`;
    if(d.income>0) s+=`<text x="${ix}" y="${base-ih-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="#18c171">${fmtK(d.income)}</text>`;
    if(d.expense>0) s+=`<text x="${ex}" y="${base-eh-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="#15161a">${fmtK(d.expense)}</text>`;
    s+=`<text x="${x+grp/2}" y="${h-4}" text-anchor="middle" font-size="10" fill="#8b909a">${new Date(d.ym+'-01').toLocaleDateString('ru-RU',{month:'short'})}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}
function lineChart(data, w=330, h=120){
  if(data.length<2) return '';
  const vals=data.map(d=>d.total), min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
  const pad=12, base=h-18, top=12, X=i=>pad+i*(w-2*pad)/(data.length-1), Y=v=>top+(1-(v-min)/rng)*(base-top);
  const pts=data.map((d,i)=>`${X(i).toFixed(1)},${Y(d.total).toFixed(1)}`).join(' ');
  let s=`<polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  s+=`<circle cx="${X(data.length-1)}" cy="${Y(data[data.length-1].total)}" r="3.5" fill="var(--ink)"/>`;
  s+=`<text x="${pad}" y="${h-3}" font-size="10" fill="#8b909a">${new Date(data[0].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  s+=`<text x="${w-pad}" y="${h-3}" text-anchor="end" font-size="10" fill="#8b909a">${new Date(data[data.length-1].date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</text>`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}

// ---- операции (список + фильтры) ----
let _ops={period:'this', type:'', cat:'', q:'', offset:0, items:[], more:false, count:0, se:0, si:0};
function ym(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function opsQS(){
  const p=new URLSearchParams(), now=new Date();
  if(_ops.period==='this') p.set('month',ym(now));
  else if(_ops.period==='last'){ const d=new Date(now.getFullYear(),now.getMonth()-1,1); p.set('month',ym(d)); }
  if(_ops.type) p.set('type',_ops.type);
  if(_ops.cat) p.set('category_id',_ops.cat);
  if(_ops.q) p.set('q',_ops.q);
  p.set('limit','50'); p.set('offset',String(_ops.offset));
  return p.toString();
}
async function loadOps(reset){
  if(reset!==false){ _ops.offset=0; _ops.items=[]; }
  try{
    if(!_cats.length){ try{ _cats=(await api('/api/categories')).categories||[]; }catch(e){} }
    const r=await api('/api/transactions?'+opsQS());
    _ops.items=_ops.items.concat(r.transactions||[]);
    _ops.more=r.has_more; _ops.count=r.count; _ops.se=r.sum_expense; _ops.si=r.sum_income;
    renderOps();
  }catch(e){ e.message==='AUTH'?authErr('ops'):document.getElementById('v-ops').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function txRow(x){
  const key=x.category||x.merchant||'op', col=color(key);
  const inn=x.type==='income'||x.amount<0;
  const ic=x.type==='income'?'wallet':x.type==='transfer'?'swap':catIcon(x.category||x.merchant);
  return `<div class="row" onclick="openTx(${x.id})" style="cursor:pointer">
    <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
    <div class="mid"><div class="t1">${x.merchant||(x.type==='income'?'Доход':'Операция')}</div>
    <div class="t2">${new Date(x.dt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}${x.category?' · '+x.category:''}</div></div>
    <div class="amt ${inn?'inc':'exp'}">${inn?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`;
}
function renderOps(){
  const o=_ops;
  const pc=(v,t)=>`<button class="chip${o.period===v?' on':''}" onclick="opsSet('period','${v}')">${t}</button>`;
  const tc=(v,t)=>`<button class="chip${o.type===v?' on':''}" onclick="opsSet('type','${v}')">${t}</button>`;
  const catOpts=`<option value="">Все категории</option>`+_cats.map(c=>`<option value="${c.id}"${String(o.cat)===String(c.id)?' selected':''}>${c.name}</option>`).join('');
  let listHtml='';
  if(o.items.length){
    const groups={};
    o.items.forEach(x=>{ const d=x.dt.slice(0,10); (groups[d]=groups[d]||[]).push(x); });
    for(const day of Object.keys(groups)){
      const arr=groups[day];
      const net=arr.reduce((s,x)=> s + (x.type==='income'? x.base_rub : x.type==='expense'? -x.base_rub : 0), 0);
      const dt=new Date(day+'T00:00:00');
      listHtml+=`<div class="dayh"><span>${dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span><span>${net>=0?'+':'−'}${fmt(Math.abs(net))} ${CUR}</span></div>`;
      listHtml+=arr.map(txRow).join('');
    }
  } else {
    listHtml=`<div class="empty">Ничего не найдено по этим фильтрам.</div>`;
  }
  document.getElementById('v-ops').innerHTML=`
    <div class="head"><div class="hi">Операции</div><div class="sub">${o.count} шт.</div></div>
    <div class="filt">${pc('this','Этот месяц')}${pc('last','Прошлый')}${pc('all','Всё время')}</div>
    <div class="filt">${tc('','Все')}${tc('expense','Расходы')}${tc('income','Доходы')}${tc('transfer','Переводы')}</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="inp" style="flex:1" onchange="opsSet('cat',this.value)">${catOpts}</select>
      <input class="inp" style="flex:1.2" placeholder="Поиск по продавцу" value="${(o.q||'').replace(/"/g,'&quot;')}" onchange="opsSet('q',this.value.trim())"></div>
    <div class="grid2" style="margin-top:0">
      <div class="card"><div class="k">Расходы</div><div class="v">${fmt(o.se)}<span class="cur">${CUR}</span></div></div>
      <div class="card"><div class="k">Доходы</div><div class="v" style="color:var(--green)">${fmt(o.si)}<span class="cur">${CUR}</span></div></div></div>
    ${listHtml}
    ${o.more?`<button class="btn full" style="margin-top:12px" onclick="opsMore()">Показать ещё</button>`:''}`;
}
function opsSet(k,v){ _ops[k]=v; loadOps(); }
function opsMore(){ _ops.offset+=50; loadOps(false); }
function openCatOps(catId){ _ops={period:'this', type:'expense', cat:String(catId), q:'', offset:0, items:[], more:false, count:0, se:0, si:0}; tab('ops'); }

// ---- аналитика ----
async function loadAnalytics(){
  try{
    const [d,b]=await Promise.all([api('/api/analytics?period='+_anPeriod), api('/api/budgets')]);
    _bud=b.items||[];
    const t=d.totals||{}, cf=d.cashflow||[], cmp=d.compare||[], bc=d.by_category||[], tm=d.top_merchants||[], subs=d.subscriptions||{items:[]};
    const pc=(v,l)=>`<button class="chip${_anPeriod===v?' on':''}" onclick="setAnPeriod('${v}')">${l}</button>`;
    const budCard=`<div class="card">
      <div style="display:flex;justify-content:space-between"><span class="muted">Доход (план)</span><span style="font-weight:700">${fmt(b.expected_income)} ${CUR}</span></div>

      ${b.goals_plan>0?`<div style="display:flex;justify-content:space-between;margin-top:6px"><span class="muted">В цели</span><span style="font-weight:700">−${fmt(b.goals_plan)} ${CUR}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;margin-top:8px;border-top:1px solid var(--line);padding-top:8px"><span style="font-weight:800">Профицит</span><span style="font-weight:800;color:${b.proficit>=0?'var(--green)':'var(--red)'}">${b.proficit>=0?'+':'−'}${fmt(Math.abs(b.proficit))} ${CUR}</span></div></div>`;
    const budItems=_bud.length?_bud.map((it,i)=>`<div class="cat" onclick="openBudget(${i})" style="cursor:pointer">
      <div class="top"><span class="cdot" style="background:${tint(color(it.name))};color:${color(it.name)}">${icon(catIcon(it.name),16)}</span>
      <span class="nm">${it.name}${it.manual?'':' <span class="muted" style="font-size:11px">авто</span>'}</span>
      <span class="am" style="${it.over?'color:var(--red)':''}">${fmt(it.spent)} / ${fmt(it.budget)} ${CUR}</span></div>
      <div class="track"><i style="width:${Math.min(100,it.pct)}%;background:${it.over?'var(--red)':color(it.name)}"></i></div></div>`).join(''):`<div class="empty">Пока нечего бюджетировать.</div>`;
    const cmpHtml=cmp.length?cmp.map(c=>{const up=c.delta>0,col=up?'var(--red)':'var(--green)';return `<div class="cat"><div class="top">
        <span class="cdot" style="background:${tint(color(c.name))};color:${color(c.name)}">${icon(catIcon(c.name),16)}</span>
        <span class="nm">${c.name}</span><span class="am" style="color:${col}">${up?'+':'−'}${fmt(Math.abs(c.delta))} ${CUR}</span></div>
        <div class="t2" style="margin-top:4px;color:var(--muted)">${fmt(c.prev)} → ${fmt(c.cur)} ${CUR}${c.delta_pct!=null?' · '+(up?'+':'')+c.delta_pct+'%':' · новое'}</div></div>`}).join(''):`<div class="empty">Нет данных для сравнения.</div>`;
    const bcMax=Math.max(1,...bc.map(c=>c.sum));
    document.getElementById('v-analytics').innerHTML=`
      <div class="head"><div class="hi">Аналитика</div></div>
      <h2 style="margin-top:6px">Бюджет · ${new Date(b.month+'-01').toLocaleDateString('ru-RU',{month:'long'})}</h2>
      ${budCard}
      <div class="catlist" style="margin-top:10px">${budItems}</div>
      <h2>Тренды по периодам</h2>
      <div class="filt">${pc('month','Месяц')}${pc('quarter','Квартал')}${pc('year','Год')}</div>
      <div class="grid2" style="margin-top:0">
        <div class="card"><div class="k">Доход</div><div class="v" style="color:var(--green)">${fmt(t.income)}<span class="cur">${CUR}</span></div></div>
        <div class="card"><div class="k">Расход</div><div class="v">${fmt(t.expense)}<span class="cur">${CUR}</span></div></div></div>
      <div class="card" style="margin-top:12px"><div class="k">Накоплено за период · норма сбережений ${t.savings_rate||0}%</div>
        <div class="v" style="color:${(t.net||0)>=0?'var(--green)':'var(--red)'}">${(t.net||0)>=0?'+':'−'}${fmt(Math.abs(t.net||0))}<span class="cur">${CUR}</span></div></div>
      <h2>Доходы и расходы по месяцам</h2>
      <div class="chartcard">${cashflowChart(cf)}
        <div style="display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:12px;color:var(--muted)">
          <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--green);margin-right:5px"></span>доход</span>
          <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--ink);margin-right:5px"></span>расход</span></div></div>
      <h2>Сравнение с прошлым периодом</h2>
      <div class="catlist">${cmpHtml}</div>
      <h2>Структура расходов</h2>
      ${bc.length?`<div class="catlist">`+bc.map(c=>`<div class="cat"><div class="top">
        <span class="cdot" style="background:${tint(color(c.name))};color:${color(c.name)}">${icon(catIcon(c.name),16)}</span>
        <span class="nm">${c.name}</span><span class="am">${fmt(c.sum)} ${CUR}</span></div>
        <div class="track"><i style="width:${Math.round(c.sum/bcMax*100)}%;background:${color(c.name)}"></i></div></div>`).join('')+`</div>`:`<div class="empty">Расходов за период нет.</div>`}
      <h2>Куда уходит больше всего</h2>
      ${tm.length?tm.map(m=>`<div class="row"><div class="sq" style="background:${tint(color(m.merchant))};color:${color(m.merchant)}">${icon(catIcon(m.merchant),20)}</div>
        <div class="mid"><div class="t1">${m.merchant}</div></div><div class="amt">${fmt(m.sum)} ${CUR}</div></div>`).join(''):`<div class="empty">Нет данных по продавцам.</div>`}
      <h2>Подписки и регулярные</h2>
      <div class="card"><div class="k">В месяц на регулярные</div><div class="v">${fmt(subs.total)}<span class="cur">${CUR}</span></div></div>
      ${(subs.items||[]).length?`<div style="margin-top:8px">`+subs.items.map(x=>`<div class="row"><div class="sq" style="background:${tint(color(x.name))};color:${color(x.name)}">${icon(catIcon(x.name),20)}</div>
        <div class="mid"><div class="t1">${x.name}</div><div class="t2">${x.period==='yearly'?'в год':x.period==='weekly'?'в неделю':'в месяц'}</div></div>
        <div class="amt">${fmt(x.amount)} ${CUR}</div></div>`).join('')+`</div>`:''}`;
  }catch(e){ e.message==='AUTH'?authErr('analytics'):document.getElementById('v-analytics').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function setAnPeriod(p){ _anPeriod=p; loadAnalytics(); }
function openBudget(i){
  const it=_bud[i]; if(!it)return;
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Лимит: ${it.name}</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="t2" style="margin:2px 2px 12px;color:var(--muted)">Потрачено ${fmt(it.spent)} ${CUR} в этом месяце. ${it.manual?'Задан свой лимит.':'Сейчас авто-прогноз ≈ '+fmt(it.budget)+' '+CUR+'.'}</div>
    <div style="display:flex;gap:8px">
      <input id="bud-a" class="inp" type="number" inputmode="decimal" placeholder="Лимит ₽/мес" value="${it.manual?it.budget:''}" style="flex:1">
      <button class="btn" onclick="saveBudget(${it.id})">Сохранить</button></div>
    ${it.manual?`<button class="chip" style="margin-top:10px" onclick="saveBudget(${it.id},0)">Сбросить на авто-прогноз</button>`:''}`;
  document.getElementById('ov').style.display='flex';
}
async function saveBudget(cid,forced){
  const v=forced!==undefined?forced:(parseFloat(document.getElementById('bud-a').value)||0);
  try{ await api('/api/budgets',{method:'POST',body:JSON.stringify({category_id:cid,amount:v})}); toast('Сохранено'); closeOv(); loadAnalytics(); }catch(e){ toast('Ошибка'); }
}

// ---- доходы по источникам ----
async function loadIncome(){
  try{
    const d=await api('/api/income');
    const srcs=d.sources||[], bd=d.breakdown||[], nudges=d.nudges||[];
    const nudgeHtml=nudges.length?`<div class="card" style="margin-top:12px;border:1.5px solid #ffd9a0;background:#fff7ec">
      <div class="k" style="color:#c77700;font-weight:700">Пора продлить</div>
      ${nudges.map(n=>`<div class="t1" style="margin-top:6px">${n.name} <span class="muted" style="font-weight:600">· до ${new Date(n.end_date).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'2-digit'})}</span></div>`).join('')}</div>`:'';
    const srcHtml=srcs.length?srcs.map(s=>{
      const col=color(s.name), cur=s.currency==='RUB'?'₽':s.currency;
      const per=s.period==='yearly'?'/год':s.period==='weekly'?'/нед':'/мес';
      const hint=(s.currency!=='RUB'||s.period!=='monthly')?' · '+fmt(s.plan)+' ₽/мес':'';
      const right=s.end_date?'до '+new Date(s.end_date).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'}):(s.plan>0&&s.fact>=s.plan?'получено':'ожидается');
      return `<div class="goal">
        <div class="gh"><div class="gn">${s.name}${s.owner==='wife'?' <span class="muted" style="font-size:12px;font-weight:600">· жена</span>':''}</div>
          <div class="gv">${fmt(s.fact)} / ${fmt(s.plan)} ₽</div></div>
        <div class="track" style="margin-top:11px"><i style="width:${s.pct}%;background:${col}"></i></div>
        <div class="meta"><span>${fmt(s.amount)} ${cur}${per}${hint}</span><span>${right}</span></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="chip" onclick="toggleIncome(${s.id},${s.active?0:1})">${s.active?'Выключить':'Включить'}</button>
          <button class="iconbtn" onclick="delIncome(${s.id})">${icon('trash',18)}</button></div></div>`;
    }).join(''):`<div class="empty">Источников дохода пока нет.<br>Добавь Шкулёв, Turnvoice, пособия — план дохода сложится сам.</div>`;
    const bdHtml=bd.length?`<div class="chartcard" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center">
        ${donut(bd.map(b=>({value:b.amount,color:color(b.name)})))}
        <div style="flex:1;min-width:150px">${bd.map(b=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0">
          <span style="width:10px;height:10px;border-radius:3px;background:${color(b.name)};flex:none"></span>
          <span style="flex:1;font-size:13px">${b.name}</span><span style="font-size:13px;font-weight:700">${fmt(b.amount)} ₽</span></div>`).join('')}</div></div>`
      :`<div class="empty">В этом месяце доходов ещё не было.</div>`;
    document.getElementById('v-income').innerHTML=`
      <div class="head"><div class="hi">Доходы</div></div>
      <div class="hero"><div class="label">План дохода в месяц</div>
        <div class="big">${fmt(d.plan_total)}<span class="cur">₽</span></div>
        <div class="sub">факт за месяц: ${fmt(d.fact_total)} ₽${d.unattributed>0?' · не распознано '+fmt(d.unattributed):''}</div></div>
      ${nudgeHtml}
      <h2>Источники</h2>
      ${srcHtml}
      <h2>Откуда пришло (за месяц)</h2>
      ${bdHtml}
      <h2>Добавить источник</h2>
      <div class="card">
        <input id="is-n" class="inp" placeholder="Название (Шкулёв, Turnvoice, пособие…)" style="margin-bottom:8px">
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="is-a" class="inp" type="number" inputmode="decimal" placeholder="Сумма" style="flex:1.3">
          <select id="is-c" class="inp" style="flex:1"><option value="RUB">RUB</option><option value="USD">USD</option></select></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="ip-m" class="chip on" onclick="setIncPer('monthly')">Мес</button>
          <button id="ip-y" class="chip" onclick="setIncPer('yearly')">Год</button>
          <span style="width:6px"></span>
          <button id="io-me" class="chip on" onclick="setIncOwner('me')">Я</button>
          <button id="io-wife" class="chip" onclick="setIncOwner('wife')">Жена</button>
          <button class="btn" style="margin-left:auto" onclick="addIncome()">${icon('plus',18,'#fff')}</button></div></div>`;
    _incPer='monthly'; _incOwner='me';
  }catch(e){ e.message==='AUTH'?authErr('income'):document.getElementById('v-income').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function setIncPer(p){ _incPer=p; document.getElementById('ip-m').className='chip'+(p==='monthly'?' on':''); document.getElementById('ip-y').className='chip'+(p==='yearly'?' on':''); }
function setIncOwner(o){ _incOwner=o; document.getElementById('io-me').className='chip'+(o==='me'?' on':''); document.getElementById('io-wife').className='chip'+(o==='wife'?' on':''); }
async function addIncome(){ const n=document.getElementById('is-n').value.trim(), a=parseFloat(document.getElementById('is-a').value), c=document.getElementById('is-c').value;
  if(!n||!a){toast('Имя и сумма');return;} try{ await api('/api/income',{method:'POST',body:JSON.stringify({name:n,amount:a,currency:c,period:_incPer,owner:_incOwner})}); toast('Добавлено'); loadIncome(); }catch(e){toast('Ошибка');} }
async function toggleIncome(id,active){ try{ await api('/api/income/'+id,{method:'POST',body:JSON.stringify({active:!!active})}); loadIncome(); }catch(e){toast('Ошибка');} }
async function delIncome(id){ try{ await api('/api/income/'+id,{method:'DELETE'}); toast('Удалено'); loadIncome(); }catch(e){toast('Ошибка');} }

// ---- детали операции + правка категорий ----
async function openTx(id){
  try{
    const d=await api('/api/tx/'+id);
    if(d.type==='income'){ if(!_incCats.length){ _incCats=(await api('/api/categories?type=income')).categories||[]; } }
    else if(!_cats.length){ _cats=(await api('/api/categories')).categories||[]; }
    renderDetail(d);
  }catch(e){ toast('Ошибка'); }
}
function catchipHtml(kind,id,name){
  const col=name?color(name):'var(--muted)';
  return `<button class="catchip" style="${name?`border-color:${col};color:${col}`:''}" onclick="openPick('${kind}',${id})">${name?icon(catIcon(name),14):''}${name||'выбрать'}</button>`;
}
function renderDetail(d){
  _detail=d;
  let rows;
  if(d.type==='income'){
    const cur=(d.sources||[]).find(s=>s.id===d.recurring_id);
    const sn=cur?cur.name:null, sc=sn?color(sn):'var(--muted)';
    rows=`<div class="drow"><div class="mid"><div class="t1">Категория</div></div>${catchipHtml('inccat',d.id,d.category)}</div>
      <div class="drow"><div class="mid"><div class="t1">Источник</div></div>
        <button class="catchip" style="${sn?`border-color:${sc};color:${sc}`:''}" onclick="openSrcPick(${d.id})">${sn?icon('cash',14):''}${sn||'выбрать'}</button></div>`;
  } else {
    const items=d.items||[];
    rows = items.length
      ? items.map(it=>`<div class="drow"><div class="mid"><div class="t1">${it.name}</div><div class="t2">${fmt(it.sum)} ${CUR}</div></div>
          ${catchipHtml('item',it.id,it.category)}</div>`).join('')
      : `<div class="drow"><div class="mid"><div class="t1">Категория операции</div></div>${catchipHtml('tx',d.id,d.category)}</div>`;
  }
  document.getElementById('sheet').innerHTML=`<div class="sheeth">
      <div><div class="t1">${d.merchant||'Операция'}</div><div class="t2">${fmt(Math.abs(d.amount))} ${CUR} · ${new Date(d.dt).toLocaleDateString('ru-RU')}</div></div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>${rows}`;
  document.getElementById('ov').style.display='flex';
}
function openPick(kind,id){ _pickKind=kind; _pickId=id;
  const cats=kind==='inccat'?_incCats:_cats;
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Выбери категорию</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="catgrid">`+cats.map(c=>`<button class="catpick" style="border-color:${color(c.name)};color:${color(c.name)}" onclick="pickCat(${c.id})">${icon(catIcon(c.name),15)}<span>${c.name}</span></button>`).join('')+`</div>`;
}
async function pickCat(cid){
  try{
    const url=_pickKind==='item'?'/api/items/'+_pickId:'/api/tx/'+_pickId;
    await api(url,{method:'POST',body:JSON.stringify({category_id:cid})});
    toast('Сохранено');
    if(_pickKind==='inccat'){ refreshActive(); openTx(_pickId); }
    else { closeOv(); refreshActive(); }
  }catch(e){ toast('Ошибка'); }
}
function openSrcPick(id){ _pickId=id;
  const srcs=(_detail&&_detail.sources)||[];
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Привязать к источнику</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    ${srcs.length?`<div class="catgrid">`+srcs.map(s=>`<button class="catpick" style="border-color:${color(s.name)};color:${color(s.name)}" onclick="pickSrc(${s.id})">${icon('cash',15)}<span>${s.name}</span></button>`).join('')+`</div>`:`<div class="muted" style="font-size:13px;padding:2px 2px 8px">Источников ещё нет — создай ниже или во вкладке «Доходы».</div>`}
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="ns-n" class="inp" placeholder="Новый источник" style="flex:1">
      <button class="btn" onclick="createSrcFromTx()">Создать</button></div>
    ${_detail&&_detail.recurring_id?`<button class="chip" style="margin-top:10px" onclick="pickSrc(null)">Отвязать</button>`:''}`;
}
async function pickSrc(rid){
  try{ await api('/api/tx/'+_pickId+'/source',{method:'POST',body:JSON.stringify({recurring_id:rid})});
    toast(rid?'Привязано':'Отвязано'); refreshActive(); openTx(_pickId); }catch(e){ toast('Ошибка'); }
}
async function createSrcFromTx(){
  const n=document.getElementById('ns-n').value.trim(); if(!n){toast('Имя');return;}
  try{
    const r=await api('/api/income',{method:'POST',body:JSON.stringify({name:n,amount:Math.abs(_detail.amount)||0,currency:_detail.currency||'RUB',period:'monthly',owner:'me'})});
    await api('/api/tx/'+_pickId+'/source',{method:'POST',body:JSON.stringify({recurring_id:r.id})});
    toast('Создано и привязано'); refreshActive(); openTx(_pickId);
  }catch(e){ toast('Ошибка'); }
}
function closeOv(){ document.getElementById('ov').style.display='none'; }

loadDashboard();
</script>
</body>
</html>
