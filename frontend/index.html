<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONEY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1b1c20; --text:#15161a; --muted:#8b909a;
    --line:#eceef1; --green:#18c171; --red:#ff4d54;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:14px 14px 96px}
  .muted{color:var(--muted)}
  .head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .head .hi{font-size:15px;font-weight:600}
  .head .sub{font-size:12px;color:var(--muted)}
  svg.ic{display:block}
  .hero{background:var(--ink);color:#fff;border-radius:24px;padding:22px 20px}
  .hero .label{font-size:13px;color:#a9adb6}
  .hero .big{font-size:34px;font-weight:800;letter-spacing:-.5px;margin:6px 0 4px}
  .hero .big .cur{font-size:18px;color:#a9adb6;font-weight:700;margin-left:4px}
  .hero .sub{font-size:13px;color:#c7cad1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .card{background:var(--card);border-radius:18px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)}
  .card .v{font-size:20px;font-weight:700;margin-top:6px}
  .v .cur{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  h2{font-size:14px;font-weight:700;margin:22px 4px 10px}
  .chartcard{background:var(--card);border-radius:18px;padding:16px 14px 10px}
  .catlist{background:var(--card);border-radius:18px;padding:6px 16px}
  .cat{padding:12px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .top{display:flex;align-items:center;gap:11px}
  .cdot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .cat .nm{flex:1;font-size:14px}
  .cat .am{font-size:14px;font-weight:700}
  .track{height:6px;border-radius:6px;background:var(--line);margin-top:9px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:6px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px}
  .sq{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .t2{font-size:12px;color:var(--muted);margin-top:2px}
  .amt{font-size:15px;font-weight:700;white-space:nowrap}
  .amt.exp{color:var(--text)} .amt.inc{color:var(--green)}
  .num{width:118px;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;font-weight:700;text-align:right;padding:9px 11px}
  .num:focus{border-color:var(--ink);outline:none}
  .inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:12px;color:var(--text);
    font-size:15px;padding:11px 12px}
  .inp:focus{border-color:var(--ink);outline:none}
  .goal{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px}
  .goal .gh{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .goal .gn{font-size:15px;font-weight:700}
  .goal .gv{font-size:13px;color:var(--muted)}
  .goal .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;flex:none}
  .btn.full{width:100%}
  .chip{background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:12px;
    padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:none}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .catpick{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--line);
    border-radius:13px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .iconbtn{background:var(--bg);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:var(--text)}
  .empty{color:var(--muted);text-align:center;padding:26px 16px;font-size:14px;line-height:1.5}
  .loader{text-align:center;color:var(--muted);padding:70px 0}
  .err{color:var(--red);text-align:center;padding:40px 16px}
  .nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:4px;
    background:var(--ink);border-radius:22px;padding:6px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
  .nav button{background:none;border:none;color:#9a9ea8;display:flex;align-items:center;gap:7px;
    padding:10px 16px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer}
  .nav button.active{background:#2c2e35;color:#fff}
  .nav button .lbl{display:none}
  .nav button.active .lbl{display:inline}
  .filt{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none}
  .filt::-webkit-scrollbar{display:none}
  .dayh{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin:16px 4px 8px}
  select.inp{appearance:none;-webkit-appearance:none}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:50}
  .sheet{background:var(--card);width:100%;border-radius:24px 24px 0 0;padding:18px 16px 30px;max-height:82vh;overflow:auto}
  .sheeth{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .drow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:none}
  .catchip{background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:5px}
  .catgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
</style>
</head>
<body>
  <div id="v-dashboard"><div class="loader">Загрузка…</div></div>
  <div id="v-ops" style="display:none"><div class="loader">Загрузка…</div></div>
  <div id="v-capital" style="display:none"><div class="loader">Загрузка…</div></div>
  <div id="v-goals" style="display:none"><div class="loader">Загрузка…</div></div>
  <div class="nav">
    <button id="t-dashboard" class="active" onclick="tab('dashboard')"></button>
    <button id="t-ops" onclick="tab('ops')"></button>
    <button id="t-capital" onclick="tab('capital')"></button>
    <button id="t-goals" onclick="tab('goals')"></button>

  <div class="toast" id="toast"></div>
  <div id="ov" class="ov" style="display:none" onclick="if(event.target.id==='ov')closeOv()"><div id="sheet" class="sheet"></div></div>

  [['интернет-покуп','покупк','озон','маркет'],'bag'],[['коммунал','жкх','квартир','мебель','дом'],'home'],
  [['красот','косметик','парикмах','уход'],'scissors'],[['мед','лекарств','аптек','стоматол','гемотест','здоров'],'pill'],
  [['налог'],'flame'],[['образован','учеб'],'book'],[['одежд','обувь'],'shirt'],
  [['отдых','развлеч','кино'],'film'],[['пивас','пиво','алког'],'beer'],[['сига','табак'],'smoke'],
  [['подар'],'gift'],[['сад','огород'],'leaf'],[['связь','телефон'],'phone'],[['техник'],'tv'],
  [['банк','комисс'],'bank'],[['хозтовар','быт'],'box'],[['зарплат','доход'],'wallet'],
  [['кешбэк'],'coin'],[['процент'],'percent'],[['продал'],'tag'],
  [['депозит','вклад','накоплен'],'pig'],[['коррект'],'adjust'],
];
function catIcon(name){ const n=(name||'').toLowerCase(); for(const [keys,ic] of CAT_ICON){ if(keys.some(k=>n.includes(k))) return ic; } return 'tag'; }

const PAL=['#7c5cff','#2f8bff','#18c171','#ff8a3d','#ff5c9d','#10b3c6','#ff4d54','#a855f7','#0ea5e9','#f59e0b'];
function color(s){ let h=0; for(const c of (s||'')) h=(h*31+c.charCodeAt(0))>>>0; return PAL[h%PAL.length]; }
function tint(hex){ return hex+'22'; }

async function api(path, opts){
  const o=opts||{}; o.headers=Object.assign({'X-Telegram-Init-Data':tg?.initData||'','Content-Type':'application/json'},o.headers||{});
  const r=await fetch(path,o);
  if(r.status===401||r.status===403) throw new Error('AUTH');
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),1400); }
function authErr(v){ document.getElementById('v-'+v).innerHTML='<div class="err">Доступ только владельцу.<br>Открой приложение из бота.</div>'; }

document.getElementById('t-dashboard').innerHTML=icon('dashboard',20)+'<span class="lbl">Главная</span>';
document.getElementById('t-ops').innerHTML=icon('list',20)+'<span class="lbl">Операции</span>';
document.getElementById('t-capital').innerHTML=icon('wallet',20)+'<span class="lbl">Капитал</span>';
document.getElementById('t-goals').innerHTML=icon('target',20)+'<span class="lbl">Цели</span>';

const TABS=['dashboard','ops','capital','goals'];
let _tab='dashboard';
function tab(t){
  _tab=t;
  for(const x of TABS){
    document.getElementById('v-'+x).style.display=x===t?'block':'none';
    document.getElementById('t-'+x).classList.toggle('active',x===t);
  }
  ({dashboard:loadDashboard,ops:loadOps,capital:loadCapital,goals:loadGoals})[t]();
}
function refreshActive(){ ({dashboard:loadDashboard,ops:loadOps,capital:loadCapital,goals:loadGoals})[_tab](); }

function barChart(data, w=330, h=144){
  const max=Math.max(1,...data.map(d=>d.spent));
  const n=data.length||1, gap=12, bw=(w-gap*(n-1))/n, base=h-22, top=20;
  let s='';
  data.forEach((d,i)=>{
    const bh=Math.max(3, d.spent/max*(base-top)), x=i*(bw+gap), y=base-bh;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="var(--ink)"/>`;
    if(d.spent>0) s+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="10.5" fill="#15161a" font-weight="700">${fmtK(d.spent)}</text>`;
    s+=`<text x="${x+bw/2}" y="${h-5}" text-anchor="middle" font-size="11" fill="#8b909a">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${s}</svg>`;
}

async function loadDashboard(){
  try{
    const [d,t]=await Promise.all([api('/api/dashboard'),api('/api/trends')]);
    const name=tg?.initDataUnsafe?.user?.first_name||'';
    const cats=d.by_category||[], mx=Math.max(1,...cats.map(c=>c.sum)), rec=d.recent||[], months=(t.months||[]);
    document.getElementById('v-dashboard').innerHTML=`
      <div class="head"><div><div class="hi">Привет${name?', '+name:''}</div><div class="sub">${d.month}</div></div></div>
      <div class="hero">
        <div class="label">Свободно до конца месяца</div>
        <div class="big">${fmt(d.safe_to_spend)}<span class="cur">${CUR}</span></div>
        <div class="sub">≈ ${fmt(d.per_day)} ${CUR}/день · осталось ${d.days_left} дн.</div>
      </div>
      <div class="grid2">
        <div class="card"><div class="k">Потрачено</div><div class="v">${fmt(d.spent)}<span class="cur">${CUR}</span></div></div>
        <div class="card"><div class="k">Капитал</div><div class="v">${fmt(d.net_worth)}<span class="cur">${CUR}</span></div></div>
      </div>
      ${d.forecast_total>0?`<div class="card" style="margin-top:12px"><div class="k">Прогноз трат в этом месяце</div>
        <div class="v">≈ ${fmt(d.forecast_total)}<span class="cur">${CUR}</span></div>
        <div class="track" style="margin-top:10px"><i style="width:${Math.min(100,Math.round(d.spent/d.forecast_total*100))}%;background:var(--ink)"></i></div>
        <div class="t2" style="margin-top:8px;color:var(--muted)">потрачено ${fmt(d.spent)} из ≈ ${fmt(d.forecast_total)} ${CUR}</div></div>`:''}
      ${months.some(m=>m.spent>0)?`<h2>Траты по месяцам</h2><div class="chartcard">${barChart(months)}</div>`:''}
      <h2>По категориям</h2>
      ${cats.length?`<div class="catlist">`+cats.map(c=>`
        <div class="cat"><div class="top"><span class="cdot" style="background:${tint(color(c.name))};color:${color(c.name)}">${icon(catIcon(c.name),16)}</span>
        <span class="nm">${c.name}</span><span class="am">${fmt(c.sum)} ${CUR}</span></div>
        <div class="track"><i style="width:${Math.round(c.sum/mx*100)}%;background:${color(c.name)}"></i></div>${c.expected>0?`<div class="t2" style="margin-top:6px;color:var(--muted)">из ≈ ${fmt(c.expected)} ${CUR}/мес</div>`:''}</div>`).join('')+`</div>`
        :`<div class="empty">Трат за месяц нет.<br>Пришли боту чек, текст или голосовое.</div>`}
      <h2>Последние операции</h2>
      ${rec.length?rec.map(x=>{const key=x.category||x.merchant||'op';const col=color(key);const inn=x.type==='income'||x.amount<0;const ic=x.type==='income'?'wallet':x.type==='transfer'?'swap':catIcon(x.category||x.merchant);return `<div class="row" onclick="openTx(${x.id})" style="cursor:pointer">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
        <div class="mid"><div class="t1">${x.merchant||(x.type==='income'?'Доход':'Операция')}</div>
        <div class="t2">${new Date(x.dt).toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
        <div class="amt ${inn?'inc':'exp'}">${inn?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`}).join('')
        :`<div class="empty">Операций пока нет.</div>`}`;
  }catch(e){ e.message==='AUTH'?authErr('dashboard'):document.getElementById('v-dashboard').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}

async function loadCapital(){
  try{
    const [a,s,dbt]=await Promise.all([api('/api/accounts'),api('/api/settings'),api('/api/debts')]);
    const accs=a.accounts||[], debts=dbt.debts||[]; _debtDir='owed_to_me';
    document.getElementById('v-capital').innerHTML=`
      <div class="head"><div class="hi">Капитал</div></div>
      <div class="hero"><div class="label">Чистый капитал</div>
        <div class="big">${fmt(a.net_worth)}<span class="cur">${CUR}</span></div>
        <div class="sub">сведено к рублю · $1 = ${fmt(a.usd_rate)} ${CUR} (ЦБ)</div></div>
      <h2>Счета</h2>
      ${accs.map(ac=>{const col=color(ac.name);return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon('wallet',20)}</div>
        <div class="mid"><div class="t1">${ac.name}</div>
        <div class="t2">${ac.currency}${ac.currency!=='RUB'?' · '+fmt(ac.rub)+' ₽':''} · ${ac.owner==='wife'?'жена':'я'}</div></div>
        <input class="num" type="number" inputmode="decimal" value="${ac.balance}" onchange="saveBal(${ac.id},this.value)"></div>`}).join('')}
      <h2>Долги</h2>
      ${(dbt.owed_to_me||dbt.i_owe)?`<div class="grid2" style="margin-top:0;margin-bottom:8px">
        <div class="card"><div class="k">Вам должны</div><div class="v" style="color:var(--green)">${fmt(dbt.owed_to_me)}<span class="cur">${CUR}</span></div></div>
        <div class="card"><div class="k">Вы должны</div><div class="v" style="color:var(--red)">${fmt(dbt.i_owe)}<span class="cur">${CUR}</span></div></div></div>`:''}
      ${debts.map(d=>{const col=d.direction==='owed_to_me'?'#18c171':'#ff4d54';return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon('coin',20)}</div>
        <div class="mid"><div class="t1">${d.counterparty}</div><div class="t2">${d.direction==='owed_to_me'?'должен вам':'вы должны'}</div></div>
        <div class="amt">${fmt(d.amount)} ${CUR}</div>
        <button class="iconbtn" onclick="closeDebt(${d.id})">${icon('x',18)}</button></div>`}).join('')}
      <div class="card" style="margin-top:8px">
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button id="dir-owed" class="chip on" onclick="setDir('owed_to_me')">Мне должны</button>
          <button id="dir-iowe" class="chip" onclick="setDir('i_owe')">Я должен</button></div>
        <div style="display:flex;gap:8px">
          <input id="dn" class="inp" placeholder="Кто" style="flex:1.4">
          <input id="da" class="inp" type="number" inputmode="decimal" placeholder="₽">
          <button class="btn" onclick="addDebt()">${icon('plus',18,'#fff')}</button></div></div>
      <h2>Ожидаемый доход в месяц</h2>
      <div class="card"><input class="inp" type="number" inputmode="decimal" value="${s.expected_monthly_income||0}" onchange="saveInc(this.value)"></div>`;
  }catch(e){ e.message==='AUTH'?authErr('capital'):document.getElementById('v-capital').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
async function saveBal(id,v){ try{ await api('/api/accounts/'+id,{method:'POST',body:JSON.stringify({balance:parseFloat(v)||0})}); toast('Сохранено'); loadCapital(); }catch(e){toast('Ошибка');} }
async function saveInc(v){ try{ await api('/api/settings',{method:'POST',body:JSON.stringify({expected_monthly_income:parseFloat(v)||0})}); toast('Сохранено'); }catch(e){toast('Ошибка');} }
function setDir(d){ _debtDir=d; document.getElementById('dir-owed').className='chip'+(d==='owed_to_me'?' on':''); document.getElementById('dir-iowe').className='chip'+(d==='i_owe'?' on':''); }
async function addDebt(){ const n=document.getElementById('dn').value.trim(), a=parseFloat(document.getElementById('da').value);
  if(!n||!a){toast('Кто и сколько');return;} try{ await api('/api/debts',{method:'POST',body:JSON.stringify({counterparty:n,direction:_debtDir,amount:a})}); toast('Записано'); loadCapital(); }catch(e){toast('Ошибка');} }
async function closeDebt(id){ try{ await api('/api/debts/'+id+'/close',{method:'POST'}); toast('Закрыт'); loadCapital(); }catch(e){toast('Ошибка');} }

async function loadGoals(){
  try{
    const [g,r]=await Promise.all([api('/api/goals'),api('/api/recurring')]);
    const goals=g.goals||[], sug=g.suggest||{}, rec=r.recurring||[]; _cands=r.candidates||[]; _recPer='monthly';
    document.getElementById('v-goals').innerHTML=`
      <div class="head"><div class="hi">Цели</div></div>
      <div class="hero"><div class="label">Можешь откладывать в месяц</div>
        <div class="big">${fmt(sug.capacity)}<span class="cur">${CUR}</span></div>
        <div class="sub">доход − обязательные − траты</div></div>
      <h2>Мои цели</h2>
      ${goals.length?goals.map(go=>{const col=color(go.name);return `<div class="goal">
        <div class="gh"><div class="gn">${go.name}</div><div class="gv">${fmt(go.current_amount)} / ${fmt(go.target_amount)} ${CUR}</div></div>
        <div class="track" style="margin-top:11px"><i style="width:${go.pct}%;background:${col}"></i></div>
        <div class="meta"><span>${go.pct}%</span><span>${go.eta?'до '+new Date(go.eta).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'}):'задай план/мес'}</span></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="inp" type="number" inputmode="decimal" placeholder="внести ₽" id="ad-${go.id}" style="flex:1">
          <button class="btn" onclick="addGoal(${go.id},${go.current_amount})">Внести</button>
          <button class="iconbtn" onclick="delGoal(${go.id})">${icon('trash',18)}</button></div></div>`}).join('')
        :`<div class="empty">Целей пока нет — создай ниже.</div>`}
      <h2>Добавить цель</h2>
      <div class="card">
        <input id="ng-n" class="inp" placeholder="Название" style="margin-bottom:8px">
        <div style="display:flex;gap:8px">
          <input id="ng-t" class="inp" type="number" inputmode="decimal" placeholder="Сумма ₽">
          <input id="ng-p" class="inp" type="number" inputmode="decimal" placeholder="В мес ₽"></div>
        <button class="btn full" style="margin-top:10px" onclick="newGoal()">Создать цель</button></div>
      <h2>Регулярные платежи</h2>
      ${rec.length?rec.map(x=>{const col=color(x.name);return `<div class="row">
        <div class="sq" style="background:${tint(col)};color:${col}">${icon(catIcon(x.name),18)}</div>
        <div class="mid"><div class="t1">${x.name}</div><div class="t2">${x.type==='income'?'доход':'расход'} · ${x.period==='yearly'?'в год':'в месяц'}</div></div>
        <div class="amt exp">${fmt(x.amount)} ${CUR}</div>
        <button class="iconbtn" onclick="delRec(${x.id})">${icon('trash',18)}</button></div>`}).join(''):''}
      ${_cands.length?`<div class="muted" style="font-size:12px;margin:12px 4px 6px">Похоже на регулярные:</div>`+_cands.map((c,i)=>`<div class="row">
        <div class="sq" style="background:${tint(color(c.name))};color:${color(c.name)}">${icon('swap',18)}</div>
        <div class="mid"><div class="t1">${c.name}</div><div class="t2">~${fmt(c.amount)} ${CUR} · ${c.months} мес</div></div>
        <button class="iconbtn" onclick="addRecCand(${i})">${icon('plus',18)}</button>
        <button class="iconbtn" onclick="dismissCand(${i})">${icon('x',18)}</button></div>`).join(''):''}
      <div class="card" style="margin-top:8px">
        <input id="nr-n" class="inp" placeholder="Название (напр. Интернет)" style="margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center">
          <input id="nr-a" class="inp" type="number" inputmode="decimal" placeholder="₽" style="flex:1">
          <button id="per-m" class="chip on" onclick="setPer('monthly')">Мес</button>
          <button id="per-y" class="chip" onclick="setPer('yearly')">Год</button>
          <button class="btn" onclick="addRec()">${icon('plus',18,'#fff')}</button></div></div>`;
  }catch(e){ e.message==='AUTH'?authErr('goals'):document.getElementById('v-goals').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
async function newGoal(){ const n=document.getElementById('ng-n').value.trim(),t=parseFloat(document.getElementById('ng-t').value),p=parseFloat(document.getElementById('ng-p').value)||0;
  if(!n||!t){toast('Имя и сумма');return;} try{ await api('/api/goals',{method:'POST',body:JSON.stringify({name:n,target_amount:t,monthly_plan:p})}); toast('Создано'); loadGoals(); }catch(e){toast('Ошибка');} }
async function addGoal(id,cur){ const v=parseFloat(document.getElementById('ad-'+id).value); if(!v){toast('Сумма');return;}
  try{ await api('/api/goals/'+id,{method:'POST',body:JSON.stringify({current_amount:cur+v})}); toast('Внесено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function delGoal(id){ try{ await api('/api/goals/'+id,{method:'DELETE'}); toast('Удалено'); loadGoals(); }catch(e){toast('Ошибка');} }
function setPer(p){ _recPer=p; document.getElementById('per-m').className='chip'+(p==='monthly'?' on':''); document.getElementById('per-y').className='chip'+(p==='yearly'?' on':''); }
async function addRec(){ const n=document.getElementById('nr-n').value.trim(),a=parseFloat(document.getElementById('nr-a').value);
  if(!n||!a){toast('Имя и сумма');return;} try{ await api('/api/recurring',{method:'POST',body:JSON.stringify({name:n,amount:a,type:'expense',period:_recPer})}); toast('Добавлено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function delRec(id){ try{ await api('/api/recurring/'+id,{method:'DELETE'}); toast('Удалено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function addRecCand(i){ const c=_cands[i]; if(!c)return; try{ await api('/api/recurring',{method:'POST',body:JSON.stringify({name:c.name,amount:c.amount,type:'expense',period:'monthly'})}); toast('Добавлено'); loadGoals(); }catch(e){toast('Ошибка');} }
async function dismissCand(i){ const c=_cands[i]; if(!c)return; try{ await api('/api/recurring/dismiss',{method:'POST',body:JSON.stringify({name:c.name})}); toast('Скрыто'); loadGoals(); }catch(e){toast('Ошибка');} }

// ---- операции (список + фильтры) ----
let _ops={period:'this', type:'', cat:'', q:'', offset:0, items:[], more:false, count:0, se:0, si:0};
function ym(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function opsQS(){
  const p=new URLSearchParams(), now=new Date();
  if(_ops.period==='this') p.set('month',ym(now));
  else if(_ops.period==='last'){ const d=new Date(now.getFullYear(),now.getMonth()-1,1); p.set('month',ym(d)); }
  if(_ops.type) p.set('type',_ops.type);
  if(_ops.cat) p.set('category_id',_ops.cat);
  if(_ops.q) p.set('q',_ops.q);
  p.set('limit','50'); p.set('offset',String(_ops.offset));
  return p.toString();
}
async function loadOps(reset){
  if(reset!==false){ _ops.offset=0; _ops.items=[]; }
  try{
    if(!_cats.length){ try{ _cats=(await api('/api/categories')).categories||[]; }catch(e){} }
    const r=await api('/api/transactions?'+opsQS());
    _ops.items=_ops.items.concat(r.transactions||[]);
    _ops.more=r.has_more; _ops.count=r.count; _ops.se=r.sum_expense; _ops.si=r.sum_income;
    renderOps();
  }catch(e){ e.message==='AUTH'?authErr('ops'):document.getElementById('v-ops').innerHTML='<div class="err">Ошибка: '+e.message+'</div>'; }
}
function txRow(x){
  const key=x.category||x.merchant||'op', col=color(key);
  const inn=x.type==='income'||x.amount<0;
  const ic=x.type==='income'?'wallet':x.type==='transfer'?'swap':catIcon(x.category||x.merchant);
  return `<div class="row" onclick="openTx(${x.id})" style="cursor:pointer">
    <div class="sq" style="background:${tint(col)};color:${col}">${icon(ic,20)}</div>
    <div class="mid"><div class="t1">${x.merchant||(x.type==='income'?'Доход':'Операция')}</div>
    <div class="t2">${new Date(x.dt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}${x.category?' · '+x.category:''}</div></div>
    <div class="amt ${inn?'inc':'exp'}">${inn?'+':'−'}${fmt(Math.abs(x.amount))} ${x.currency==='RUB'?CUR:x.currency}</div></div>`;
}
function renderOps(){
  const o=_ops;
  const pc=(v,t)=>`<button class="chip${o.period===v?' on':''}" onclick="opsSet('period','${v}')">${t}</button>`;
  const tc=(v,t)=>`<button class="chip${o.type===v?' on':''}" onclick="opsSet('type','${v}')">${t}</button>`;
  const catOpts=`<option value="">Все категории</option>`+_cats.map(c=>`<option value="${c.id}"${String(o.cat)===String(c.id)?' selected':''}>${c.name}</option>`).join('');
  let listHtml='';
  if(o.items.length){
    const groups={};
    o.items.forEach(x=>{ const d=x.dt.slice(0,10); (groups[d]=groups[d]||[]).push(x); });
    for(const day of Object.keys(groups)){
      const arr=groups[day];
      const net=arr.reduce((s,x)=> s + (x.type==='income'? x.base_rub : x.type==='expense'? -x.base_rub : 0), 0);
      const dt=new Date(day+'T00:00:00');
      listHtml+=`<div class="dayh"><span>${dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span><span>${net>=0?'+':'−'}${fmt(Math.abs(net))} ${CUR}</span></div>`;
      listHtml+=arr.map(txRow).join('');
    }
  } else {
    listHtml=`<div class="empty">Ничего не найдено по этим фильтрам.</div>`;
  }
  document.getElementById('v-ops').innerHTML=`
    <div class="head"><div class="hi">Операции</div><div class="sub">${o.count} шт.</div></div>
    <div class="filt">${pc('this','Этот месяц')}${pc('last','Прошлый')}${pc('all','Всё время')}</div>
    <div class="filt">${tc('','Все')}${tc('expense','Расходы')}${tc('income','Доходы')}${tc('transfer','Переводы')}</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="inp" style="flex:1" onchange="opsSet('cat',this.value)">${catOpts}</select>
      <input class="inp" style="flex:1.2" placeholder="Поиск по продавцу" value="${(o.q||'').replace(/"/g,'&quot;')}" onchange="opsSet('q',this.value.trim())"></div>
    <div class="grid2" style="margin-top:0">
      <div class="card"><div class="k">Расходы</div><div class="v">${fmt(o.se)}<span class="cur">${CUR}</span></div></div>
      <div class="card"><div class="k">Доходы</div><div class="v" style="color:var(--green)">${fmt(o.si)}<span class="cur">${CUR}</span></div></div></div>
    ${listHtml}
    ${o.more?`<button class="btn full" style="margin-top:12px" onclick="opsMore()">Показать ещё</button>`:''}`;
}
function opsSet(k,v){ _ops[k]=v; loadOps(); }
function opsMore(){ _ops.offset+=50; loadOps(false); }

// ---- детали операции + правка категорий ----
async function openTx(id){
  try{
    const d=await api('/api/tx/'+id);
    if(!_cats.length){ _cats=(await api('/api/categories')).categories||[]; }
    renderDetail(d);
  }catch(e){ toast('Ошибка'); }
}
function catchipHtml(kind,id,name){
  const col=name?color(name):'var(--muted)';
  return `<button class="catchip" style="${name?`border-color:${col};color:${col}`:''}" onclick="openPick('${kind}',${id})">${name?icon(catIcon(name),14):''}${name||'выбрать'}</button>`;
}
function renderDetail(d){
  const items=d.items||[];
  const rows = items.length
    ? items.map(it=>`<div class="drow"><div class="mid"><div class="t1">${it.name}</div><div class="t2">${fmt(it.sum)} ${CUR}</div></div>
        ${catchipHtml('item',it.id,it.category)}</div>`).join('')
    : `<div class="drow"><div class="mid"><div class="t1">Категория операции</div></div>${catchipHtml('tx',d.id,d.category)}</div>`;
  document.getElementById('sheet').innerHTML=`<div class="sheeth">
      <div><div class="t1">${d.merchant||'Операция'}</div><div class="t2">${fmt(Math.abs(d.amount))} ${CUR} · ${new Date(d.dt).toLocaleDateString('ru-RU')}</div></div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>${rows}`;
  document.getElementById('ov').style.display='flex';
}
function openPick(kind,id){ _pickKind=kind; _pickId=id;
  document.getElementById('sheet').innerHTML=`<div class="sheeth"><div class="t1">Выбери категорию</div>
      <button class="iconbtn" onclick="closeOv()">${icon('x',18)}</button></div>
    <div class="catgrid">`+_cats.map(c=>`<button class="catpick" style="border-color:${color(c.name)};color:${color(c.name)}" onclick="pickCat(${c.id})">${icon(catIcon(c.name),15)}<span>${c.name}</span></button>`).join('')+`</div>`;
}
async function pickCat(cid){
  try{
    const url=_pickKind==='item'?'/api/items/'+_pickId:'/api/tx/'+_pickId;
    await api(url,{method:'POST',body:JSON.stringify({category_id:cid})});
    toast('Сохранено'); closeOv(); refreshActive();
  }catch(e){ toast('Ошибка'); }
}
function closeOv(){ document.getElementById('ov').style.display='none'; }

loadDashboard();
</script>
</body>
</html>
